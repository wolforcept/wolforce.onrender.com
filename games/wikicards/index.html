<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WikiCards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg:           #0d0d0f;
  --bg2:          #13131a;
  --bg3:          #1a1a24;
  --surface:      #1e1e2a;
  --border:       #2a2a3a;
  --gold:         #c9a84c;
  --gold-light:   #e8c96a;
  --gold-dim:     #7a6030;
  --text:         #e8e6df;
  --text-dim:     #888080;
  --text-muted:   #554f4f;

  --common:       #9a9a9a;
  --uncommon:     #4caf6a;
  --rare:         #4a8fdf;
  --epic:         #9b59d0;
  --legendary:    #e8540a;


  --radius:    10px;
  --card-w:    220px;
  --card-h:    320px;
  --anim-fast: 150ms;
  --anim-med:  300ms;
  --anim-slow: 600ms;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Serif 4', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 20px;
  height: 64px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold-light);
}

.header-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}

/* Header icon buttons */
.header-icon-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border);
  border-radius: 7px; color: var(--text-dim); font-size: 0.9rem;
  cursor: pointer; transition: all var(--anim-fast);
  -webkit-tap-highlight-color: transparent;
}
.header-icon-btn:hover { color: var(--text); border-color: var(--gold-dim); background: var(--bg3); }
.header-icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Gold variant for the random pack button */
.header-icon-btn-gold { background: var(--gold); border-color: var(--gold); color: #0d0d0f; }
.header-icon-btn-gold:hover { background: var(--gold-light); border-color: var(--gold-light); color: #0d0d0f; }

#balance-amount {
  font-weight: 700;
  transition: transform var(--anim-fast), color var(--anim-fast);
}
#balance-amount.bump { transform: scale(1.25); color: #fff; }

nav { display: flex; gap: 4px; }


main { flex: 1; padding: 32px; }

/* ============================================================
   VIEWS — only active one is shown
   ============================================================ */
.view { display: none; }
.view.active { display: block; animation: viewIn var(--anim-med) ease; }

@keyframes viewIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ============================================================
   SHARED
   ============================================================ */
.gold-rule {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 28px 0;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 20px;
  border-radius: 6px;
  border: none;
  font-family: 'Source Serif 4', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--anim-fast);
  font-weight: 600;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
.btn:not(:disabled):hover  { transform: translateY(-1px); }
.btn:not(:disabled):active { transform: translateY(0); }

.btn-primary  { background: var(--gold); color: #0d0d0f; }
.btn-primary:not(:disabled):hover { background: var(--gold-light); }

.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-secondary:not(:disabled):hover { border-color: var(--gold-dim); color: var(--text); }

.btn-danger { background: transparent; border: 1px solid #5a2a2a; color: #c06060; }
.btn-danger:not(:disabled):hover { background: rgba(192,96,96,0.1); }

.btn-sm   { padding: 5px 12px; font-size: 0.8rem; }
.btn-full { width: 100%; }



/* ============================================================
   PACK OPENING VIEW
   ============================================================ */
#view-opening {
  display: none;
  min-height: 60vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
  text-align: center;
}
#view-opening.active { display: flex; }

.pack-burst { width: 120px; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; }
.pack-burst-icon { font-size: 5rem; animation: packFloat 1.5s ease-in-out infinite; position: relative; z-index: 2; }
.pack-burst-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid var(--gold); opacity: 0;
  animation: packRing 1.5s ease-out infinite;
}
.pack-burst-ring:nth-child(2) { animation-delay: 0.5s; }
.pack-burst-ring:nth-child(3) { animation-delay: 1.0s; }

@keyframes packFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50%       { transform: translateY(-10px) rotate(3deg); }
}
@keyframes packRing {
  0%   { transform: scale(0.5); opacity: 0.8; }
  100% { transform: scale(2.2); opacity: 0; }
}

.opening-label { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
.opening-sub   { color: var(--text-dim); font-size: 0.9rem; font-style: italic; }

.pack-progress { width: 280px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pack-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
  width: 0%;
  transition: width 0.4s ease;
  border-radius: 2px;
}

/* ============================================================
   CARD REVEAL VIEW
   ============================================================ */
#view-reveal {
  display: none;
  min-height: 70vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  text-align: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#view-reveal.active { display: flex; }

.reveal-counter {
  font-family: 'Playfair Display', serif;
  font-size: 0.9rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.reveal-counter strong { color: var(--gold); }

/* 3D flip container */
.reveal-flip-scene {
  width: var(--card-w);
  height: var(--card-h);
  perspective: 900px;
}
.reveal-flip-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.reveal-flip-inner.flipped { transform: rotateY(180deg); }

.reveal-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 10px;
  overflow: hidden;
}

/* Card back */
.reveal-face-back {
  background: var(--bg3);
  border: 2px solid var(--gold-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.reveal-face-back::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  opacity: 0.4;
}

/* Card front — populated by JS */
.reveal-face-front {
  transform: rotateY(180deg);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

/* Progress bar under the card */
.reveal-timer-bar {
  width: var(--card-w);
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.reveal-timer-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
  border-radius: 2px;
  width: 100%;
  transform-origin: left;
  /* transition set dynamically in JS */
}

.reveal-hint {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-style: italic;
  letter-spacing: 0.04em;
}

/* Rarity-specific glow on the front face after flip */
.reveal-face-front[data-rarity="common"]    { box-shadow: 0 8px 30px rgba(154,154,154,0.3); }
.reveal-face-front[data-rarity="uncommon"]  { box-shadow: 0 8px 36px rgba(76,175,106,0.45); }
.reveal-face-front[data-rarity="rare"]      { box-shadow: 0 8px 40px rgba(74,143,223,0.55); }
.reveal-face-front[data-rarity="epic"]      { box-shadow: 0 8px 48px rgba(155,89,208,0.65); }
.reveal-face-front[data-rarity="legendary"] { box-shadow: 0 8px 60px rgba(232,84,10,0.8), 0 0 100px rgba(232,84,10,0.2); }


.binder-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.binder-count { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }

.toolbar-right { display: flex; align-items: center; gap: 8px; }

/* Sort button wrapper — button triggers the hidden native select */
.sort-wrapper { position: relative; }
.sort-select-hidden {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%; font-size: 16px; /* prevent iOS zoom */
}

.toolbar-icon-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text-dim); font-size: 0.88rem;
  cursor: pointer; transition: all var(--anim-fast);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.toolbar-icon-btn:hover { color: var(--text); border-color: var(--gold-dim); }
.toolbar-icon-btn.active { color: var(--gold); border-color: var(--gold-dim); background: var(--bg3); }

/* Grid view */
.binder-grid { display: flex; flex-wrap: wrap; gap: 20px; }

/* List view */
.binder-list { display: flex; flex-direction: column; gap: 8px; }

.card-list-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  transition: border-color var(--anim-fast);
  position: relative;
}
.card-list-row:hover { border-color: var(--gold-dim); }
.card-list-row[data-rarity="common"]    { border-left: 3px solid var(--common); }
.card-list-row[data-rarity="uncommon"]  { border-left: 3px solid var(--uncommon); }
.card-list-row[data-rarity="rare"]      { border-left: 3px solid var(--rare); }
.card-list-row[data-rarity="epic"]      { border-left: 3px solid var(--epic); }
.card-list-row[data-rarity="legendary"] { border-left: 3px solid var(--legendary); }

.card-list-row.is-locked { outline: 1px solid var(--gold-dim); outline-offset: 1px; }

.card-list-thumb {
  width: 40px; height: 40px; border-radius: 5px;
  object-fit: cover; flex-shrink: 0; background: var(--bg3);
}
.card-list-thumb-placeholder {
  width: 40px; height: 40px; border-radius: 5px;
  background: var(--bg3); display: flex; align-items: center;
  justify-content: center; color: var(--text-muted); font-size: 1rem; flex-shrink: 0;
}

.card-list-rarity-icon {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; flex-shrink: 0;
}
.card-list-row[data-rarity="common"]    .card-list-rarity-icon { background: #3a3a3a; color: var(--common); }
.card-list-row[data-rarity="uncommon"]  .card-list-rarity-icon { background: #1a3020; color: var(--uncommon); }
.card-list-row[data-rarity="rare"]      .card-list-rarity-icon { background: #0e1f3a; color: var(--rare); }
.card-list-row[data-rarity="epic"]      .card-list-rarity-icon { background: #1e0e30; color: var(--epic); }
.card-list-row[data-rarity="legendary"] .card-list-rarity-icon { background: #2a0e04; color: var(--legendary); }

.card-list-info { flex: 1; min-width: 0; }
.card-list-title {
  font-family: 'Playfair Display', serif; font-size: 0.88rem;
  font-weight: 700; color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.card-list-desc {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.card-list-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

.card-list-btn {
  height: 30px; min-width: 30px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  border: none; border-radius: 5px; cursor: pointer;
  font-size: 0.72rem; font-family: system-ui, sans-serif; font-weight: 600;
  transition: all var(--anim-fast);
  -webkit-tap-highlight-color: transparent; position: relative;
  padding: 0 8px;
}
.card-list-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.card-list-btn:not(:disabled):hover { transform: translateY(-1px); }
.card-list-btn::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 5px); right: 0;
  background: #1a1a24; color: #e8e6df;
  font-size: 0.68rem; white-space: nowrap;
  padding: 3px 8px; border-radius: 4px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s; font-family: system-ui, sans-serif;
  z-index: 20;
}
.card-list-btn:hover::after { opacity: 1; }

/* Lock and wiki stay square */
.card-list-btn-lock, .card-list-btn-wiki { width: 30px; padding: 0; }

.card-list-btn-lock   { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border); }
.card-list-btn-lock.is-locked { color: var(--gold); border-color: var(--gold-dim); }
.card-list-btn-sell   { background: #2a3d2a; color: #7abf7a; }
.card-list-btn-expand { background: #1a1020; color: #a070d0; }
.card-list-btn-wiki   { background: #1a2030; color: #7090c0; }

.card-list-value {
  font-size: 0.75rem; color: var(--text-muted);
  font-family: system-ui, sans-serif; flex-shrink: 0;
  min-width: 36px; text-align: right;
}

@media (max-width: 520px) {
  main { padding: 16px; }
  .binder-grid { gap: 10px; }
  .card {
    --card-w: calc((100vw - 52px) / 2);
    --card-h: calc(((100vw - 52px) / 2) * 1.455);
    flex-shrink: 1;
  }
  .card-list-desc { display: none; }
}
.latest-pack-banner {
  background: var(--bg3);
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  animation: viewIn var(--anim-med) ease;
}
.banner-label { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
.banner-sub   { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
.banner-actions { display: flex; gap: 8px; }

/* New-card highlight: gold outline ring */
.card.is-new::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 14px;
  border: 2px solid var(--gold);
  pointer-events: none;
  animation: newRing 1.8s ease-out forwards;
}
@keyframes newRing {
  0%   { opacity: 0.9; }
  100% { opacity: 0; }
}


.binder-empty {
  text-align: center; padding: 80px 20px;
  color: var(--text-muted); font-style: italic; font-size: 1.1rem;
}

.binder-section-label {
  width: 100%;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); padding: 4px 0 10px;
  border-bottom: 1px solid var(--border);
}
.binder-section-label + .binder-section-label { margin-top: 16px; }

/* ============================================================
   CARD COMPONENT
   ============================================================ */
.card {
  width: var(--card-w); height: var(--card-h);
  border-radius: 10px; background: #f0ede4;
  position: relative; overflow: visible;
  transition: transform var(--anim-med), box-shadow var(--anim-med);
  flex-shrink: 0; display: flex; flex-direction: column;
}

/* Inner clip: contains image + body + footer within the card bounds */
.card-inner {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
  border-radius: 10px; overflow: hidden;
  flex: 1;
}
.card:hover { transform: translateY(-4px) scale(1.02); }

.card-border {
  position: absolute; inset: 0; border-radius: 10px;
  border: 2px solid transparent; pointer-events: none; z-index: 10;
  overflow: hidden;
}
.card[data-rarity="common"]    .card-border { border-color: var(--common);    box-shadow: 0 0 10px rgba(154,154,154,0.25); }
.card[data-rarity="uncommon"]  .card-border { border-color: var(--uncommon);  box-shadow: 0 0 12px rgba(76,175,106,0.4); }
.card[data-rarity="rare"]      .card-border { border-color: var(--rare);      box-shadow: 0 0 14px rgba(74,143,223,0.5); }
.card[data-rarity="epic"]      .card-border { border-color: var(--epic);      box-shadow: 0 0 18px rgba(155,89,208,0.6); }
.card[data-rarity="legendary"] .card-border { border-color: var(--legendary); box-shadow: 0 0 24px rgba(232,84,10,0.7), 0 0 48px rgba(232,84,10,0.25); }

/* Rarity symbol — top-right corner, overlapping the image */
.card-rarity-icon {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; z-index: 11;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.card[data-rarity="common"]    .card-rarity-icon { background: #3a3a3a; color: var(--common); }
.card[data-rarity="uncommon"]  .card-rarity-icon { background: #1a3020; color: var(--uncommon); }
.card[data-rarity="rare"]      .card-rarity-icon { background: #0e1f3a; color: var(--rare); }
.card[data-rarity="epic"]      .card-rarity-icon { background: #1e0e30; color: var(--epic); }
.card[data-rarity="legendary"] .card-rarity-icon { background: #2a0e04; color: var(--legendary); }

/* Lock button — top-left corner */
.card-lock-btn {
  position: absolute; top: 8px; left: 8px;
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; z-index: 11; cursor: pointer;
  border: none; background: rgba(20,18,14,0.55);
  color: #888; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: background var(--anim-fast), color var(--anim-fast), transform var(--anim-fast);
  -webkit-tap-highlight-color: transparent;
}
.card-lock-btn:hover { transform: scale(1.15); }
.card-lock-btn.is-locked { background: rgba(20,18,14,0.8); color: var(--gold); }

/* Locked card: subtle warm overlay tint */
.card.is-locked { outline: 2px solid var(--gold-dim); outline-offset: 2px; }

.card-img {
  width: 100%;
  object-fit: cover; object-position: center top;
  display: block; background: #d8d4c8;
  flex: 1; min-height: 0;
  border-radius: 8px 8px 0 0;
  transition: opacity 0.25s ease;
}
/* When desc overlay is shown, image fades way back */
.card-image-area.showing-desc .card-img { opacity: 0.08; }

/* Wrapper that holds both image and desc overlay, fills same space */
.card-image-area {
  position: relative;
  flex: 1; min-height: 0;
  border-radius: 8px 8px 0 0;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Desc overlay — hidden by default, shown on toggle */
.card-desc-overlay {
  position: absolute; inset: 0;
  padding: 42px 12px 10px;
  font-size: 0.68rem; color: #2a2018; line-height: 1.5;
  font-family: 'Source Serif 4', Georgia, serif;
  overflow-y: auto;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
  background: transparent;
}
.card-image-area.showing-desc .card-desc-overlay {
  opacity: 1; pointer-events: auto;
}

/* No-image placeholder — shows desc directly, no toggle needed */
.card-img-placeholder {
  width: 100%;
  background: linear-gradient(135deg, #d8d4c8 0%, #c0bcb0 100%);
  display: flex; align-items: center; justify-content: center;
  color: #a09890; font-size: 2rem;
  flex: 1; min-height: 0;
  border-radius: 8px 8px 0 0;
}
.card-img-placeholder.has-desc {
  align-items: flex-start;
  font-size: 0.68rem; color: #5a5048; line-height: 1.5;
  padding: 42px 12px 10px; font-family: 'Source Serif 4', Georgia, serif;
  overflow: hidden;
}

.card-body {
  padding: 8px 12px 6px;
  flex-shrink: 0; /* never squishes */
  background: #f0ede4;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.9rem; font-weight: 700; color: #1a1614;
  line-height: 1.25;
  /* clamp to 2 lines max so very long titles don't push buttons off */
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Footer — icon-only buttons, always pinned at bottom */
.card-footer {
  display: flex; gap: 4px; padding: 7px 8px;
  background: #e4e0d4; border-top: 1px solid #ccc8ba;
  flex-shrink: 0; border-radius: 0 0 8px 8px;
}

.card-btn {
  flex: 1; height: 32px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  border: none; border-radius: 5px; cursor: pointer;
  font-size: 0.75rem; font-family: system-ui, -apple-system, sans-serif;
  font-weight: 600; letter-spacing: 0.02em;
  transition: all var(--anim-fast);
  position: relative;
}
.card-btn:hover  { transform: translateY(-1px); }
.card-btn:active { transform: translateY(0); }
.card-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

/* Tooltip on hover */
.card-btn::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: #1a1a24; color: #e8e6df;
  font-size: 0.68rem; white-space: nowrap;
  padding: 3px 8px; border-radius: 4px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s ease;
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  z-index: 20;
}
.card-btn:hover::after { opacity: 1; }

.card-btn-sell    { background: #2a3d2a; color: #7abf7a; }
.card-btn-sell:not(:disabled):hover    { background: #334d33; }

.card-btn-expand  { background: #1a1020; color: #a070d0; }
.card-btn-expand:not(:disabled):hover  { background: #231530; }

.card-btn-wiki    { background: #1a2030; color: #7090c0; }
.card-btn-wiki:not(:disabled):hover    { background: #222840; }

/* card drop-in animation */
@keyframes cardDrop {
  from { opacity: 0; transform: translateY(20px) scale(0.93); }
  to   { opacity: 1; transform: none; }
}
.card.animating { opacity: 0; }
.card.dropped   { animation: cardDrop 0.35s ease forwards; }

/* ============================================================
   TOAST
   ============================================================ */
#toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 999; pointer-events: none;
}
.toast {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--gold); color: var(--text);
  font-size: 0.85rem; padding: 10px 16px; border-radius: 6px;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  pointer-events: auto;
}
.toast.success { border-left-color: var(--uncommon); }
.toast.error   { border-left-color: #c06060; }
@keyframes toastIn  { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translateX(20px); } }

/* ============================================================
   MODAL
   ============================================================ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 300;
  align-items: center; justify-content: center;
  padding: 24px 0;
}
#modal-overlay.active { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px;

}
.modal h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 10px; flex-shrink: 0; }

#modal-extra { overflow-y: auto; flex: 1; min-height: 0; }

/* ── Settings modal ──────────────────────────────────────────── */
.settings-section {

}

      State.binder               = d.binder               ?? [];

const WIKI_API     = 'https://en.wikipedia.org/w/api.php';
const PAGEVIEW_API = 'https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/en.wikipedia/all-access/user';

const Api = {
  _url(params) {
    return `${WIKI_API}?${new URLSearchParams({ ...params, format: 'json', origin: '*' })}`;
  },

  /** Batch-fetch title + extract + thumbnail + pageprops for multiple titles in one HTTP request. */
  async fetchCardData(titles) {
    const url  = Api._url({
      action: 'query', titles: titles.join('|'),
      prop: 'extracts|pageimages|pageprops', exintro: '1', exsentences: '2', explaintext: '1',
      piprop: 'thumbnail', pithumbsize: '400',
    });
    const data = await fetch(url).then(r => r.json());
    return Object.values(data.query.pages);
  },

  /** Returns true if a wiki page object is a disambiguation page. */
  isDisambiguation(page) {
    // Official flag set by the Disambiguation template
    if (page.pageprops?.disambiguation !== undefined) return true;
    // Fallback: extract starts with the characteristic phrasing
    const ex = (page.extract || '').trim().toLowerCase();
    return ex.startsWith('may refer to') || ex.startsWith('can refer to') || ex.includes('may refer to:');
  },

  /** Fetch N random article titles (namespace 0 = main articles only). */
  async fetchRandomTitles(count = PACK_SIZE) {
    const url  = Api._url({ action: 'query', list: 'random', rnlimit: count, rnnamespace: '0' });
    const data = await fetch(url).then(r => r.json());
    return data.query.random.map(p => p.title);
  },

  /** Fetch all internal links from one page; returns array of title strings. */
  async fetchLinksFrom(title) {
    const url  = Api._url({ action: 'query', titles: title, prop: 'links', pllimit: '500', plnamespace: '0' });
    const data = await fetch(url).then(r => r.json());
    const page = Object.values(data.query.pages)[0];
    return (page.links || []).map(l => l.title);
  },

  /** Fetch the #1 most-viewed article for the daily quest.
   *  Wikimedia top-pages data has a 1–2 day lag, so we try 2 days ago then fall back to 3.
   */
  async fetchDailyQuest() {
    const BAD = /^(Main_Page|Special:|Wikipedia:|Help:|Portal:|File:|Template:|Talk:|User:|WP:|Book:|Draft:|TimedText:|Module:|Gadget:|Deaths_in_|Lists_of_|List_of_|Index_of_|Outline_of_|Bibliography_of_|-$)/;

    const tryDate = async (daysAgo) => {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      const y  = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const url = `https://wikimedia.org/api/rest_v1/metrics/pageviews/top/en.wikipedia/all-access/${y}/${mm}/${dd}`;
      const data = await fetch(url).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
      const top = (data?.items?.[0]?.articles ?? []).find(a => !BAD.test(a.article));
      if (!top) return null;
      const title = top.article.replace(/_/g, ' ');
      const pages = await Api.fetchCardData([title]);
      const page  = pages[0];
      if (!page?.pageid || page.missing || Api.isDisambiguation(page)) return null;
      return { title, thumb: page?.thumbnail?.source ?? null };
    };

    try { return await tryDate(2); } catch { /* fall through */ }
    try { return await tryDate(3); } catch { return null; }
  },

  /** Sum of daily pageviews over the last 30 days for a single article. */

    const end     = new Date();
    const start   = new Date(end);
    start.setDate(start.getDate() - 30);
    const fmt = d => d.toISOString().slice(0, 10).replace(/-/g, '');
    try {
      const data = await fetch(`${PAGEVIEW_API}/${encoded}/daily/${fmt(start)}/${fmt(end)}`).then(r => r.json());

// ============================================================
// #region LOGIC — pure game rules; no DOM access
// ============================================================

const Logic = {
  // ── Hashing ────────────────────────────────────────────────

  /** FNV-1a → deterministic float [0,1). Same title always yields the same value. */
  titleHash(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    return ((h >>> 0) % 100_000) / 100_000;
  },

  // ── Rarity ─────────────────────────────────────────────────

  rarityFromViews(views) {
    for (let i = RARITY_TIERS.length - 1; i >= 0; i--)
      if (views >= RARITY_TIERS[i].minViews) return RARITY_TIERS[i].id;
    return 'common';
  },

  sellValue(title, rarity) {
    const { sellMin, sellMax } = RARITY_TIERS.find(t => t.id === rarity);
    return Math.round(sellMin + Logic.titleHash(title) * (sellMax - sellMin));
  },

  // ── Card building ───────────────────────────────────────────

  buildCard(page, views, sessionId) {
    const rarity = Logic.rarityFromViews(views);
    return /** @type {CardData} */ ({
      id:          `${page.pageid}_${Math.random().toString(36).slice(2, 7)}`,
      title:       page.title,
      desc:        page.extract || 'No description available.',
      thumb:       page.thumbnail?.source ?? null,
      rarity,
      value:       Logic.sellValue(page.title, rarity),
      sessionId,
      acquired:    Date.now(),
      locked:      false,
      expandCount: 0,
    });
  },

  // ── Collection helpers ──────────────────────────────────────

  pickRandom(arr, n) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.slice(0, n);
  },

  latestPackCards() {
    return State.sessionId ? State.binder.filter(c => c.sessionId === State.sessionId) : [];
  },

  /** Toggle locked state on a card. Returns new locked value. */
  toggleLock(id) {
    const card = State.binder.find(c => c.id === id);
    if (!card) return false;
    card.locked = !card.locked;
    Storage.save();
    return card.locked;
  },

  sortedBinder(key) {
    const arr = [...State.binder];
    const by = {
      'acquired':    (a, b) => b.acquired - a.acquired,
      'rarity-desc': (a, b) => RARITY_RANK[b.rarity] - RARITY_RANK[a.rarity],
      'rarity-asc':  (a, b) => RARITY_RANK[a.rarity] - RARITY_RANK[b.rarity],
      'value-desc':  (a, b) => b.value - a.value,
      'title-asc':   (a, b) => a.title.localeCompare(b.title),
    };
    arr.sort(by[key] ?? by['acquired']);
    // Locked cards always float to top, preserving their relative order
    return [...arr.filter(c => c.locked), ...arr.filter(c => !c.locked)];
  },

  // ── Economy ─────────────────────────────────────────────────

  /** Deterministic expand cost: same card always costs the same. Inverse of rarity. */
  /**
   * Expand cost for a card. Base cost is determined by title hash + rarity tier.
   * Each previous expansion multiplies cost by 1.8 (rounded), so repeated
   * expansions of the same card get progressively more expensive.
   */
  expandCost(card) {
    const { expandCostMin, expandCostMax } = RARITY_TIERS.find(t => t.id === card.rarity);
    const h    = Logic.titleHash(card.title + '_expand');
    const base = Math.round(expandCostMin + h * (expandCostMax - expandCostMin));
    const count = card.expandCount ?? 0;
    return Math.round(base * Math.pow(1.8, count));
  },

  canAffordExpand(card) { return State.balance >= Logic.expandCost(card); },

  canAffordPack() { return State.balance >= PACK_COST; },

  canAfford(amount) { return State.balance >= amount; },

  /**
   * Get today's 3 daily topic packs, deterministically from today's date.
   * Resets at midnight. Each topic also gets a deterministic price for the day.
   */
  dailyTopics() {
    const today = new Date().toISOString().slice(0, 10); // 'YYYY-MM-DD'
    const dayHash = Logic.titleHash(today);
    // Shuffle indices deterministically using the day hash as seed
    const indices = Array.from({ length: SHOP_TOPICS.length }, (_, i) => i);
    // Simple seeded shuffle using successive hashes
    for (let i = indices.length - 1; i > 0; i--) {
      const h = Logic.titleHash(today + i);
      const j = Math.floor(h * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices.slice(0, DAILY_TOPIC_COUNT).map(idx => {
      const topic = SHOP_TOPICS[idx];
      const priceHash = Logic.titleHash(topic + today + '_price');
      const price = Math.round(TOPIC_PACK_COST_MIN + priceHash * (TOPIC_PACK_COST_MAX - TOPIC_PACK_COST_MIN));
      return { topic, price };
    });
  },

  /** Increment a card's expandCount in-place and save. */
  incrementExpandCount(id) {
    const card = State.binder.find(c => c.id === id);
    if (card) { card.expandCount = (card.expandCount ?? 0) + 1; Storage.save(); }
  },

  deductCost(amount) { State.balance -= amount; Storage.save(); },

  /** Add cards to binder, stamp them with a fresh session ID, save. */
  addPack(cards) {
    const sid     = `sid_${Date.now()}`;
    const stamped = cards.map(c => ({ ...c, sessionId: sid }));
    State.binder.unshift(...stamped);
    State.sessionId = sid;
    Storage.save();

    // Notify if any new card matches an active quest or the daily quest
    const questTitles = new Set(State.activeQuests.map(q => q.title));
    if (State.dailyQuest && !Logic.dailyQuestCompletedToday()) {
      questTitles.add(State.dailyQuest.title);
    }
    stamped.forEach(c => {
      if (questTitles.has(c.title) && !Logic.questCompletedToday(c.title)) {
        setTimeout(() =>
          Render.toast(`Quest card found: "${c.title}" — open Quests to complete!`, 'success'),
          1500
        );
      }
    });

    return sid;
  },

  sellCard(id) {
    const card = State.binder.find(c => c.id === id);
    if (!card || card.locked) return 0;
    State.binder   = State.binder.filter(c => c.id !== id);
    State.balance += card.value;
    Storage.save();
    return card.value;
  },

  /** Sell all unlocked cards matching predicate. Returns { total, count }. */
  sellWhere(predicate) {
    const targets  = State.binder.filter(c => !c.locked && predicate(c));
    const total    = targets.reduce((s, c) => s + c.value, 0);
    State.binder   = State.binder.filter(c => !predicate(c));
    State.balance += total;
    Storage.save();
    return { total, count: targets.length };
  },

  removeCard(id) { State.binder = State.binder.filter(c => c.id !== id); Storage.save(); },

  // ── Quest helpers ───────────────────────────────────────────

  todayString() { return new Date().toISOString().slice(0, 10); },

  /** True if we need to fetch more quests (have fewer than 3 active). */
  questsNeedRefresh() { return State.activeQuests.length < 3; },

  /** True if today's daily quest needs fetching (missing or stale date). */
  dailyQuestNeedsRefresh() {
    return !State.dailyQuest || State.dailyQuest.date !== Logic.todayString();
  },

  /** True if today's daily quest is completed. Resets when date changes. */
  dailyQuestCompletedToday() {
    return State.dailyQuestCompleted && State.dailyQuest?.date === Logic.todayString();
  },

  /** Complete the daily quest. */
  completeDailyQuest() {
    State.questPoints++;
    State.balance += QUEST_REWARD_PER_POINT;
    State.dailyQuestCompleted = true;
    Storage.save();
    return QUEST_REWARD_PER_POINT;
  },

  /** True if player has a binder card matching this quest title. */
  playerHasQuest(title) { return State.binder.some(c => c.title === title); },

  /** True if this quest was already completed today. */
  questCompletedToday(title) { return State.completedTodayTitles.includes(title); },

  /**
   * Complete a quest: award quest point + $100, track today completion,
   * remove from activeQuests. Returns the reward amount.
   */
  completeQuest(title) {
    State.questPoints++;
    State.balance += QUEST_REWARD_PER_POINT;

    // Track for daily income (reset if it's a new day)
    const today = Logic.todayString();
    if (State.lastAwardDate !== today) State.completedTodayTitles = [];
    if (!State.completedTodayTitles.includes(title))
      State.completedTodayTitles.push(title);

    State.activeQuests = State.activeQuests.filter(q => q.title !== title);
    Storage.save();
    return QUEST_REWARD_PER_POINT;
  },

  /**
   * Award daily income on login: questPoints * $100.
   * Only once per day. Returns amount awarded (0 if already awarded today).
   */
  awardDailyIncome() {
    const today = Logic.todayString();
    if (State.lastAwardDate === today || State.questPoints === 0) return 0;
    const amount = State.questPoints * QUEST_REWARD_PER_POINT;
    State.balance      += amount;
    State.lastAwardDate = today;
    // Reset today's completed list and daily quest completion since it's a new day
    State.completedTodayTitles = [];
    State.dailyQuestCompleted  = false;
    Storage.save();
    return amount;
  },
};

// ============================================================
// #region RENDER — DOM construction; reads State, never mutates it
// ============================================================

const Render = {
  // ── Utilities ──────────────────────────────────────────────

  el(tag, cls, attrs = {}) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  },

  money(n) { return `$${n.toLocaleString()}`; },

  // ── Balance ─────────────────────────────────────────────────

  updateBalance() {
    const el = document.getElementById('balance-amount');
    el.textContent = State.balance.toLocaleString();
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
    this.refreshHeaderButtons();
    this.refreshExpandButtons();
  },

  updateQuestPoints() {
    const el = document.getElementById('quest-points-amount');
    if (!el) return;
    el.textContent = State.questPoints.toLocaleString();
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  },

  /**
   * Show a floating "+$X" label that rises from near the balance display and fades out.
   * anchorEl: the element to spawn near (defaults to balance display).
   */
  animateMoneyGain(amount, anchorEl) {
    const anchor = anchorEl ?? document.getElementById('balance-amount');
    const rect   = anchor.getBoundingClientRect();
    const el     = document.createElement('div');
    el.className = 'money-gain-float';
    el.textContent = `+${this.money(amount)}`;
    el.style.left = `${rect.left + rect.width / 2}px`;
    el.style.top  = `${rect.top}px`;
    el.style.transform = 'translateX(-50%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1900);
  },

  /** Update the header pack buttons: enabled state and expand button visibility. */
  refreshHeaderButtons() {
    // Shop button is always enabled — the modal shows what you can/can't afford
    // Expand buttons on cards are updated separately
    document.querySelectorAll('.shop-qty-btn').forEach(btn => {
      const cost = parseInt(btn.dataset.cost ?? '0');
      if (cost) btn.disabled = !Logic.canAfford(cost);
    });
  },
  /**
   * Walk all rendered expand buttons and update disabled state in-place.
   * Called after every balance change — avoids re-rendering the whole binder.
   * Each expand button carries data-expand-btn="{rarity}" set at build time.
   */
  refreshExpandButtons() {
    document.querySelectorAll('[data-expand-btn]').forEach(btn => {
      const cardId = btn.dataset.expandCardId;
      const card   = cardId ? State.binder.find(c => c.id === cardId) : null;
      if (!card) return;
      const cost    = Logic.expandCost(card);
      btn.disabled  = !Logic.canAffordExpand(card);
      btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> ${cost.toLocaleString()}`;
    });
  },

  // ── Card component ──────────────────────────────────────────

  /**
   * Build a .card DOM element from a CardData object.
   * Callbacks keep Render decoupled from App:
   *   onSell(id)      — called when Sell button clicked
   *   onExpand(data)  — called when Expand button clicked
   */
  card(data, { onSell, onExpand, onToggleLock, isNew = false } = {}) {
    const RARITY_ICONS = {
      common:    '<i class="fa-solid fa-circle"></i>',
      uncommon:  '<i class="fa-solid fa-diamond"></i>',
      rare:      '<i class="fa-solid fa-star"></i>',
      epic:      '<i class="fa-solid fa-bahai"></i>',
      legendary: '<i class="fa-solid fa-crown"></i>',
    };

    const isLocked = !!data.locked;
    const root = this.el('div', `card${isNew ? ' is-new' : ''}${isLocked ? ' is-locked' : ''}`);
    root.dataset.rarity = data.rarity;
    root.dataset.cardId = data.id;
    root.appendChild(this.el('div', 'card-border'));

    // Lock button — top-left (outside inner, so not clipped)
    const lockBtn = this.el('button', `card-lock-btn${isLocked ? ' is-locked' : ''}`);
    lockBtn.innerHTML   = `<i class="fa-solid fa-${isLocked ? 'lock' : 'lock-open'}"></i>`;
    lockBtn.dataset.tip = isLocked ? 'Unlock card' : 'Lock card';
    lockBtn.title       = lockBtn.dataset.tip;
    lockBtn.addEventListener('click', e => { e.stopPropagation(); onToggleLock?.(data.id); });
    root.appendChild(lockBtn);

    // Rarity icon — top-right (outside inner, so not clipped)
    const rarityIcon = this.el('div', 'card-rarity-icon');
    rarityIcon.innerHTML = RARITY_ICONS[data.rarity] ?? RARITY_ICONS.common;
    rarityIcon.title = RARITY_TIERS.find(t => t.id === data.rarity).label;
    root.appendChild(rarityIcon);

    // Inner clip wrapper — contains image + body + footer
    const inner = this.el('div', 'card-inner');

    // Image area — fills space above title
    if (data.thumb) {
      // Has image: wrap in .card-image-area, overlay desc on click
      const area = this.el('div', 'card-image-area');

      const img = this.el('img', 'card-img', { src: data.thumb, alt: data.title, loading: 'lazy' });
      img.onerror = () => {
        // Image failed — swap to text placeholder
        area.replaceWith(this._placeholder(data.desc));
      };
      area.appendChild(img);

      if (data.desc) {
        const overlay = this.el('div', 'card-desc-overlay');
        overlay.textContent = data.desc;
        area.appendChild(overlay);

        area.addEventListener('click', e => {
          e.stopPropagation();
          area.classList.toggle('showing-desc');
        });
      }

      inner.appendChild(area);
    } else {
      // No image — show desc as text directly
      inner.appendChild(this._placeholder(data.desc));
    }

    // Body
    const body = this.el('div', 'card-body');

    const titleEl = this.el('div', 'card-title');
    titleEl.textContent = data.title;
    body.appendChild(titleEl);

    inner.appendChild(body);

    // Footer — icon-only buttons
    if (onSell || onExpand) {
      const footer = this.el('div', 'card-footer');

      if (onSell) {
        const btn = this.el('button', 'card-btn card-btn-sell');
        btn.innerHTML   = `<i class="fa-solid fa-hand-holding-dollar"></i> ${data.value.toLocaleString()}`;
        btn.dataset.tip = isLocked ? 'Unlock to sell' : 'Sell this card';
        btn.disabled    = isLocked;
        btn.addEventListener('click', e => { e.stopPropagation(); onSell(data.id); });
        footer.appendChild(btn);
      }

      if (onExpand) {
        const cost = Logic.expandCost(data);
        const btn  = this.el('button', 'card-btn card-btn-expand');
        btn.innerHTML             = `<i class="fa-solid fa-wand-magic-sparkles"></i> ${cost.toLocaleString()}`;
        btn.dataset.tip           = isLocked ? 'Unlock to expand' : `Expand into pack${(data.expandCount ?? 0) > 0 ? ` (expanded ${data.expandCount}×)` : ''}`;
        btn.disabled              = isLocked || !Logic.canAffordExpand(data);
        btn.dataset.expandBtn     = data.rarity;
        btn.dataset.expandTitle   = data.title;
        btn.dataset.expandCardId  = data.id;
        btn.addEventListener('click', e => { e.stopPropagation(); onExpand(data); });
        footer.appendChild(btn);
      }

      // Wikipedia link — always shown
      const wikiBtn = this.el('button', 'card-btn card-btn-wiki');
      wikiBtn.innerHTML   = '<i class="fa-brands fa-wikipedia-w"></i>';
      wikiBtn.dataset.tip = 'Open on Wikipedia';
      wikiBtn.addEventListener('click', e => {
        e.stopPropagation();
        window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(data.title)}`, '_blank');
      });
      footer.appendChild(wikiBtn);

      inner.appendChild(footer);
    }

    root.appendChild(inner);
    return root;
  },

  _placeholder(desc) {
    const ph = this.el('div', 'card-img-placeholder');
    if (desc) {
      ph.classList.add('has-desc');
      ph.textContent = desc;
    } else {
      ph.innerHTML = '<i class="fa-solid fa-globe"></i>';
    }
    return ph;
  },

  animateCardIn(el, delayMs) {
    el.classList.add('animating');
    setTimeout(() => { el.classList.remove('animating'); el.classList.add('dropped'); }, delayMs);
  },

  animateCardOut(el, onDone) {
    el.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
    el.style.opacity    = '0';
    el.style.transform  = 'scale(0.82)';
    setTimeout(() => { el.remove(); onDone?.(); }, 300);
  },

  // ── Card preloading ──────────────────────────────────────────

  /**
   * Pre-render card DOM nodes and decode all thumbnail images in parallel.
   * Called while the progress bar is still visible so everything is ready
   * before the reveal sequence begins. Returns a map of cardId → Element.
   */
  async preloadCards(cards) {
    // Build all card elements now (synchronous — just DOM construction)
    this._revealCache = new Map();
    for (const data of cards) {
      const el = this.card(data);
      el.querySelector('.card-footer')?.remove();
      el.style.width = el.style.height = '100%';
      this._revealCache.set(data.id, el);
    }

    // Decode all thumbnails in parallel — browser fetches & decodes them
    // before any card is shown, so flips are instant
    const imageJobs = cards
      .filter(c => c.thumb)
      .map(c => {
        const img = new Image();
        img.src = c.thumb;
        return img.decode().catch(() => {}); // ignore failures (no thumb = no problem)
      });

    await Promise.all(imageJobs);
  },

  // ── Card reveal sequence ─────────────────────────────────────

  /**
   * Show cards one by one with a flip animation and a 3s auto-advance timer.
   * Clicking anywhere skips to the next card immediately.
   * Returns a Promise that resolves when all cards have been shown.
   */
  runReveal(cards) {
    return new Promise(resolve => {
      const CARD_DURATION_MS = 3000;
      let index      = 0;
      let timer      = null;
      let advancing  = false;

      const flipInner  = document.getElementById('reveal-flip-inner');
      const frontFace  = document.getElementById('reveal-face-front');
      const counterEl  = document.getElementById('reveal-counter');
      const timerFill  = document.getElementById('reveal-timer-fill');

      const advance = () => {
        if (advancing) return;
        advancing = true;
        clearTimeout(timer);

        index++;
        if (index >= cards.length) {
          // All done — clear cached elements from DOM so they don't interfere with binder queries
          document.getElementById('view-reveal').removeEventListener('click', advance);
          frontFace.innerHTML = '';
          this._revealCache = null;
          resolve();
          return;
        }
        // Reset flip to back, then show next card
        flipInner.classList.remove('flipped');
        // Wait for flip-back to complete before loading next card
        setTimeout(() => { showCard(index); advancing = false; }, 300);
      };

      const showCard = (i) => {
        const data = cards[i];
        counterEl.innerHTML = `Card <strong>${i + 1}</strong> of ${cards.length}`;

        // Populate front face from pre-rendered cache — instant, no reflow
        frontFace.innerHTML = '';
        const cached = this._revealCache?.get(data.id);
        if (cached) {
          frontFace.dataset.rarity = data.rarity;
          frontFace.appendChild(cached);
        } else {
          // Fallback: build on the fly if cache missed
          frontFace.dataset.rarity = data.rarity;
          const cardEl = this.card(data);
          cardEl.querySelector('.card-footer')?.remove();
          cardEl.style.width = cardEl.style.height = '100%';
          frontFace.appendChild(cardEl);
        }

        // Reset and restart timer bar
        timerFill.style.transition = 'none';
        timerFill.style.transform  = 'scaleX(1)';

        // Flip to front after a short back-face pause
        requestAnimationFrame(() => {
          setTimeout(() => {
            flipInner.classList.add('flipped');

            // Start draining timer bar
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                timerFill.style.transition = `transform ${CARD_DURATION_MS}ms linear`;
                timerFill.style.transform  = 'scaleX(0)';
              });
            });

            timer = setTimeout(advance, CARD_DURATION_MS);
          }, 120);
        });
      };

      App._activateView('reveal');
      document.getElementById('view-reveal').addEventListener('click', advance);
      showCard(0);
    });
  },

  // ── Pack opening animation ───────────────────────────────────

  setOpeningProgress(label, sub, pct) {

  // ── Binder ───────────────────────────────────────────────────

  renderBinder() {
    const container = document.getElementById('binder-grid');
    const sortKey   = document.getElementById('binder-sort').value;
    const isList    = App._binderView === 'list';
    container.innerHTML = '';
    container.className = isList ? 'binder-list' : 'binder-grid';

    document.getElementById('binder-count').textContent =
      `${State.binder.length} card${State.binder.length !== 1 ? 's' : ''}`;

    this._renderLatestBanner();

    if (State.binder.length === 0) {
      const empty = this.el('div', 'binder-empty');
      empty.innerHTML = 'Your binder is empty.<br><em>Open some packs to get started.</em>';
      container.appendChild(empty);
      return;
    }

    const sorted    = Logic.sortedBinder(sortKey);
    const latestSid = State.sessionId;
    const render    = (c, isNew = false) => isList
      ? this.cardListRow(c, { onSell: App.onSellCard, onExpand: App.onExpandCard, onToggleLock: App.onToggleLock })
      : this.card(c, { onSell: App.onSellCard, onExpand: App.onExpandCard, onToggleLock: App.onToggleLock, isNew });

    if (sortKey === 'acquired' && latestSid) {
      const newCards = sorted.filter(c => c.sessionId === latestSid);
      const oldCards = sorted.filter(c => c.sessionId !== latestSid);

      if (newCards.length) {
        const lbl = this.el('div', 'binder-section-label');
        lbl.textContent = `Latest Pack — ${newCards.length} new cards`;
        container.appendChild(lbl);
        newCards.forEach((c, i) => {
          const el = render(c, true);
          if (!isList) this.animateCardIn(el, i * 55);
          container.appendChild(el);
        });
      }

      if (oldCards.length) {
        const lbl = this.el('div', 'binder-section-label');
        lbl.textContent = 'Collection';
        lbl.style.marginTop = '16px';
        container.appendChild(lbl);
        oldCards.forEach(c => container.appendChild(render(c)));
      }
    } else {
      sorted.forEach(c => container.appendChild(render(c, c.sessionId === latestSid)));
    }
  },

  // ── Card list row (list view) ─────────────────────────────────

  cardListRow(data, { onSell, onExpand, onToggleLock } = {}) {
    const RARITY_ICONS = { common: 'fa-circle', uncommon: 'fa-diamond', rare: 'fa-star', epic: 'fa-bahai', legendary: 'fa-crown' };
    const isLocked = !!data.locked;

    const row = this.el('div', `card-list-row${isLocked ? ' is-locked' : ''}`);
    row.dataset.rarity = data.rarity;
    row.dataset.cardId = data.id;

    // Thumbnail
    if (data.thumb) {
      const img = this.el('img', 'card-list-thumb', { src: data.thumb, alt: data.title, loading: 'lazy' });
      img.onerror = () => img.replaceWith(this._listPlaceholder());
      row.appendChild(img);
    } else {
      row.appendChild(this._listPlaceholder());
    }

    // Rarity icon
    const icon = this.el('div', 'card-list-rarity-icon');
    icon.innerHTML = `<i class="fa-solid ${RARITY_ICONS[data.rarity] ?? 'fa-circle'}"></i>`;
    row.appendChild(icon);

    // Info
    const info = this.el('div', 'card-list-info');
    const title = this.el('div', 'card-list-title');
    title.textContent = data.title;
    const desc = this.el('div', 'card-list-desc');
    desc.textContent = data.desc;
    info.append(title, desc);
    row.appendChild(info);

    // Actions
    const actions = this.el('div', 'card-list-actions');

    const lockBtn = this.el('button', `card-list-btn card-list-btn-lock${isLocked ? ' is-locked' : ''}`);
    lockBtn.innerHTML  = `<i class="fa-solid fa-${isLocked ? 'lock' : 'lock-open'}"></i>`;
    lockBtn.dataset.tip = isLocked ? 'Unlock' : 'Lock';
    lockBtn.addEventListener('click', e => { e.stopPropagation(); onToggleLock?.(data.id); });
    actions.appendChild(lockBtn);

    if (onSell) {
      const btn = this.el('button', 'card-list-btn card-list-btn-sell');
      btn.innerHTML   = `<i class="fa-solid fa-hand-holding-dollar"></i> ${data.value.toLocaleString()}`;
      btn.dataset.tip = isLocked ? 'Unlock to sell' : 'Sell this card';
      btn.disabled    = isLocked;
      btn.addEventListener('click', e => { e.stopPropagation(); onSell(data.id); });
      actions.appendChild(btn);
    }

    if (onExpand) {
      const cost = Logic.expandCost(data);
      const btn  = this.el('button', 'card-list-btn card-list-btn-expand');
      btn.innerHTML           = `<i class="fa-solid fa-wand-magic-sparkles"></i> ${cost.toLocaleString()}`;
      btn.dataset.tip         = isLocked ? 'Unlock to expand' : `Expand into pack`;
      btn.disabled            = isLocked || !Logic.canAffordExpand(data);
      btn.dataset.expandBtn   = data.rarity;
      btn.dataset.expandTitle = data.title;
      btn.dataset.expandCardId = data.id;
      btn.addEventListener('click', e => { e.stopPropagation(); onExpand(data); });
      actions.appendChild(btn);
    }

    const wikiBtn = this.el('button', 'card-list-btn card-list-btn-wiki');
    wikiBtn.innerHTML   = '<i class="fa-brands fa-wikipedia-w"></i>';
    wikiBtn.dataset.tip = 'Open on Wikipedia';
    wikiBtn.addEventListener('click', e => {
      e.stopPropagation();
      window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(data.title)}`, '_blank');
    });
    actions.appendChild(wikiBtn);

    row.appendChild(actions);
    return row;
  },

  _listPlaceholder() {
    const ph = this.el('div', 'card-list-thumb-placeholder');
    ph.innerHTML = '<i class="fa-solid fa-globe"></i>';
    return ph;
  },

  _renderLatestBanner() {
    const banner  = document.getElementById('latest-banner');
    const actions = document.getElementById('banner-actions');
    actions.innerHTML = '';

    const latest = Logic.latestPackCards();
    if (!latest.length) { banner.style.display = 'none'; return; }

    const total = latest.reduce((s, c) => s + c.value, 0);
    banner.style.display = '';
    document.getElementById('banner-label').textContent = 'Latest Pack';
    document.getElementById('banner-sub').textContent   = `${latest.length} cards added · sell value: ${this.money(total)}`;

    const sellBtn = this.el('button', 'btn btn-danger btn-sm');
    sellBtn.innerHTML = `<i class="fa-solid fa-hand-holding-dollar"></i> Sell All (${this.money(total)})`;
    sellBtn.addEventListener('click', () => App.onSellLatestPack());

    const keepBtn = this.el('button', 'btn btn-secondary btn-sm');
    keepBtn.innerHTML = `<i class="fa-solid fa-box-archive"></i> Keep All`;
    keepBtn.addEventListener('click', () => App.onDismissLatestBanner());

    actions.append(sellBtn, keepBtn);
  },

  toast(msg, type = '') {

  // ── Modal ────────────────────────────────────────────────────

  confirm(title, body, { onConfirm, confirmLabel = 'Confirm', extraEl = null } = {}) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent  = body;

    const extra = document.getElementById('modal-extra');
    extra.innerHTML = '';
    if (extraEl) extra.appendChild(extraEl);

    document.getElementById('modal-overlay').classList.add('active');
    const close = () => document.getElementById('modal-overlay').classList.remove('active');

    // Clone buttons to drop old listeners
    ['modal-confirm', 'modal-cancel'].forEach(id => {
      const old = document.getElementById(id);
      const nu  = old.cloneNode(true);
      old.replaceWith(nu);
    });

    const confirmBtn = document.getElementById('modal-confirm');
    const cancelBtn  = document.getElementById('modal-cancel');
    confirmBtn.textContent   = confirmLabel;
    confirmBtn.style.display = onConfirm ? '' : 'none';
    confirmBtn.addEventListener('click', () => { close(); onConfirm?.(); });
    cancelBtn.addEventListener('click', close);
  },

  /** Shared builder for both showQuests and _refreshQuestModal. */
  _buildQuestModalContent(container) {
    container.innerHTML = '';

    // Points header
    const ph = this.el('div', 'quest-points-header');
    ph.innerHTML = `<i class="fa-solid fa-award"></i> <span><strong>${State.questPoints}</strong> quest${State.questPoints !== 1 ? 's' : ''} completed</span>`;

    // Daily quest section
    const dailyLabel = this.el('div', 'quest-section-label quest-section-label-daily');
    dailyLabel.innerHTML = `<i class="fa-solid fa-sun"></i> Today's Quest`;
    container.appendChild(dailyLabel);

    if (!State.dailyQuest || Logic.dailyQuestNeedsRefresh()) {
      const loading = this.el('div', 'quest-loading');
      loading.textContent = 'Loading daily quest…';
      container.appendChild(loading);
    } else {
      container.appendChild(this._questRow(State.dailyQuest, true));

    // Permanent quests section
    const permLabel = this.el('div', 'quest-section-label');
    permLabel.innerHTML = `<i class="fa-solid fa-book-bookmark"></i> Collection Quests`;
    permLabel.style.margin = '14px 0 8px';

      const loading = this.el('div', 'quest-loading');
      loading.textContent = 'Loading quests…';
      container.appendChild(loading);
    } else {
      State.activeQuests.forEach(q => container.appendChild(this._questRow(q, false)));
    }
  },

  /** Build a single quest row element. isDaily = true for the daily quest. */
  _questRow(quest, isDaily = false) {
    const completedToday = isDaily
      ? Logic.dailyQuestCompletedToday()
      : Logic.questCompletedToday(quest.title);
    const hasCard = Logic.playerHasQuest(quest.title);

    const row = this.el('div', `quest-row${completedToday ? ' completed-today' : ''}`);

    // Thumb
    if (quest.thumb) {
      const img = this.el('img', 'quest-thumb', { src: quest.thumb, alt: quest.title, loading: 'lazy' });
      img.onerror = () => img.replaceWith(this._questThumbPlaceholder());
      row.appendChild(img);
    } else {
      row.appendChild(this._questThumbPlaceholder());
    }

    // Info
    const info = this.el('div', 'quest-info');
    const titleRow = this.el('div', 'quest-title');
    titleRow.textContent = quest.title;
    const sub = this.el('div', 'quest-sub');
    sub.textContent = completedToday ? 'Completed today · +$100 awarded'
                    : hasCard        ? 'You have this card!'
                                     : 'Find this article as a card';
    info.append(titleRow, sub);
    row.appendChild(info);

    // Actions
    const actions = this.el('div', 'quest-actions');

    // Wikipedia button
    const wikiBtn = this.el('button', 'quest-wiki-btn');
    wikiBtn.innerHTML = '<i class="fa-brands fa-wikipedia-w"></i>';
    wikiBtn.title     = 'Open on Wikipedia';
    wikiBtn.addEventListener('click', () =>
      window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(quest.title)}`, '_blank')
    );
    actions.appendChild(wikiBtn);

    // Complete / status
    if (completedToday) {
      const lbl = this.el('span', 'quest-completed-label');
      lbl.textContent = 'Done ✓';
      actions.appendChild(lbl);
    } else if (hasCard) {
      const btn = this.el('button', 'quest-complete-btn');
      btn.innerHTML = '<i class="fa-solid fa-award"></i> Complete';
      btn.addEventListener('click', () =>
        isDaily ? App.onCompleteDailyQuest() : App.onCompleteQuest(quest.title)
      );
      actions.appendChild(btn);
    } else {
      const lbl = this.el('span', 'quest-not-found-label');
      lbl.textContent = 'Not found';
      actions.appendChild(lbl);
    }

    row.appendChild(actions);
    return row;
  },

  _questThumbPlaceholder() {
    const ph = this.el('div', 'quest-thumb-placeholder');
    ph.innerHTML = '<i class="fa-solid fa-scroll"></i>';
    return ph;
  },

  /** Refresh quest modal content in-place. */
  _refreshQuestModal() {
    const extra = document.getElementById('modal-extra');
    if (!extra || !extra.closest('#modal-overlay')) return;
    this._buildQuestModalContent(extra);
  },

  // ── Shop modal ───────────────────────────────────────────────

  showShop() {
    const extra = document.createElement('div');
    const topics = Logic.dailyTopics();

    const makePack = ({ icon, iconClass, name, desc, priceEach, badge, isTopic, topicTitle }) => {
      const opt = this.el('div', `shop-pack-option${isTopic ? ' topic-pack' : ''}`);

      // Header
      const hdr = this.el('div', 'shop-pack-header');
      const ico = this.el('div', `shop-pack-icon ${iconClass}`);
      ico.innerHTML = icon;
      const info = this.el('div', 'shop-pack-info');
      const nameEl = this.el('div', 'shop-pack-name');
      nameEl.textContent = name;
      const descEl = this.el('div', 'shop-pack-desc');
      descEl.textContent = desc;
      info.append(nameEl, descEl);
      hdr.append(ico, info);
      if (badge) {
        const b = this.el('div', 'shop-pack-daily-badge');
        b.textContent = badge;
        hdr.appendChild(b);
      }
      opt.appendChild(hdr);

      // Qty buttons
      const qtyRow = this.el('div', 'shop-qty-row');
      const lbl = this.el('span', 'shop-qty-label');
      lbl.textContent = `${this.money(priceEach)} ea.`;
      qtyRow.appendChild(lbl);

      [1, 5, 10].forEach(qty => {
        const total = priceEach * qty;
        const btn = this.el('button', 'shop-qty-btn');
        btn.innerHTML = `<span class="qty-num">×${qty}</span> ${this.money(total)}`;
        btn.disabled  = !Logic.canAfford(total);
        btn.addEventListener('click', () => {
          document.getElementById('modal-overlay').classList.remove('active');
          App.enqueuePacks(qty, topicTitle ?? null);
        });
        qtyRow.appendChild(btn);
      });
      opt.appendChild(qtyRow);
      return opt;
    };

    // Random pack
    extra.appendChild(makePack({
      icon: '<i class="fa-solid fa-shuffle"></i>', iconClass: 'random',
      name: 'Random Pack', desc: `${PACK_SIZE} completely random Wikipedia articles.`,
      priceEach: PACK_COST, isTopic: false,
    }));

    // Daily topic packs
    topics.forEach(({ topic, price }) => {
      extra.appendChild(makePack({
        icon: '<i class="fa-solid fa-book-open"></i>', iconClass: 'topic',
        name: `${topic} Pack`, desc: `Articles linked from the "${topic}" Wikipedia page.`,
        priceEach: price, badge: 'Daily', isTopic: true, topicTitle: topic,
      }));
    });

    // Reset countdown
    const resetInfo = this.el('div', 'shop-reset-info');
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const diffMs  = midnight - now;
    const hrs     = Math.floor(diffMs / 3600000);
    const mins    = Math.floor((diffMs % 3600000) / 60000);
    resetInfo.textContent = `Daily packs refresh in ${hrs}h ${mins}m`;
    extra.appendChild(resetInfo);

    this.confirm('Pack Shop', '', { onConfirm: null, extraEl: extra });
    setTimeout(() => {
      const p = document.querySelector('#modal-overlay .modal p');
      if (p) p.style.display = 'none';
      const modal = document.querySelector('#modal-overlay .modal');
      if (modal) modal.style.maxWidth = '500px';
    }, 0);
  },
