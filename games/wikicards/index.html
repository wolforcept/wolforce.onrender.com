            <div class="help-annotation"><div class="help-annotation-icon" style="background:#0e1f3a;color:var(--rare)"><i class="fa-solid fa-star"></i></div><span><strong style="color:var(--rare)">Rare</strong> — famous scientists, major historical events.</span></div>
            <div class="help-annotation"><div class="help-annotation-icon" style="background:#1e0e30;color:var(--epic)"><i class="fa-solid fa-bahai"></i></div><span><strong style="color:var(--epic)">Epic</strong> — high-traffic topics. Valuable and cheap to expand.</span></div>
            <div class="help-annotation"><div class="help-annotation-icon" style="background:#2a0e04;color:var(--legendary)"><i class="fa-solid fa-crown"></i></div><span><strong style="color:var(--legendary)">Legendary</strong> — most-read articles on Wikipedia. Worth thousands, nearly free to expand.</span></div>
          </div>`,
      },
      {
        icon: 'fa-cart-shopping', label: 'The Shop',
        html: `
          <p style="margin-bottom:10px">Tap the <strong style="color:var(--text)"><i class="fa-solid fa-cart-shopping"></i> cart button</strong> in the top-right to open the shop.
          You can buy packs in quantities of ×1, ×5, or ×10 — multiple packs open one after another.</p>
          <p style="margin-bottom:10px"><strong style="color:var(--text)">Random Packs</strong> ($${PACK_COST} each) give 7 completely random Wikipedia articles.</p>
          <p><strong style="color:var(--gold)">Daily Topic Packs</strong> are three themed packs that rotate every day at midnight.
          Each draws from articles linked by a broad topic like <em>Science</em> or <em>Music</em> — similar to expanding a card,
          but without needing one in your collection. They cost more ($200–$500) but give focused, thematically related cards.</p>`,
      },
      {
        icon: 'fa-wand-magic-sparkles', label: 'The art of Expanding',
        html: `
          <p style="margin-bottom:10px">Expanding is the most powerful mechanic. When you expand a card, the new pack draws from
          articles <strong style="color:var(--text)">directly linked</strong> in that Wikipedia article — always thematically related.</p>
          <p style="margin-bottom:10px">You can <strong style="color:var(--text)">navigate toward a specific card</strong>.
          Looking for <em>Marie Curie</em>? Expand <em>Physics</em> → <em>Nobel Prize</em> → <em>Radioactivity</em> — each hop gets closer.</p>
          <p>Expanding the same card again costs more each time. Rarer cards cost <strong style="color:var(--gold)">less</strong> to expand —
          a Legendary like <em>Science</em> is a cheap gateway to thousands of topics.</p>`,
      },
      {
        icon: 'fa-award', label: 'Quests',
        html: `
          <p style="margin-bottom:10px">Open <strong style="color:var(--text)">Quests <i class="fa-solid fa-scroll"></i></strong> from the header.
          Each quest asks you to collect a specific Wikipedia article as a card.</p>
          <p style="margin-bottom:10px"><strong style="color:var(--text)">Collection Quests</strong> are permanent — find the card, hit Complete, and a new quest replaces it.
          The <strong style="color:#2ab5a0">Daily Quest <span style="font-size:0.7rem;border:1px solid #2ab5a0;border-radius:3px;padding:1px 5px">Daily</span></strong>
          is the most-viewed Wikipedia article of yesterday — the same for every player. It resets each day.</p>
          <p>Completing a quest earns <strong style="color:var(--gold)">$100</strong> and
          <strong style="color:#2ab5a0">1 Quest Point <i class="fa-solid fa-award"></i></strong>.
          Each day you open the game you earn <strong style="color:var(--gold)">$100 × your Quest Points</strong> automatically.</p>`,
      },
    ];

    const extra = document.createElement('div');

    // Intro (always visible, not in accordion)
    const intro = this.el('div', 'help-game-intro');
    intro.innerHTML = `<strong style="color:var(--text)">WikiCards</strong> is a Wikipedia-powered card collecting game.
      Open packs, collect articles, expand into related topics, and complete quests.`;
    extra.appendChild(intro);

    // Accordion
    const accordion = this.el('div', 'help-accordion');

    const openSection = (targetHeader, targetBody) => {
      // Close all others
      accordion.querySelectorAll('.help-acc-header.open').forEach(h => {
        if (h !== targetHeader) {
          h.classList.remove('open');
          h.nextElementSibling.classList.remove('open');
        }
      });
      // Toggle this one
      const isOpen = targetHeader.classList.toggle('open');
      targetBody.classList.toggle('open', isOpen);
    };

    sections.forEach((s, i) => {
      const section = this.el('div', 'help-acc-section');

      const header = this.el('div', 'help-acc-header');
      header.innerHTML = `
        <div class="help-acc-label"><i class="fa-solid ${s.icon}"></i> ${s.label}</div>
        <i class="fa-solid fa-chevron-down help-acc-chevron"></i>
      `;

      const body = this.el('div', 'help-acc-body');
      body.innerHTML = s.html;

      header.addEventListener('click', () => openSection(header, body));

      section.appendChild(header);
      section.appendChild(body);
      accordion.appendChild(section);

      // Open the first section by default
      if (i === 0) { header.classList.add('open'); body.classList.add('open'); }
    });

    extra.appendChild(accordion);

    this.confirm('How to Play', '', { onConfirm: null, extraEl: extra });
    setTimeout(() => {
      const p = document.querySelector('#modal-overlay .modal p');
      if (p) p.style.display = 'none';
      const modal = document.querySelector('#modal-overlay .modal');
      if (modal) modal.style.maxWidth = '580px';
    }, 0);
  },

};

// #endregion

// ============================================================
// #region APP — orchestration, view transitions, event wiring
// ============================================================

const App = {
  _binderView: 'grid', // 'grid' | 'list'
  _packQueue:  [],     // pending packs to open: { topicTitle: string|null }
  _queueRunning: false,
  // ── Init ─────────────────────────────────────────────────────

  async init() {
    Storage.load();
    App._wireHeaderButtons();
    App._wireBinder();
    Render.updateBalance();
    Render.updateQuestPoints();

    // Award daily income if it's a new day
    const dailyAmount = Logic.awardDailyIncome();
    if (dailyAmount > 0) {
      // Small delay so UI is ready
      setTimeout(() => {
        Render.updateBalance();
        Render.animateMoneyGain(dailyAmount);
        Render.toast(`Daily income: +${Render.money(dailyAmount)} (${State.questPoints} quest pts)`, 'success');
      }, 800);
    }

    if (State.firstTime) {
      State.firstTime = false;
      Storage.save();
      await App._openPack({ isStarter: true });
    } else {
      App._activateView('binder');
    }

    // Init quests in background (non-blocking)
    App._ensureQuests();
    App._ensureDailyQuest();
  },

  // ── Navigation ───────────────────────────────────────────────

  _wireHeaderButtons() {
    document.getElementById('btn-random-pack')
      .addEventListener('click', () => Render.showShop());
    document.getElementById('btn-settings')
      .addEventListener('click', () => Render.showSettings());
    document.getElementById('btn-help')
      .addEventListener('click', () => Render.showHelp());
    document.getElementById('btn-quests')
      .addEventListener('click', () => App.onShowQuests());
  },

  // ── Quest methods ─────────────────────────────────────────────

  async onShowQuests() {
    Render.showQuests();
    const needsWork = Logic.questsNeedRefresh() || Logic.dailyQuestNeedsRefresh();
    if (needsWork) await Promise.all([App._ensureQuests(), App._ensureDailyQuest()]);
  },

  /**
   * Fetch enough quest articles to fill 3 active slots.
   */
  async _ensureQuests() {
    if (!Logic.questsNeedRefresh()) return;

    const needed   = 3 - State.activeQuests.length;
    const excluded = new Set([
      ...State.activeQuests.map(q => q.title),
      ...State.completedTodayTitles,
    ]);

    const topArticles = await Api.fetchTopArticles();
    const candidates  = topArticles.filter(t => !excluded.has(t));
    const picks       = Logic.pickRandom(candidates, needed * 3).slice(0, needed * 3);

    const pages = picks.length > 0
      ? await Api.fetchCardData(picks.slice(0, Math.min(picks.length, needed + 5)))
      : [];

    const newQuests = pages
      .filter(p => p.pageid && !p.missing && !Api.isDisambiguation(p))
      .slice(0, needed)
      .map(p => ({ title: p.title, thumb: p.thumbnail?.source ?? null }));

    State.activeQuests.push(...newQuests);
    Storage.save();
    Render._refreshQuestModal();
  },

  /** Fetch or validate the daily quest (top article from yesterday). */
  async _ensureDailyQuest() {
    if (!Logic.dailyQuestNeedsRefresh()) return;
    const result = await Api.fetchDailyQuest();
    if (result) {
      State.dailyQuest = { ...result, date: Logic.todayString() };
      // Reset completion if it's a new day (awardDailyIncome handles this too, but be safe)
      if (State.dailyQuestCompleted && State.dailyQuest.date !== Logic.todayString()) {
        State.dailyQuestCompleted = false;
      }
      Storage.save();
    }
    Render._refreshQuestModal();
  },

  /** Complete a permanent quest: award points + money, fetch replacement, animate. */
  async onCompleteQuest(title) {
    const reward = Logic.completeQuest(title);
    Render.updateBalance();
    Render.updateQuestPoints();
    Render.animateMoneyGain(reward);
    Render.toast(`Quest complete! +${State.questPoints} quest pt · +${Render.money(reward)}`, 'success');
    Render._refreshQuestModal();
    await App._ensureQuests();
  },

  /** Complete the daily quest. */
  async onCompleteDailyQuest() {
    const reward = Logic.completeDailyQuest();
    Render.updateBalance();
    Render.updateQuestPoints();
    Render.animateMoneyGain(reward);
    Render.toast(`Daily quest complete! +${State.questPoints} quest pt · +${Render.money(reward)}`, 'success');
    Render._refreshQuestModal();
  },

  /** Add qty packs to the queue and start draining if not already running. */
  enqueuePacks(qty, topicTitle = null) {
    for (let i = 0; i < qty; i++) App._packQueue.push({ topicTitle });
    App._drainQueue();
  },

  async _drainQueue() {
    if (App._queueRunning || App._packQueue.length === 0) return;
    App._queueRunning = true;
    while (App._packQueue.length > 0) {
      const { topicTitle } = App._packQueue.shift();
      await App._openPack({
        expandFrom: topicTitle ? { title: topicTitle } : null,
        isPrepaid: true,
      });
    }
    App._queueRunning = false;
  },

  _activateView(viewId) {
    document.querySelectorAll('.view').forEach(v =>
      v.classList.toggle('active', v.id === `view-${viewId}`)
    );
    if (viewId === 'binder') Render.renderBinder();
  },

  _wireBinder() {
    document.getElementById('binder-sort').addEventListener('change', () => Render.renderBinder());
    document.getElementById('btn-view-toggle').addEventListener('click', () => {
      App._binderView = App._binderView === 'list' ? 'grid' : 'list';
      const btn = document.getElementById('btn-view-toggle');
      btn.innerHTML = App._binderView === 'list'
        ? '<i class="fa-solid fa-grip"></i>'
        : '<i class="fa-solid fa-list"></i>';
      btn.classList.toggle('active', App._binderView === 'list');
      Render.renderBinder();
    });
  },

  // ── Pack opening pipeline ─────────────────────────────────────

  async onExpandCard(cardData) {
    if (!Logic.canAffordExpand(cardData)) { Render.toast('Not enough money to expand.', 'error'); return; }
    await App._openPack({ expandFrom: cardData });
  },

  /**
   * Full pack-opening pipeline:
   *   1. Deduct cost & show opening animation view
   *   2. Fetch titles (random or from card links)
   *   3. Batch-fetch card data + all pageviews in parallel (Promise.all)
   *   4. Build CardData objects
   *   5. Commit to binder under a new sessionId
   *   6. Navigate to binder — new cards appear at top, highlighted
   */
  async _openPack({ isStarter = false, expandFrom = null, isPrepaid = false } = {}) {
    if (!isStarter && !isPrepaid) {
      const cost = expandFrom ? Logic.expandCost(expandFrom) : PACK_COST;
      if (State.balance < cost) { Render.toast('Not enough money.', 'error'); return; }
      Logic.deductCost(cost);
    }
    Render.updateBalance();
    App._activateView('opening');

    const label = isStarter  ? 'Opening your starter pack…'
                : expandFrom ? `Opening "${expandFrom.title}" pack…`
                             : 'Opening random pack…';
    Render.setOpeningProgress(label, 'Selecting articles…', 0);

    const titles = expandFrom
      ? Logic.pickRandom(await Api.fetchLinksFrom(expandFrom.title), PACK_SIZE)
      : await Api.fetchRandomTitles(PACK_SIZE);

    Render.setOpeningProgress(label, 'Fetching articles & calculating rarities…', 25);

    // Fetch cards, filtering out disambiguation pages and replacing them until
    // we have exactly PACK_SIZE valid cards.
    let validPages = [];
    let candidateTitles = [...titles];
    let attempts = 0;
    const MAX_ATTEMPTS = 4; // safety cap on refetch rounds

    while (validPages.length < PACK_SIZE && attempts < MAX_ATTEMPTS) {
      const [pages, ...viewCounts] = await Promise.all([
        Api.fetchCardData(candidateTitles),
        ...candidateTitles.map(t => Api.fetchPageViews(t)),
      ]);

      // Attach view counts to pages for later use
      pages.forEach((p, i) => { p._views = viewCounts[i] ?? 0; });

      const good = pages.filter(p => p.pageid && !p.missing && !Api.isDisambiguation(p));
      validPages.push(...good);

      const needed = PACK_SIZE - validPages.length;
      if (needed <= 0) break;

      // Fetch replacement titles — random if original was random, more links if expanding
      candidateTitles = expandFrom
        ? Logic.pickRandom(await Api.fetchLinksFrom(expandFrom.title), needed * 2).slice(0, needed)
        : await Api.fetchRandomTitles(needed + 2); // fetch a couple extra as buffer

      attempts++;
    }

    validPages = validPages.slice(0, PACK_SIZE);

    Render.setOpeningProgress(label, 'Building cards…', 90);

    const tempSid = `tmp_${Date.now()}`;
    const cards   = validPages.map(p => Logic.buildCard(p, p._views ?? 0, tempSid));

    if (expandFrom?.id) Logic.incrementExpandCount(expandFrom.id);
    Logic.addPack(cards);

    Render.setOpeningProgress(label, 'Done!', 100);

    // Preload all card thumbnails and pre-render card DOM while progress bar finishes.
    // By the time reveal starts every image is already decoded in the browser cache.
    await Render.preloadCards(cards);
    await new Promise(r => setTimeout(r, 320));

    // Show card-by-card reveal, then land on binder
    await Render.runReveal(cards);

    document.getElementById('binder-sort').value = 'acquired';
    App._activateView('binder');
    Render.updateBalance();
  },

  // ── Banner actions ────────────────────────────────────────────

  onSellLatestPack() {
    const { total, count } = Logic.sellWhere(c => c.sessionId === State.sessionId);
    State.sessionId = null;
    Storage.save();
    Render.updateBalance();
    Render.renderBinder();
    Render.toast(`Sold ${count} cards for ${Render.money(total)}!`, 'success');
  },

  onDismissLatestBanner() {
    State.sessionId = null;
    Storage.save();
    Render.renderBinder();
  },

  // ── Card actions ──────────────────────────────────────────────

  onToggleLock(id) {
    const isNowLocked = Logic.toggleLock(id);
    const el = document.querySelector(`[data-card-id="${id}"]`);
    if (!el) return;

    el.classList.toggle('is-locked', isNowLocked);

    // Grid card selectors
    const gridLock   = el.querySelector('.card-lock-btn');
    const gridSell   = el.querySelector('.card-btn-sell');
    const gridExpand = el.querySelector('.card-btn-expand');

    // List row selectors
    const listLock   = el.querySelector('.card-list-btn-lock');
    const listSell   = el.querySelector('.card-list-btn-sell');
    const listExpand = el.querySelector('.card-list-btn-expand');

    const lockIcon = `<i class="fa-solid fa-${isNowLocked ? 'lock' : 'lock-open'}"></i>`;

    if (gridLock) { gridLock.innerHTML = lockIcon; gridLock.dataset.tip = isNowLocked ? 'Unlock card' : 'Lock card'; gridLock.classList.toggle('is-locked', isNowLocked); }
    if (listLock) { listLock.innerHTML = lockIcon; listLock.dataset.tip = isNowLocked ? 'Unlock' : 'Lock'; listLock.classList.toggle('is-locked', isNowLocked); }

    if (gridSell)  { gridSell.disabled  = isNowLocked; gridSell.dataset.tip  = isNowLocked ? 'Unlock to sell'   : 'Sell this card'; }
    if (listSell)  { listSell.disabled  = isNowLocked; listSell.dataset.tip  = isNowLocked ? 'Unlock to sell'   : `Sell for ${Render.money(State.binder.find(c=>c.id===id)?.value??0)}`; }

    const card = State.binder.find(c => c.id === id);
    if (gridExpand) { gridExpand.disabled = isNowLocked || !card || !Logic.canAffordExpand(card); gridExpand.dataset.tip = isNowLocked ? 'Unlock to expand' : 'Expand into pack'; }
    if (listExpand) { listExpand.disabled = isNowLocked || !card || !Logic.canAffordExpand(card); listExpand.dataset.tip = isNowLocked ? 'Unlock to expand' : `Expand ($${card ? Logic.expandCost(card) : '?'})`; }
  },

  onSellCard(id) {
    const card = State.binder.find(c => c.id === id);
    if (!card) return;
    const earned = Logic.sellCard(id);
    // If that was the last card from the latest session, clear the session highlight
    if (State.sessionId && Logic.latestPackCards().length === 0) {
      State.sessionId = null;
      Storage.save();
    }
    Render.updateBalance();
    Render.toast(`Sold "${card.title}" for ${Render.money(earned)}`, 'success');

    const el = document.querySelector(`[data-card-id="${id}"]`);
    if (el) {
      Render.animateCardOut(el, () => {
        document.getElementById('binder-count').textContent =
          `${State.binder.length} card${State.binder.length !== 1 ? 's' : ''}`;
        Render._renderLatestBanner();
      });
    }
  },

};

// Bind callbacks used as references inside Render (so `this` context is preserved)
App.onSellCard    = App.onSellCard.bind(App);
App.onExpandCard  = App.onExpandCard.bind(App);
App.onToggleLock  = App.onToggleLock.bind(App);

// #endregion

// ============================================================
// #region BOOTSTRAP
// ============================================================

document.addEventListener('DOMContentLoaded', () => App.init());

// #endregion
</script>
