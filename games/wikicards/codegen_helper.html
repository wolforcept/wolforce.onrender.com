<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encoder / Decoder</title>
    <script src="encoder.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1217;
            --surface: #181d26;
            --surface2: #1f2736;
            --border: #2a3346;
            --teal: #2dd4bf;
            --teal-dim: #1a9e8f;
            --gold: #f0b429;
            --gold-dim: #b8861a;
            --text: #d4dbe8;
            --muted: #6b7a96;
            --error: #f87171;
            --success: #4ade80;
            --mono: 'Courier New', Courier, monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            padding: 1.5rem 2rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .05em;
            color: var(--teal);
        }

        header p {
            font-size: .8rem;
            color: var(--muted);
            margin-top: .25rem;
        }

        /* ── Main grid ── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        @media (max-width: 700px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* ── Panel ── */
        .panel {
            padding: 1.75rem 2rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .panel-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .encode-panel .panel-title .dot {
            background: var(--teal);
        }

        .decode-panel .panel-title .dot {
            background: var(--gold);
        }

        .encode-panel .panel-title {
            color: var(--teal);
        }

        .decode-panel .panel-title {
            color: var(--gold);
        }

        /* ── Labels ── */
        label {
            font-size: .75rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .06em;
            display: block;
            margin-bottom: .4rem;
        }

        /* ── Inputs / textareas ── */
        textarea,
        input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: .9rem;
            padding: .65rem .8rem;
            outline: none;
            transition: border-color .15s;
            resize: vertical;
        }

        textarea:focus,
        input[type="text"]:focus {
            border-color: var(--teal);
        }

        textarea {
            min-height: 110px;
            line-height: 1.5;
        }

        input[type="text"].mono {
            font-family: var(--mono);
            font-size: .85rem;
            letter-spacing: .04em;
        }

        /* readonly output */
        .output-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .65rem .8rem;
            font-family: var(--mono);
            font-size: .85rem;
            letter-spacing: .04em;
            color: var(--text);
            word-break: break-all;
            min-height: 48px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .output-box.teal {
            color: var(--teal);
        }

        .output-box.gold {
            color: var(--gold);
        }

        .output-box:empty::before {
            content: attr(data-placeholder);
            color: var(--muted);
            font-style: italic;
            font-family: system-ui, sans-serif;
            font-size: .8rem;
            letter-spacing: 0;
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            gap: .6rem;
            align-items: center;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .06em;
            padding: .55rem 1.1rem;
            transition: background .15s, opacity .15s, transform .08s;
        }

        button:active {
            transform: scale(.97);
        }

        button:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        .btn-primary-teal {
            background: var(--teal);
            color: #0f1217;
        }

        .btn-primary-teal:hover:not(:disabled) {
            background: var(--teal-dim);
        }

        .btn-primary-gold {
            background: var(--gold);
            color: #0f1217;
        }

        .btn-primary-gold:hover:not(:disabled) {
            background: var(--gold-dim);
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover:not(:disabled) {
            color: var(--text);
            border-color: var(--muted);
        }

        /* ── Feedback / status ── */
        .status {
            font-size: .75rem;
            min-height: 1.1em;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .status.error {
            color: var(--error);
        }

        .status.success {
            color: var(--success);
        }

        .status.info {
            color: var(--muted);
        }

        /* ── Byte counter ── */
        .byte-count {
            font-size: .72rem;
            color: var(--muted);
            text-align: right;
        }

        .byte-count.warn {
            color: var(--gold);
        }

        .byte-count.over {
            color: var(--error);
        }

        /* ── Copy button inline ── */
        .copy-btn {
            margin-left: auto;
            padding: .3rem .7rem;
            font-size: .72rem;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: .8rem;
            font-size: .7rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <header>
        <h1>Encoder · Decoder</h1>
        <p>Feistel cipher · Base32 Crockford · Checksum verification</p>
    </header>

    <main>

        <!-- ══ ENCODE PANEL ══ -->
        <section class="panel encode-panel">
            <div class="panel-title"><span class="dot"></span>Encode</div>

            <div>
                <label for="enc-input">Input string</label>
                <textarea id="enc-input" placeholder="Type or paste your string here…" spellcheck="false"></textarea>
                <div class="byte-count" id="enc-byte-count">0 / 65535 bytes</div>
            </div>

            <div class="btn-row">
                <button class="btn-primary-teal" id="enc-btn" disabled>Encode</button>
                <button class="btn-ghost" id="enc-clear">Clear</button>
            </div>

            <div class="status info" id="enc-status"></div>

            <div>
                <div class="btn-row" style="margin-bottom:.4rem">
                    <label style="margin:0" for="enc-output">Output code</label>
                    <button class="btn-ghost copy-btn" id="enc-copy" disabled>Copy</button>
                </div>
                <div class="output-box teal" id="enc-output" data-placeholder="Encoded code will appear here"></div>
            </div>
        </section>

        <!-- ══ DECODE PANEL ══ -->
        <section class="panel decode-panel">
            <div class="panel-title"><span class="dot"></span>Decode</div>

            <div>
                <label for="dec-input">Code</label>
                <input type="text" id="dec-input" class="mono" placeholder="Paste a code here, e.g. ABCD-1234-XY" spellcheck="false" />
            </div>

            <div class="btn-row">
                <button class="btn-primary-gold" id="dec-btn" disabled>Decode</button>
                <button class="btn-ghost" id="dec-clear">Clear</button>
            </div>

            <div class="status info" id="dec-status"></div>

            <div>
                <div class="btn-row" style="margin-bottom:.4rem">
                    <label style="margin:0">Decoded string</label>
                    <button class="btn-ghost copy-btn" id="dec-copy" disabled>Copy</button>
                </div>
                <div class="output-box gold" id="dec-output" data-placeholder="Decoded text will appear here"></div>
            </div>
        </section>

    </main>

    <footer>encoder.js · Feistel / Base32 / Checksum</footer>

    <script>
        /* ── Byte helpers ── */
        function getByteLength(str) {
            return new TextEncoder().encode(str).length;
        }

        /* ── Encode panel ── */
        const encInput = document.getElementById('enc-input');
        const encBtn = document.getElementById('enc-btn');
        const encClear = document.getElementById('enc-clear');
        const encOutput = document.getElementById('enc-output');
        const encStatus = document.getElementById('enc-status');
        const encByteCount = document.getElementById('enc-byte-count');
        const encCopy = document.getElementById('enc-copy');

        const MAX_BYTES = 0xffff;

        encInput.addEventListener('input', () => {
            const bytes = getByteLength(encInput.value);
            encByteCount.textContent = `${bytes} / ${MAX_BYTES} bytes`;
            encByteCount.className = 'byte-count' + (bytes > MAX_BYTES ? ' over' : bytes > MAX_BYTES * 0.9 ? ' warn' : '');
            encBtn.disabled = encInput.value.trim() === '' || bytes > MAX_BYTES;
            setStatus(encStatus, '', '');
        });

        encBtn.addEventListener('click', () => {
            encStatus.className = 'status';
            encOutput.textContent = '';
            encCopy.disabled = true;
            try {
                const code = encodeTitleToCode(encInput.value);
                encOutput.textContent = code;
                encCopy.disabled = false;
                setStatus(encStatus, 'success', '✓ Encoded successfully');
            } catch (e) {
                setStatus(encStatus, 'error', '✗ ' + e.message);
            }
        });

        encClear.addEventListener('click', () => {
            encInput.value = '';
            encOutput.textContent = '';
            encStatus.className = 'status';
            encStatus.textContent = '';
            encByteCount.textContent = `0 / ${MAX_BYTES} bytes`;
            encByteCount.className = 'byte-count';
            encBtn.disabled = true;
            encCopy.disabled = true;
        });

        encCopy.addEventListener('click', () => copyText(encOutput.textContent, encCopy));

        /* ── Decode panel ── */
        const decInput = document.getElementById('dec-input');
        const decBtn = document.getElementById('dec-btn');
        const decClear = document.getElementById('dec-clear');
        const decOutput = document.getElementById('dec-output');
        const decStatus = document.getElementById('dec-status');
        const decCopy = document.getElementById('dec-copy');

        decInput.addEventListener('input', () => {
            decBtn.disabled = decInput.value.trim() === '';
            setStatus(decStatus, '', '');
            decOutput.textContent = '';
            decCopy.disabled = true;
        });

        decBtn.addEventListener('click', () => {
            decOutput.textContent = '';
            decCopy.disabled = true;
            try {
                const title = decodeCodeToTitle(decInput.value.trim());
                decOutput.textContent = title;
                decCopy.disabled = false;
                setStatus(decStatus, 'success', '✓ Decoded successfully');
            } catch (e) {
                // surface a friendlier version of common errors
                let msg = e.message;
                if (msg.includes('checksum')) msg = 'Checksum mismatch — code may be corrupted or mistyped';
                else if (msg.includes('length')) msg = 'Invalid code — unexpected length';
                setStatus(decStatus, 'error', '✗ ' + msg);
            }
        });

        decInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !decBtn.disabled) decBtn.click();
        });

        decClear.addEventListener('click', () => {
            decInput.value = '';
            decOutput.textContent = '';
            decStatus.className = 'status';
            decStatus.textContent = '';
            decBtn.disabled = true;
            decCopy.disabled = true;
        });

        decCopy.addEventListener('click', () => copyText(decOutput.textContent, decCopy));

        /* ── Shared helpers ── */
        function setStatus(el, type, msg) {
            el.className = 'status' + (type ? ' ' + type : '');
            el.textContent = msg;
        }

        async function copyText(text, btn) {
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = orig; }, 1500);
            } catch {
                setStatus(encStatus, 'error', 'Clipboard access denied');
            }
        }
    </script>
</body>

</html>
