<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Channel Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

        :root {
            --bg: #0a0a0b;
            --surface: #111114;
            --border: #2a2a30;
            --accent: #c8ff00;
            --dim: #ffffff;
            --text: #d0d0c8;
            --red: #ff2244;
            --green: #00ff88;
            --blue: #2288ff;
            --text-size-1: 1em;
            --text-size-2: 0.75em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 18px 32px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        header h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
        }

        header span {
            font-size: var(--text-size-1);
            color: var(--dim);
            letter-spacing: 0.15em;
            font-family: 'Share Tech Mono', monospace;
        }

        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 57px);
        }

        .sidebar {
            width: 220px;
            border-right: 1px solid var(--border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            flex-shrink: 0;
        }

        .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .upload-zone {
            border: 1px dashed var(--border);
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag {
            border-color: var(--accent);
            background: rgba(200, 255, 0, 0.03);
        }

        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-zone p {
            font-size: var(--text-size-1);
            color: var(--dim);
            line-height: 1.6;
            font-family: 'Share Tech Mono', monospace;
        }

        .upload-zone .icon {
            font-size: var(--text-size-1);
            margin-bottom: 8px;
            display: block;
            color: var(--dim);
        }

        .channel-btns {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 10px 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            border-color: var(--text);
        }

        .btn.active-all {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.active-r {
            border-color: var(--red);
            color: var(--red);
        }

        .btn.active-g {
            border-color: var(--green);
            color: var(--green);
        }

        .btn.active-b {
            border-color: var(--blue);
            color: var(--blue);
        }

        .btn.active-lum {
            border-color: #aaa;
            color: #ddd;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-all {
            background: var(--accent);
        }

        .dot-r {
            background: var(--red);
        }

        .dot-g {
            background: var(--green);
        }

        .dot-b {
            background: var(--blue);
        }

        .dot-lum {
            background: #aaa;
        }

        .info-box {
            margin-top: auto;
            border: 1px solid var(--border);
            padding: 12px;
        }

        .info-box p {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            line-height: 1.8;
            color: var(--dim);
        }

        .info-box .val {
            color: var(--text);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: repeating-linear-gradient(45deg,
                    #0d0d0e 0px,
                    #0d0d0e 10px,
                    #0a0a0b 10px,
                    #0a0a0b 20px);
            position: relative;
            overflow: hidden;
        }

        .canvas-area canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .placeholder {
            text-align: center;
            color: var(--dim);
        }

        .placeholder p {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.1em;
        }

        .placeholder .big {
            font-size: var(--text-size-1);
            display: block;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .channel-label {
            position: absolute;
            top: 16px;
            left: 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid currentColor;
            opacity: 0.7;
        }

        .label-all {
            color: var(--accent);
        }

        .label-r {
            color: var(--red);
        }

        .label-g {
            color: var(--green);
        }

        .label-b {
            color: var(--blue);
        }

        .label-lum {
            color: #aaa;
        }
    </style>
</head>

<body>

    <header>
        <h1>// Channel Inspector</h1>
        <span>v1.0 — image forensics</span>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div>
                <div class="section-label">Input</div>
                <div class="upload-zone" id="dropZone">
                    <span class="icon">⬡</span>
                    <p>Drop image here<br>or click to upload</p>
                    <input type="file" accept="image/*" id="fileInput">
                </div>
            </div>

            <div>
                <div class="section-label">Channel</div>
                <div class="channel-btns">
                    <button class="btn active-all" data-mode="all">
                        <span class="dot dot-all"></span> Full Color
                    </button>
                    <button class="btn" data-mode="r">
                        <span class="dot dot-r"></span> Red
                    </button>
                    <button class="btn" data-mode="g">
                        <span class="dot dot-g"></span> Green
                    </button>
                    <button class="btn" data-mode="b">
                        <span class="dot dot-b"></span> Blue
                    </button>
                    <button class="btn" data-mode="lum">
                        <span class="dot dot-lum"></span> Luminance
                    </button>
                </div>
            </div>

            <div class="info-box" id="infoBox">
                <p>
                    FILE<br><span class="val" id="infoName">—</span><br><br>
                    SIZE<br><span class="val" id="infoSize">—</span><br><br>
                    DIMS<br><span class="val" id="infoDims">—</span>
                </p>
            </div>
        </div>

        <div class="canvas-area" id="canvasArea">
            <div class="placeholder" id="placeholder">
                <span class="big">◈</span>
                <p>No image loaded</p>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            <span class="channel-label label-all" id="channelLabel" style="display:none;"></span>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const channelLabel = document.getElementById('channelLabel');
        const infoName = document.getElementById('infoName');
        const infoSize = document.getElementById('infoSize');
        const infoDims = document.getElementById('infoDims');

        let originalImageData = null;
        let currentMode = 'all';

        const modeLabels = {
            all: { text: 'FULL COLOR', cls: 'label-all' },
            r: { text: 'RED CHANNEL', cls: 'label-r' },
            g: { text: 'GREEN CHANNEL', cls: 'label-g' },
            b: { text: 'BLUE CHANNEL', cls: 'label-b' },
            lum: { text: 'LUMINANCE', cls: 'label-lum' },
        };

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.classList.remove('drag');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) loadFile(file);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

        function loadFile(file) {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                channelLabel.style.display = 'block';
                infoName.textContent = file.name;
                infoSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
                infoDims.textContent = img.naturalWidth + ' × ' + img.naturalHeight;
                URL.revokeObjectURL(url);
                applyMode(currentMode);
            };
            img.src = url;
        }

        function applyMode(mode) {
            if (!originalImageData) return;
            const src = originalImageData.data;
            const out = ctx.createImageData(canvas.width, canvas.height);
            const data = out.data;

            for (let i = 0; i < src.length; i += 4) {
                const r = src[i], g = src[i + 1], b = src[i + 2], a = src[i + 3];
                let nr, ng, nb;
                if (mode === 'all') { nr = r; ng = g; nb = b; }
                else if (mode === 'r') { nr = r; ng = r; nb = r; }
                else if (mode === 'g') { nr = g; ng = g; nb = g; }
                else if (mode === 'b') { nr = b; ng = b; nb = b; }
                else if (mode === 'lum') {
                    const l = Math.round(0.2126 * r + 0.7152 * g + 0.0722 * b);
                    nr = ng = nb = l;
                }
                data[i] = nr; data[i + 1] = ng; data[i + 2] = nb; data[i + 3] = a;
            }
            ctx.putImageData(out, 0, 0);

            const info = modeLabels[mode];
            channelLabel.textContent = info.text;
            channelLabel.className = 'channel-label ' + info.cls;
        }

        document.querySelectorAll('.btn[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentMode = btn.dataset.mode;
                document.querySelectorAll('.btn[data-mode]').forEach(b => {
                    b.className = 'btn';
                });
                btn.classList.add('active-' + currentMode);
                applyMode(currentMode);
            });
        });
    </script>
</body>

</html>
