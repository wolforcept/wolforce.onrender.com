<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightness &amp; Contrast</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

        :root {
            --bg: #0a0a0b;
            --surface: #111114;
            --border: #2a2a30;
            --accent: #ff4400;
            --dim: #5ca6d1;
            --text: #ffffff;
            --text-size-1: 1em;
            --text-size-2: 0.75em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 18px 32px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        header h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
        }

        header span {
            font-size: var(--text-size-1);
            color: var(--dim);
            letter-spacing: 0.15em;
            font-family: 'Share Tech Mono', monospace;
        }

        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 57px);
        }

        .sidebar {
            width: 240px;
            border-right: 1px solid var(--border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-2);
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .upload-zone {
            border: 1px dashed var(--border);
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(255, 68, 0, 0.03);
        }

        .upload-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-zone p {
            font-size: var(--text-size-1);
            color: var(--dim);
            line-height: 1.6;
            font-family: 'Share Tech Mono', monospace;
        }

        .upload-zone .icon {
            font-size: var(--text-size-1);
            margin-bottom: 8px;
            display: block;
            color: var(--dim);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .slider-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.12em;
            color: var(--text);
        }

        .slider-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            color: var(--accent);
            min-width: 42px;
            text-align: right;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--border);
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        input[type=range]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: none;
            cursor: pointer;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            color: var(--dim);
            margin-top: 2px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 9px 8px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .preset-btns {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .preset-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .preset-btn span {
            font-size: var(--text-size-1);
            color: var(--dim);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(255, 44, 0, 0.04) 0%, transparent 60%),
                repeating-linear-gradient(45deg, #0d0d0e 0px, #0d0d0e 10px, #0a0a0b 10px, #0a0a0b 20px);
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder {
            text-align: center;
            color: var(--dim);
        }

        .placeholder p {
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.1em;
        }

        .placeholder .big {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.2;
        }

        .overlay-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: var(--text-size-1);
            letter-spacing: 0.15em;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 10px;
            opacity: 0.5;
            display: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>// Exposure Lab</h1>
        <span>brightness &amp; contrast — forensic grade</span>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div>
                <div class="section-label">Input</div>
                <div class="upload-zone" id="dropZone">
                    <span class="icon">◈</span>
                    <p>Drop image here<br>or click to upload</p>
                    <input type="file" accept="image/*" id="fileInput">
                </div>
            </div>

            <div>
                <div class="section-label">Exposure</div>
                <div class="slider-group">
                    <div class="slider-row">
                        <div class="slider-header">
                            <span class="slider-name">Brightness</span>
                            <span class="slider-val" id="brtVal">0</span>
                        </div>
                        <input type="range" id="brightness" min="-255" max="255" value="0">
                        <div class="range-labels"><span>-255</span><span>+255</span></div>
                    </div>
                    <div class="slider-row">
                        <div class="slider-header">
                            <span class="slider-name">Contrast</span>
                            <span class="slider-val" id="conVal">0</span>
                        </div>
                        <input type="range" id="contrast" min="-255" max="255" value="0">
                        <div class="range-labels"><span>-255</span><span>+255</span></div>
                    </div>
                    <div class="slider-row">
                        <div class="slider-header">
                            <span class="slider-name">Posterize</span>
                            <span class="slider-val" id="postVal">off</span>
                        </div>
                        <input type="range" id="posterize" min="2" max="256" value="256">
                        <div class="range-labels"><span>2</span><span>256</span></div>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" id="resetBtn">Reset</button>
            </div>
        </div>

        <div class="canvas-area" id="canvasArea">
            <div class="placeholder" id="placeholder">
                <span class="big">◈</span>
                <p>No image loaded</p>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            <span class="overlay-badge" id="badge">MODIFIED</span>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const badge = document.getElementById('badge');

        const slBrt = document.getElementById('brightness');
        const slCon = document.getElementById('contrast');
        const slPost = document.getElementById('posterize');

        const brtVal = document.getElementById('brtVal');
        const conVal = document.getElementById('conVal');
        const postVal = document.getElementById('postVal');

        let originalImageData = null;

        function buildLUT(brightness, contrast, posterize) {
            const lut = new Uint8ClampedArray(256);
            const cf = (259 * (contrast + 255)) / (255 * (259 - contrast));
            for (let i = 0; i < 256; i++) {
                let v = i;
                v = cf * (v - 128) + 128;
                v = v + brightness;
                v = Math.max(0, Math.min(255, v));
                if (posterize < 256) {
                    v = Math.round(Math.round(v / 255 * (posterize - 1)) / (posterize - 1) * 255);
                }
                lut[i] = v;
            }
            return lut;
        }

        function render() {
            if (!originalImageData) return;
            const brightness = parseInt(slBrt.value);
            const contrast = parseInt(slCon.value);
            const posterize = parseInt(slPost.value);

            brtVal.textContent = (brightness > 0 ? '+' : '') + brightness;
            conVal.textContent = (contrast > 0 ? '+' : '') + contrast;
            postVal.textContent = posterize >= 256 ? 'off' : posterize;

            const lut = buildLUT(brightness, contrast, posterize);
            const src = originalImageData.data;
            const out = ctx.createImageData(canvas.width, canvas.height);
            const data = out.data;

            for (let i = 0; i < src.length; i += 4) {
                data[i] = lut[src[i]];
                data[i + 1] = lut[src[i + 1]];
                data[i + 2] = lut[src[i + 2]];
                data[i + 3] = src[i + 3];
            }
            ctx.putImageData(out, 0, 0);

            const isModified = brightness !== 0 || contrast !== 0 || posterize < 256;
            badge.style.display = isModified ? 'block' : 'none';
        }

        [slBrt, slCon, slPost].forEach(sl => sl.addEventListener('input', render));

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
        dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.style.borderColor = '';
            const f = e.dataTransfer.files[0];
            if (f && f.type.startsWith('image/')) loadFile(f);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

        function loadFile(file) {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                URL.revokeObjectURL(url);
                render();
            };
            img.src = url;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            slBrt.value = 0; slCon.value = 0; slPost.value = 256;
            render();
        });
    </script>
</body>

</html>
