<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>FPS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #e8f4e8;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
    }

    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      width: 100%;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }

    #nexus-hud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #nexus-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(100, 180, 255, 0.6);
    }

    #nexus-bar-wrap {
      width: 220px;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 5px;
      overflow: hidden;
    }

    #nexus-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #1a88ff, #44ccff);
      border-radius: 5px;
      transition: width 0.2s;
      box-shadow: 0 0 8px #44ccff88;
    }

    #wave-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255, 200, 80, 0.55);
      margin-top: 2px;
    }

    /* Wave info panel — next wave countdown + composition */
    #wave-info {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    #wave-timer {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255, 200, 80, 0.7);
    }

    #wave-timer.urgent {
      color: rgba(255, 80, 80, 0.9);
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from {
        opacity: 0.6;
      }

      to {
        opacity: 1;
      }
    }

    #wave-preview {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 320px;
    }

    .wave-pip {
      font-size: 9px;
      letter-spacing: 2px;
      padding: 2px 6px;
      border: 1px solid;
      border-radius: 2px;
      opacity: 0.75;
    }

    #level-name {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.18);
    }

    #money {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 22px;
      letter-spacing: 2px;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd70088;
    }

    #ammo {
      position: absolute;
      bottom: 32px;
      right: 40px;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow: 0 0 12px #4fffb0;
      color: #4fffb0;
    }

    #bars-left {
      position: absolute;
      bottom: 32px;
      left: 40px;
    }

    .bar-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    .bar-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 4px;
    }

    .bar-track {
      width: 160px;
      height: 7px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    #health-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff4b4b, #ff9944);
      border-radius: 4px;
      transition: width 0.15s;
    }

    #energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ccaa00, #ffee44);
      border-radius: 4px;
      transition: width 0.05s;
    }

    #hit-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4444;
      font-size: 32px;
      opacity: 0;
      transition: opacity 0.05s;
    }

    #damage-flash {
      position: absolute;
      inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      transition: background 0.1s;
    }

    #reload-msg {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(255, 200, 80, 0.8);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #respawn-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 40px);
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(255, 80, 80, 0.85);
      display: none;
      text-align: center;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: all;
    }

    .menu-title {
      font-size: 56px;
      letter-spacing: 10px;
      color: #4fffb0;
      text-shadow: 0 0 40px #4fffb066;
      margin-bottom: 8px;
    }

    .menu-subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 32px;
    }

    .level-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 32px;
      justify-content: center;
      max-width: 960px;
    }

    .level-card {
      width: 170px;
      padding: 18px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .level-card:hover {
      border-color: #4fffb0;
      background: rgba(79, 255, 176, 0.06);
      transform: translateY(-3px);
    }

    .card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: 12px;
    }

    .card-num {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 14px;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;
    }

    .menu-hint {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.2);
    }

    .info-title {
      font-size: 52px;
      letter-spacing: 8px;
      color: #4fffb0;
      text-shadow: 0 0 40px #4fffb088;
      margin-bottom: 16px;
    }

    .info-sub {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .info-btn {
      padding: 12px 36px;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: 3px;
      background: transparent;
      border: 1px solid #4fffb0;
      color: #4fffb0;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin: 6px;
    }

    .info-btn:hover {
      background: #4fffb0;
      color: #000;
    }
  </style>
</head>

  <script type="importmap">
{
  "imports": {

  <!--
  ═══════════════════════════════════════════════════════════════
  EXTERNAL CONFIG FILES  (plain scripts, loaded before the module)
  ═══════════════════════════════════════════════════════════════

  config/config.js
  ────────────────
  const CONFIG = {
    // Player
    PLAYER_SPEED, PLAYER_SPRINT_SPEED, PLAYER_HEIGHT, PLAYER_MAX_HP,
    PLAYER_RADIUS, MOUSE_SENSITIVITY, JUMP_FORCE, GRAVITY, PLAYER_RESPAWN_TIME,
    // Energy
    PLAYER_ENERGY_MAX, PLAYER_ENERGY_DRAIN, PLAYER_ENERGY_REGEN,
    // Gun
    GUN_DAMAGE, AMMO_MAX, RELOAD_TIME, SHOOT_COOLDOWN,
    // Enemy base
    ENEMY_ATTACK_DIST, ENEMY_ATTACK_RATE, WAYPOINT_REACH_DIST,
