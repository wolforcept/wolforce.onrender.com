<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL EDITOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --panel: #131318;
            --panel2: #1a1a22;
            --border: #2a2a3a;
            --accent: #ff3333;
            --accent2: #ff6600;
            --text: #d0cfe0;
            --text-dim: #666680;
            --mono: 'Share Tech Mono', monospace;
            --ui: 'Rajdhani', sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--ui);
        }

        #app {
            display: grid;
            grid-template-rows: 44px 1fr 28px;
            grid-template-columns: 200px 1fr 260px;
            height: 100vh;
        }

        #toolbar {
            grid-column: 1/-1;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            overflow-x: auto;
        }

        #palette {
            grid-row: 2;
            background: var(--panel);
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        #viewport {
            grid-row: 2;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #props {
            grid-row: 2;
            background: var(--panel);
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }

        #statusbar {
            grid-column: 1/-1;
            background: var(--panel2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            gap: 16px;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .tb-logo {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 3px;
            margin-right: 6px;
            border-right: 1px solid var(--border);
            padding-right: 10px;
            flex-shrink: 0;
        }

        .tb-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 2px;
            flex-shrink: 0;
        }

        .tb-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .tb-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: var(--ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all .15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tb-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .tb-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: #ff333318;
        }

        .tb-btn.green {
            border-color: #33ff66;
            color: #33ff66;
        }

        .tb-btn.green:hover {
            background: #33ff6618;
        }

        .tb-btn.blue {
            border-color: #3399ff;
            color: #3399ff;
        }

        .tb-btn.blue:hover {
            background: #3399ff18;
        }

        .tb-btn.orange {
            border-color: #ffaa33;
            color: #ffaa33;
        }

        #level-select {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            padding: 3px 6px;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
            max-width: 140px;
        }

        #level-select:focus {
            border-color: var(--accent);
        }

        .face-row {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .face-btn {
            width: 26px;
            height: 26px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 700;
            font-family: var(--mono);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .12s;
        }

        .face-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .face-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: #ff333318;
        }

        .panel-title {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            padding: 8px 10px 6px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        .piece-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            cursor: pointer;
            border-bottom: 1px solid #1a1a22;
            transition: background .1s;
            user-select: none;
        }

        .piece-item:hover {
            background: var(--panel2);
        }

        .piece-item.selected {
            background: #ff333318;
            border-left: 2px solid var(--accent);
        }

        .piece-icon {
            width: 30px;
            height: 30px;
            background: var(--panel2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .piece-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .piece-type {
            font-size: 10px;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .palette-section {
            border-top: 2px solid var(--border);
        }

        .prop-section {
            border-bottom: 1px solid var(--border);
        }

        .prop-section-title {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent2);
            padding: 7px 10px 5px;
            background: #1a1a1f;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .prop-section-title::after {
            content: '▼';
            font-size: 8px;
        }

        .prop-section-title.collapsed::after {
            content: '▶';
        }

        .prop-section-body {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .prop-section-body.collapsed {
            display: none;
        }

        .prop-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .prop-row label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .prop-row input[type=text],
        .prop-row input[type=number],
        .prop-row textarea,
        .prop-row select {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            padding: 4px 6px;
            width: 100%;
            outline: none;
            transition: border-color .15s;
        }

        .prop-row input:focus,
        .prop-row textarea:focus,
        .prop-row select:focus {
            border-color: var(--accent);
        }

        .prop-row textarea {
            resize: vertical;
            min-height: 50px;
        }

        .prop-row input[type=color] {
            width: 100%;
            height: 28px;
            background: var(--panel2);
            border: 1px solid var(--border);
            padding: 2px;
            cursor: pointer;
        }

        .prop-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .prop-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
        }

        .danger-btn {
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            font-family: var(--ui);
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            margin-top: 4px;
            transition: all .15s;
        }

        .danger-btn:hover {
            background: #ff333322;
        }

        .no-selection {
            padding: 20px 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.7;
            text-align: center;
        }

        #mode-indicator {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000bb;
            border: 1px solid var(--accent);
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            padding: 4px 14px;
            pointer-events: none;
            letter-spacing: 2px;
        }

        #face-indicator {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000bb;
            border: 1px solid #ffaa33;
            font-family: var(--mono);
            font-size: 11px;
            color: #ffaa33;
            padding: 3px 12px;
            pointer-events: none;
            letter-spacing: 2px;
            display: none;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--panel);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="toolbar">
            <span class="tb-logo">◈ LVEDIT</span>
            <span class="tb-label">MODE:</span>
            <button class="tb-btn active" data-mode="SELECT">⊹ Select</button>
            <button class="tb-btn" data-mode="WALL" title="Place wall collision hitbox (no GLB)">▬ Hitbox Wall</button>
            <button class="tb-btn" data-mode="COLUMN" title="Place column collision hitbox (no GLB)">◎ Hitbox Col</button>
            <button class="tb-btn" data-mode="PROP" title="Place any GLB model (floors, walls, props, etc.)">⬡ Prop (GLB)</button>
            <button class="tb-btn" data-mode="LIGHT">✦ Light</button>
            <button class="tb-btn" data-mode="SPAWN">⊕ Spawn</button>
            <div class="tb-sep"></div>
            <span class="tb-label" id="face-label" style="display:none">FACE:</span>
            <div class="face-row" id="face-row" style="display:none">
                <button class="face-btn active" data-face="N" title="North">N</button>
                <button class="face-btn" data-face="S" title="South">S</button>
                <button class="face-btn" data-face="E" title="East">E</button>
                <button class="face-btn" data-face="W" title="West">W</button>
            </div>
            <div class="tb-sep" id="face-sep" style="display:none"></div>
            <span class="tb-label">SNAP:</span>
            <button class="tb-btn active" id="btn-snap">GRID</button>
            <button class="tb-btn orange" id="btn-snap-half" title="Toggle half-cell snap">½</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" id="btn-toggle-hitboxes">Hitboxes ON</button>
            <button class="tb-btn" id="btn-toggle-props-vis">Props ON</button>
            <button class="tb-btn active" id="btn-toggle-fog">Fog ON</button>
            <div class="tb-sep" style="margin-left:auto"></div>
            <span class="tb-label">LEVEL:</span>
            <select id="level-select" title="Load a level from LEVEL_MANIFEST"></select>
            <button class="tb-btn" id="btn-load-level" title="Fetch and load selected level">Load</button>
            <div class="tb-sep"></div>
            <button class="tb-btn green" id="btn-download">↓ Export JSON</button>
            <button class="tb-btn blue" id="btn-upload">↑ Import JSON</button>
            <input type="file" id="file-input" accept=".json" style="display:none">
        </div>

        <div id="palette">
            <div class="panel-title">◈ Pieces (GLBs)</div>
            <div id="piece-list"></div>
            <div class="palette-section">
                <div class="panel-title" style="border-top:none">◈ Spawn Types</div>
                <div id="spawn-list"></div>
            </div>
        </div>

        <div id="viewport">
            <div id="mode-indicator">SELECT</div>
            <div id="face-indicator">FACE: N</div>
        </div>

        <div id="props">
            <div class="panel-title">◈ Properties</div>
            <div id="props-content"></div>
        </div>

        <div id="statusbar">
            <span id="st-mode">MODE: SELECT</span>
            <span id="st-cell">CELL: 0, 0</span>
            <span id="st-world">WORLD: 0.0, 0.0</span>
            <span id="st-snap">SNAP: GRID</span>
            <span id="st-counts">W:0 C:0 F:0 L:0 P:0</span>
            <span id="st-hint" style="margin-left:auto">ORBIT:LMB · PAN:RMB · ZOOM:scroll · F/R=face · 1-6=modes · DEL=delete</span>
        </div>

    </div>

    <!-- Config files (loaded as plain globals before the module) -->
    <script src="config/assets.js"></script>
    <script src="config/config.js"></script>
    <script src="config/enemies.js"></script>
    <script src="config/levels.js"></script>

    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
  }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ═══════════════════════════════════════════════════════════
        //  GRID CONSTANTS  — sourced from config/assets.js globals
        //  GRID_UNIT and WALL_HEIGHT are declared there as plain vars.
        //  Fallbacks keep the editor usable when opened standalone.
        // ═══════════════════════════════════════════════════════════
        const GRID_UNIT = (typeof window.GRID_UNIT !== 'undefined') ? window.GRID_UNIT : 4;
        const WALL_H = (typeof window.WALL_HEIGHT !== 'undefined') ? window.WALL_HEIGHT : 16; // assets.js: 4*GRID_UNIT
        const WALL_D = 0.4;   // wall hitbox visual depth
        const COL_R = 0.5;   // column hitbox visual radius
        const COL_H = WALL_H;
        const FACES = ['N', 'E', 'S', 'W'];

        // ═══════════════════════════════════════════════════════════
        //  PIECE DEFINITIONS  — derived from config/assets.js ASSET_MANIFEST
        //
        //  We pull every entry that lives under assets/environment/ or
        //  assets/guns/crate*.  Gun assets are excluded.
        //  type is inferred from the asset key / path so the editor
        //  can assign it to the right placement mode palette section.
        // ═══════════════════════════════════════════════════════════

        // Icon map: asset key → emoji (best-effort, falls back to ▪)
        const PIECE_ICONS = {
            floor: '▦', floorCorner: '▦', floorDetail: '▦', floorPanel: '▦',
            floorPanelCorner: '▦', floorPanelEnd: '▦', floorPanelStraight: '▦',
            wall: '▬', wallCorner: '⌐', wallCornerRound: '⌐', wallPillar: '◎',
            wallDoor: '🚪', wallDoorWide: '🚪', wallWindow: '🪟', wallWindowFrame: '🪟',
            wallWindowShutters: '🪟', wallWindowBanner: '🪟', wallDetail: '▬',
            wallBanner: '▬', wallCornerBanner: '⌐', wallCornerRoundBanner: '⌐',
            wallPillarBanner: '◎', wallDoorBanner: '🚪', wallDoorCenter: '🚪',
            wallDoorEdge: '🚪', wallDoorEdgeBanner: '🚪', wallDoorWideBanner: '🚪',
            wallSwitch: '🔲', pipe: '◍', pipeBend: '◍', pipeBendDiagonal: '◍',
            pipeEnd: '◍', pipeEndColored: '◍', pipeRing: '◍', pipeRingColored: '◍',
            crateMedium: '📦', crateSmall: '📦', crateWide: '📦',
            chairArmrest: '🪑', chair: '🪑', chairCushion: '🪑', chairHeadrest: '🪑',
            chairArmrestHeadrest: '🪑', chairCushionHeadrest: '🪑',
            bedDouble: '🛏', bedSingle: '🛏', bedDoubleCover: '🛏', bedSingleCover: '🛏',
            computer: '🖥', computerScreen: '🖥', computerSystem: '🖥', computerWide: '🖥',
            tableDisplay: '🗄', tableDisplayPlanet: '🗄', tableDisplaySmall: '🗄',
            table: '🗄', tableLarge: '🗄', tableInset: '🗄', tableInsetSmall: '🗄',
            container: '📫', containerFlat: '📫', containerFlatOpen: '📫',
            containerTall: '📫', containerWide: '📫',
            displayWall: '📺', displayWallWide: '📺',
            doorSingle: '🚪', doorSingleClosed: '🚪', doorSingleHalf: '🚪',
            doorDouble: '🚪', doorDoubleClosed: '🚪', doorDoubleHalf: '🚪',
            balconyFloor: '⬜', balconyFloorCorner: '⬜', balconyFloorCenter: '⬜',
            balconyRail: '⬜', balconyRailCorner: '⬜', balconyRailCenter: '⬜',
            stairs: '🪜', stairsCorner: '🪜', stairsCornerInner: '🪜',
            stairsHandrail: '🪜', stairsHandrailSingle: '🪜', stairsRamp: '🪜',
            stairsSmallCenter: '🪜', stairsSmallCorner: '🪜', stairsSmallCornerInner: '🪜',
            stairsSmallEdge: '🪜', stairsSmallEdges: '🪜', stairsSmallEdgeHandrail: '🪜',
            stairsSmallEdgesHandrail: '🪜',
            structureBarrier: '🧱', structureBarrierHigh: '🧱',
            structurePanel: '🧱', structure: '🧱',
            rail: '🔩', railNarrow: '🔩',
            rocks: '🪨', skipRocks: '🗑', skip: '🗑',
        };

        // Type inference: which palette section does each piece belong to?
        function inferPieceType(key, path) {
            if (key.startsWith('floor')) return 'floor';
            if (key === 'wallPillar' || key === 'pipe') return 'column';
            if (key.startsWith('wall')) return 'wall';
            if (key.startsWith('crate')) return 'prop';
            if (key.startsWith('pipe')) return 'prop';
            return 'prop';
        }

        // Build PIECES from ASSET_MANIFEST, excluding guns/accessories
        const PIECES = (() => {
            if (typeof ASSET_MANIFEST === 'undefined') {
                // Fallback if config scripts didn't load
                return [
                    { id: 'wall', name: 'Wall', icon: '▬', type: 'wall', url: 'assets/environment/wall.glb', scale: 1 },
                    { id: 'wallPillar', name: 'Pillar', icon: '◎', type: 'column', url: 'assets/environment/wall-pillar.glb', scale: 1 },
                    { id: 'floor', name: 'Floor', icon: '▦', type: 'floor', url: 'assets/environment/floor.glb', scale: 1 },
                ];
            }
            const EXCLUDE_PREFIXES = ['blaster', 'bullet', 'clip', 'grenade', 'scope', 'silencer', 'smoke', 'target', 'gun'];
            const out = [];
            for (const [key, asset] of Object.entries(ASSET_MANIFEST)) {
                // Skip gun-related assets
                if (EXCLUDE_PREFIXES.some(p => key.toLowerCase().startsWith(p))) continue;
                if (asset.path.includes('/guns/') && !asset.path.includes('crate')) continue;
                // Friendly display name: camelCase → Title Case With Spaces
                const name = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()).trim();
                out.push({
                    id: key,
                    name: name,
                    icon: PIECE_ICONS[key] || '▪',
                    type: inferPieceType(key, asset.path),
                    url: asset.path,
                    scale: asset.scale ?? 1,
                    posOffset: asset.posOffset ?? { x: 0, y: 0, z: 0 },
                    rotOffset: asset.rotOffset ?? { x: 0, y: 0, z: 0 },
                    shadows: asset.shadows ?? { cast: true, receive: true },
                });
            }
            return out;
        })();

        const SPAWN_TYPES = [
            { id: 'playerSpawn', name: 'Player Spawn', icon: '👤', color: 0x00ff88 },
            { id: 'enemySpawn', name: 'Enemy Spawn', icon: '💀', color: 0xff3333 },
            { id: 'pathNode', name: 'Path Node', icon: '⬡', color: 0xffaa00 },
            { id: 'nexus', name: 'Nexus', icon: '⚡', color: 0x8888ff },
        ];

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════
        const state = {
            mode: 'SELECT',
            snapEnabled: true,
            snapHalf: false,
            selectedPieceId: 'wall',
            selectedSpawnType: 'playerSpawn',
            selectedFace: 'N',
            selectedObject: null,
            showHitboxes: true,
            showProps: true,
            fogEnabled: true,
            level: newLevel(),
            // Default properties used for next placement (shown in right panel when in a placement mode)
            defaults: {
                light: { color: '#ff2200', intensity: 2.0, distance: 10, y: 2.5 },
                prop: { rotY: 0, scale: 1 },
                wall: {},   // face comes from selectedFace; no extra defaults needed
                column: {},
                spawn: {},
            },
        };

        function newLevel() {
            return {
                meta: { name: 'New Level', description: '', accentColor: '#ff3333', floorSize: 40, floorColor: '#14101a', fogColor: '#0a0608', fogNear: 4, fogFar: 22 },
                ambient: { color: '#2a0808', intensity: 1.2 },
                sun: { color: '#ff2200', intensity: 0.45, pos: [2, 10, 2] },
                pointLights: [], floors: [], walls: [], columns: [], props: [],
                playerSpawn: { x: 6, z: 6, yaw: 0 }, enemySpawns: [], path: [], nexus: { x: 0, z: 0 },
            };
        }

        // ═══════════════════════════════════════════════════════════
        //  THREE.JS
        // ═══════════════════════════════════════════════════════════
        const viewport = document.getElementById('viewport');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        viewport.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0608);
        scene.fog = new THREE.Fog(0x0a0608, 4, 22);

        const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 500);
        camera.position.set(20, 22, 20);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.screenSpacePanning = false;
        controls.maxPolarAngle = Math.PI / 2.05;
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

        new ResizeObserver(() => {
            const w = viewport.clientWidth, h = viewport.clientHeight;
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }).observe(viewport);

        // ── Static scene pieces ─────────────────────────────────────
        const gridHelper = new THREE.GridHelper(160, 40, 0x222233, 0x1a1a28);
        scene.add(gridHelper);

        const floorPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
        );
        floorPlane.rotation.x = -Math.PI / 2;
        scene.add(floorPlane);

        const floorVis = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({ color: 0x14101a, roughness: 0.9 })
        );
        floorVis.rotation.x = -Math.PI / 2;
        floorVis.receiveShadow = true;
        scene.add(floorVis);

        const ambLight = new THREE.AmbientLight(0x2a0808, 1.2); scene.add(ambLight);
        const sunLight = new THREE.DirectionalLight(0xff2200, 0.45);
        sunLight.position.set(2, 10, 2); sunLight.castShadow = true; scene.add(sunLight);

        // Cell cursor highlight
        const cellCursor = new THREE.Mesh(
            new THREE.PlaneGeometry(GRID_UNIT - 0.1, GRID_UNIT - 0.1),
            new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.10, side: THREE.DoubleSide, depthWrite: false })
        );
        cellCursor.rotation.x = -Math.PI / 2; cellCursor.position.y = 0.02; scene.add(cellCursor);

        const cellEdges = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.PlaneGeometry(GRID_UNIT - 0.1, GRID_UNIT - 0.1)),
            new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.5 })
        );
        cellEdges.rotation.x = -Math.PI / 2; cellEdges.position.y = 0.03; scene.add(cellEdges);

        // Selection box
        const selBox = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: 0xff3333, wireframe: true, transparent: true, opacity: 0.9 })
        );
        selBox.visible = false; scene.add(selBox);

        // ── Scene groups ────────────────────────────────────────────
        const hitboxGroup = new THREE.Group(); hitboxGroup.name = 'hitboxes'; scene.add(hitboxGroup);
        const propGroup = new THREE.Group(); propGroup.name = 'props'; scene.add(propGroup);
        const lightGroup = new THREE.Group(); lightGroup.name = 'lights'; scene.add(lightGroup);
        const spawnGroup = new THREE.Group(); spawnGroup.name = 'spawns'; scene.add(spawnGroup);

        // ── Raycaster ───────────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse2d = new THREE.Vector2();

        function getFloorHit(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse2d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse2d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse2d, camera);
            const h = raycaster.intersectObject(floorPlane);
            return h.length ? h[0].point : null;
        }

        // Grid math
        function w2c(wx, wz) {
            return { gx: Math.floor(wx / GRID_UNIT + 0.5), gz: Math.floor(wz / GRID_UNIT + 0.5) };
        }
        function c2w(gx, gz) { return { wx: gx * GRID_UNIT, wz: gz * GRID_UNIT }; }

        // Wall world transform from grid cell + face
        function wallXform(gx, gz, face) {
            const hw = GRID_UNIT / 2, cy = WALL_H / 2;
            const { wx, wz } = c2w(gx, gz);
            let px = wx, pz = wz; const rot = new THREE.Euler();
            if (face === 'N') { pz = wz - hw; }
            else if (face === 'S') { pz = wz + hw; }
            else if (face === 'E') { px = wx + hw; rot.y = Math.PI / 2; }
            else if (face === 'W') { px = wx - hw; rot.y = Math.PI / 2; }
            return { pos: new THREE.Vector3(px, cy, pz), rot };
        }

        // ═══════════════════════════════════════════════════════════
        //  GLB LOADER
        // ═══════════════════════════════════════════════════════════
        const gltfLoader = new GLTFLoader();
        const modelCache = {};
        const loadSet = new Set();

        function loadPiece(p) {
            if (modelCache[p.id] || loadSet.has(p.id)) return;
            loadSet.add(p.id);
            gltfLoader.load(p.url,
                gltf => { loadSet.delete(p.id); modelCache[p.id] = gltf.scene; },
                undefined,
                () => {
                    loadSet.delete(p.id);
                    let geo;
                    if (p.type === 'wall') geo = new THREE.BoxGeometry(GRID_UNIT, WALL_H, WALL_D);
                    else if (p.type === 'floor') geo = new THREE.BoxGeometry(GRID_UNIT, 0.15, GRID_UNIT);
                    else if (p.type === 'column') geo = new THREE.CylinderGeometry(COL_R * 2, COL_R * 2, COL_H, 8);
                    else geo = new THREE.BoxGeometry(1, 2, 1);
                    const colors = { wall: 0x8855aa, floor: 0x334455, column: 0xaa8833 };
                    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: colors[p.type] || 0x886644 }));
                    const grp = new THREE.Group(); grp.add(mesh);
                    modelCache[p.id] = grp;
                }
            );
        }
        PIECES.forEach(loadPiece);

        function cloneModel(id) {
            if (!modelCache[id]) return null;
            const c = modelCache[id].clone(true);
            const piece = PIECES.find(p => p.id === id);
            const sc = piece?.scale ?? 1;
            const off = piece?.posOffset ?? { x: 0, y: 0, z: 0 };
            const rot = piece?.rotOffset ?? { x: 0, y: 0, z: 0 };
            const shd = piece?.shadows ?? { cast: true, receive: true };
            c.scale.setScalar(sc);
            c.position.set(off.x, off.y, off.z);  // base offset baked in; callers add world pos on top
            c.rotation.set(rot.x, rot.y, rot.z);
            c.traverse(m => {
                if (!m.isMesh) return;
                m.castShadow = shd.cast;
                m.receiveShadow = shd.receive;
            });
            return c;
        }

        // ── Ghost ───────────────────────────────────────────────────
        let ghost = null;

        function clearGhost() { if (ghost) { scene.remove(ghost); ghost = null; } }

        function ghostMat(node) {
            node.traverse(c => {
                if (!c.isMesh) return;
                const mk = m => { const n = m.clone(); n.transparent = true; n.opacity = 0.4; n.depthWrite = false; return n; };
                c.material = Array.isArray(c.material) ? c.material.map(mk) : mk(c.material);
            });
        }

        function setGhostPiece(id) {
            clearGhost(); const m = cloneModel(id); if (!m) return;
            ghostMat(m); ghost = m; ghost.name = '__ghost__'; scene.add(ghost);
        }
        function setGhostBox(w, h, d) {
            clearGhost();
            ghost = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.7 }));
            ghost.name = '__ghost__'; scene.add(ghost);
        }
        function setGhostCyl(r, h) {
            clearGhost();
            ghost = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 12), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.7 }));
            ghost.name = '__ghost__'; scene.add(ghost);
        }
        function setGhostLight() {
            clearGhost();
            ghost = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 6), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 }));
            ghost.name = '__ghost__'; scene.add(ghost);
        }
        function setGhostSpawn(stId) {
            clearGhost();
            const st = SPAWN_TYPES.find(s => s.id === stId);
            ghost = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.2, 6), new THREE.MeshBasicMaterial({ color: st?.color || 0xffffff, transparent: true, opacity: 0.6 }));
            ghost.position.y = 0.6; ghost.name = '__ghost__'; scene.add(ghost);
        }

        // ── UID ─────────────────────────────────────────────────────
        let _uid = 1; function uid() { return `o${_uid++}`; }

        // ═══════════════════════════════════════════════════════════
        //  WALLS  { _id, gx, gz, face, id }
        // ═══════════════════════════════════════════════════════════
        function addWall(gx, gz, face) {
            if (state.level.walls.find(w => w.gx === gx && w.gz === gz && w.face === face)) return null;
            const data = { _id: uid(), gx, gz, face };
            state.level.walls.push(data);
            buildWallMesh(data);
            updateCounts();
            selectObject({ type: 'wall', data, mesh: hitboxGroup.getObjectByName(data._id) });
            return data;
        }

        function buildWallMesh(data) {
            removeObj(hitboxGroup, data._id);
            // Wall GLB visual removed — WALL mode is hitbox-only.
            // Props (GLBs) are placed separately via PROP mode.
            const { pos, rot } = wallXform(data.gx, data.gz, data.face);
            const hb = new THREE.Mesh(
                new THREE.BoxGeometry(GRID_UNIT, WALL_H, WALL_D),
                new THREE.MeshBasicMaterial({ color: 0x4488ff, wireframe: true })
            );
            hb.name = data._id; hb.position.copy(pos); hb.rotation.copy(rot);
            hb.userData = { type: 'wall', dataRef: data };
            hitboxGroup.add(hb);
        }

        function removeWall(data) {
            state.level.walls.splice(state.level.walls.indexOf(data), 1);
            removeObj(hitboxGroup, data._id);
            updateCounts();
        }

        // ═══════════════════════════════════════════════════════════
        //  COLUMNS  { _id, gx, gz, id }
        // ═══════════════════════════════════════════════════════════
        function addColumn(gx, gz) {
            if (state.level.columns.find(c => c.gx === gx && c.gz === gz)) return null;
            const data = { _id: uid(), gx, gz };
            state.level.columns.push(data);
            buildColMesh(data);
            updateCounts();
            selectObject({ type: 'column', data, mesh: hitboxGroup.getObjectByName(data._id) });
            return data;
        }

        function buildColMesh(data) {
            removeObj(hitboxGroup, data._id);

            const { wx, wz } = c2w(data.gx, data.gz);
            const hb = new THREE.Mesh(
                new THREE.CylinderGeometry(COL_R, COL_R, COL_H, 12),
                new THREE.MeshBasicMaterial({ color: 0x4488ff, wireframe: true })
            );
            hb.name = data._id; hb.position.set(wx, COL_H / 2, wz);
            hb.userData = { type: 'column', dataRef: data };
            hitboxGroup.add(hb);
        }

        function removeColumn(data) {
            state.level.columns.splice(state.level.columns.indexOf(data), 1);
            removeObj(hitboxGroup, data._id);
            updateCounts();
        }

        // ═══════════════════════════════════════════════════════════
        //  FLOORS  { _id, gx, gz, id }
        // ═══════════════════════════════════════════════════════════
        function addFloor(gx, gz, glbId) {
            if (state.level.floors.find(f => f.gx === gx && f.gz === gz)) return null;
            const data = { _id: uid(), gx, gz, id: glbId };
            state.level.floors.push(data);
            buildFloorVis(data);
            updateCounts();
            selectObject({ type: 'floor', data, mesh: propGroup.getObjectByName(data._id) });
            return data;
        }

        function buildFloorVis(data) {
            removeObj(propGroup, data._id);
            const vis = cloneModel(data.id);
            if (!vis) return;
            const { wx, wz } = c2w(data.gx, data.gz);
            vis.name = data._id; vis.position.set(wx, 0, wz);
            vis.userData = { type: 'floor', dataRef: data };
            propGroup.add(vis);
        }

        function removeFloor(data) {
            state.level.floors.splice(state.level.floors.indexOf(data), 1);
            removeObj(propGroup, data._id);
            updateCounts();
        }

        // ═══════════════════════════════════════════════════════════
        //  POINT LIGHTS
        // ═══════════════════════════════════════════════════════════
        function addPointLight(wx, wz) {
            const d = state.defaults.light;
            const data = { _id: uid(), color: d.color, intensity: d.intensity, distance: d.distance, pos: [wx, d.y, wz] };
            state.level.pointLights.push(data);
            buildLightGizmo(data);
            updateCounts();
            selectObject({ type: 'light', data, mesh: lightGroup.getObjectByName(data._id) });
            return data;
        }

        function buildLightGizmo(data) {
            removeObj(lightGroup, data._id);
            const col = new THREE.Color(data.color);
            const grp = new THREE.Group();
            grp.name = data._id; grp.position.set(data.pos[0], data.pos[1], data.pos[2]);
            grp.userData = { type: 'light', dataRef: data };
            grp.add(new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), new THREE.MeshBasicMaterial({ color: col })));
            grp.add(new THREE.PointLight(col, data.intensity, data.distance));
            const lGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, -data.pos[1], 0)]);
            grp.add(new THREE.Line(lGeo, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.35 })));
            lightGroup.add(grp);
        }

        function removeLight(data) {
            state.level.pointLights.splice(state.level.pointLights.indexOf(data), 1);
            removeObj(lightGroup, data._id);
            updateCounts();
        }

        // ═══════════════════════════════════════════════════════════
        //  FREE PROPS  (world x/z)
        // ═══════════════════════════════════════════════════════════
        function addProp(pieceId, wx, wz) {
            const d = state.defaults.prop;
            const data = { _id: uid(), pieceId, x: wx, y: 0, z: wz, rotY: d.rotY, scale: d.scale };
            state.level.props.push(data);
            buildPropMesh(data);
            updateCounts();
            selectObject({ type: 'prop', data, mesh: propGroup.getObjectByName(data._id) });
            return data;
        }

        function buildPropMesh(data) {
            removeObj(propGroup, data._id);
            const vis = cloneModel(data.pieceId);
            if (!vis) return;
            vis.name = data._id; vis.position.set(data.x, data.y, data.z);
            vis.rotation.y = data.rotY; vis.scale.setScalar(data.scale);
            vis.userData = { type: 'prop', dataRef: data };
            propGroup.add(vis);
        }

        function removeProp(data) {
            state.level.props.splice(state.level.props.indexOf(data), 1);
            removeObj(propGroup, data._id);
            updateCounts();
        }

        // Utility: remove named object from a group
        function removeObj(group, name) {
            const o = group.getObjectByName(name);
            if (o) group.remove(o);
        }

        // ═══════════════════════════════════════════════════════════
        //  SPAWNS
        // ═══════════════════════════════════════════════════════════
        function rebuildSpawns() {
            spawnGroup.clear();
            const L = state.level;
            mkSpawnGiz('playerSpawn', L.playerSpawn.x, L.playerSpawn.z, 0x00ff88);
            L.enemySpawns.forEach((es, i) => mkSpawnGiz(`enemySpawn_${i}`, es.x, es.z, 0xff3333));
            L.path.forEach((pt, i) => mkSpawnGiz(`path_${i}`, pt.x, pt.z, 0xffaa00));
            mkSpawnGiz('nexus', L.nexus.x, L.nexus.z, 0x8888ff);

            if (L.path.length >= 1) {
                const pts = [...L.path, L.nexus].map(p => new THREE.Vector3(p.x, 0.05, p.z));
                if (pts.length >= 2) {
                    spawnGroup.add(new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints(pts),
                        new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.55 })
                    ));
                }
            }
        }

        function mkSpawnGiz(id, x, z, color) {
            const grp = new THREE.Group();
            grp.name = id; grp.position.set(x, 0, z); grp.userData = { type: 'spawn', spawnId: id };
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.35, 1.0, 6), new THREE.MeshBasicMaterial({ color }));
            cone.position.y = 0.5; grp.add(cone);
            const disc = new THREE.Mesh(new THREE.CircleGeometry(0.5, 12), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.22, side: THREE.DoubleSide }));
            disc.rotation.x = -Math.PI / 2; disc.position.y = 0.01; grp.add(disc);
            spawnGroup.add(grp);
        }

        // ═══════════════════════════════════════════════════════════
        //  SELECTION
        // ═══════════════════════════════════════════════════════════
        function selectObject(obj) {
            state.selectedObject = obj;
            if (!obj) { selBox.visible = false; renderProps(); return; }
            if (obj.mesh) {
                const bb = new THREE.Box3().setFromObject(obj.mesh);
                const sz = new THREE.Vector3(), ctr = new THREE.Vector3();
                bb.getSize(sz); bb.getCenter(ctr);
                selBox.position.copy(ctr);
                selBox.scale.copy(sz.addScalar(0.15));
                selBox.visible = true;
            }
            renderProps();
        }
        function deselect() { selectObject(null); }

        // ═══════════════════════════════════════════════════════════
        //  MOUSE EVENTS
        // ═══════════════════════════════════════════════════════════
        let mouseDownAt = { x: 0, y: 0 };
        renderer.domElement.addEventListener('mousedown', e => { mouseDownAt = { x: e.clientX, y: e.clientY }; });

        renderer.domElement.addEventListener('mouseup', e => {
            if (Math.hypot(e.clientX - mouseDownAt.x, e.clientY - mouseDownAt.y) > 5) return;
            if (e.button === 2) { deselect(); return; }
            if (e.button !== 0) return;

            const wp = getFloorHit(e); if (!wp) return;
            const { gx, gz } = w2c(wp.x, wp.z);
            const { wx, wz } = c2w(gx, gz);
            const fwx = state.snapHalf ? Math.round(wp.x * 2) / 2 : (state.snapEnabled ? wx : wp.x);
            const fwz = state.snapHalf ? Math.round(wp.z * 2) / 2 : (state.snapEnabled ? wz : wp.z);

            if (state.mode === 'SELECT') {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse2d.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse2d.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse2d, camera);
                const pool = [];
                [hitboxGroup, lightGroup, spawnGroup].forEach(g => g.traverse(c => { if (c.isMesh || c.isGroup) pool.push(c); }));
                const hits = raycaster.intersectObjects(pool, false);
                if (hits.length) {
                    let tgt = hits[0].object;
                    while (tgt.parent && !tgt.userData.type) tgt = tgt.parent;
                    if (tgt.userData.type) { selectObject({ type: tgt.userData.type, data: tgt.userData.dataRef, spawnId: tgt.userData.spawnId, mesh: tgt }); return; }
                }
                deselect(); return;
            }

            if (state.mode === 'WALL') {
                addWall(gx, gz, state.selectedFace); return;
            }
            if (state.mode === 'COLUMN') {
                addColumn(gx, gz); return;
            }
            if (state.mode === 'PROP') { addProp(state.selectedPieceId, fwx, fwz); return; }
            if (state.mode === 'LIGHT') { addPointLight(fwx, fwz); return; }
            if (state.mode === 'SPAWN') {
                const L = state.level, st = state.selectedSpawnType;
                const sx = state.snapEnabled ? wx : wp.x, sz = state.snapEnabled ? wz : wp.z;
                if (st === 'playerSpawn') L.playerSpawn = { x: sx, z: sz, yaw: 0 };
                else if (st === 'enemySpawn') L.enemySpawns.push({ x: sx, z: sz });
                else if (st === 'pathNode') L.path.push({ x: sx, z: sz });
                else if (st === 'nexus') L.nexus = { x: sx, z: sz };
                rebuildSpawns(); return;
            }
        });

        renderer.domElement.addEventListener('mousemove', e => {
            const wp = getFloorHit(e); if (!wp) return;
            const { gx, gz } = w2c(wp.x, wp.z);
            const { wx, wz } = c2w(gx, gz);

            document.getElementById('st-cell').textContent = `CELL: ${gx}, ${gz}`;
            document.getElementById('st-world').textContent = `WORLD: ${wp.x.toFixed(1)}, ${wp.z.toFixed(1)}`;

            cellCursor.position.set(wx, 0.02, wz);
            cellEdges.position.set(wx, 0.03, wz);

            if (!ghost) return;
            if (state.mode === 'WALL') {
                const { pos, rot } = wallXform(gx, gz, state.selectedFace);
                ghost.position.copy(pos); ghost.rotation.copy(rot);
            } else if (state.mode === 'COLUMN') {
                ghost.position.set(wx, COL_H / 2, wz);
            } else if (state.mode === 'LIGHT') {
                ghost.position.set(wp.x, 2.5, wp.z);
            } else if (state.mode === 'SPAWN') {
                ghost.position.set(wx, 0, wz);
            } else {
                const snx = state.snapEnabled ? Math.round(wp.x / GRID_UNIT) * GRID_UNIT : wp.x;
                const snz = state.snapEnabled ? Math.round(wp.z / GRID_UNIT) * GRID_UNIT : wp.z;
                ghost.position.set(snx, 0, snz);
            }
        });

        renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (!state.selectedObject) return;
                const { type, data } = state.selectedObject;
                if (type === 'wall') removeWall(data);
                else if (type === 'column') removeColumn(data);
                else if (type === 'floor') removeFloor(data);
                else if (type === 'light') removeLight(data);
                else if (type === 'prop') removeProp(data);
                deselect();
            }
            if (e.key === 'Escape') setMode('SELECT');
            // F = cycle face forward (N→E→S→W), R = cycle face backward (N→W→S→E)
            if ((e.key === 'f' || e.key === 'F') && state.mode === 'WALL') {
                setFace(FACES[(FACES.indexOf(state.selectedFace) + 1) % FACES.length]);
            }
            if ((e.key === 'r' || e.key === 'R') && state.mode === 'WALL') {
                setFace(FACES[(FACES.indexOf(state.selectedFace) + FACES.length - 1) % FACES.length]);
            }
            if (e.key === 'g' || e.key === 'G') document.getElementById('btn-snap').click();
            // 1=SELECT  2=WALL(hitbox)  3=COLUMN(hitbox)  4=PROP(GLB)  5=LIGHT  6=SPAWN
            const mk = { '1': 'SELECT', '2': 'WALL', '3': 'COLUMN', '4': 'PROP', '5': 'LIGHT', '6': 'SPAWN' };
            if (mk[e.key]) setMode(mk[e.key]);
        });

        // ═══════════════════════════════════════════════════════════
        //  MODE & FACE
        // ═══════════════════════════════════════════════════════════
        function setMode(mode) {
            state.mode = mode;
            document.querySelectorAll('.tb-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            document.getElementById('mode-indicator').textContent = mode;
            document.getElementById('st-mode').textContent = `MODE: ${mode}`;

            const wallMode = mode === 'WALL';
            ['face-label', 'face-row', 'face-sep'].forEach(id => document.getElementById(id).style.display = wallMode ? '' : 'none');
            document.getElementById('face-indicator').style.display = wallMode ? '' : 'none';

            clearGhost();
            if (mode === 'WALL') setGhostBox(GRID_UNIT, WALL_H, WALL_D);
            else if (mode === 'COLUMN') setGhostCyl(COL_R, COL_H);
            else if (mode === 'PROP') setGhostPiece(state.selectedPieceId);
            else if (mode === 'LIGHT') setGhostLight();
            else if (mode === 'SPAWN') setGhostSpawn(state.selectedSpawnType);

            renderProps();
        }

        function setFace(face) {
            state.selectedFace = face;
            document.querySelectorAll('.face-btn').forEach(b => b.classList.toggle('active', b.dataset.face === face));
            document.getElementById('face-indicator').textContent = `FACE: ${face}`;
            // Refresh ghost orientation
            if (state.mode === 'WALL' && ghost) {
                const { rot } = wallXform(0, 0, face);
                ghost.rotation.copy(rot);
            }
        }

        document.querySelectorAll('.tb-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
        document.querySelectorAll('.face-btn').forEach(btn => btn.addEventListener('click', () => setFace(btn.dataset.face)));

        document.getElementById('btn-snap').addEventListener('click', function () {
            state.snapEnabled = !state.snapEnabled;
            this.classList.toggle('active', state.snapEnabled);
            this.textContent = state.snapEnabled ? 'GRID' : 'FREE';
            document.getElementById('st-snap').textContent = state.snapEnabled ? 'SNAP: GRID' : 'SNAP: FREE';
        });
        document.getElementById('btn-snap-half').addEventListener('click', function () {
            state.snapHalf = !state.snapHalf;
            this.classList.toggle('active', state.snapHalf);
        });
        document.getElementById('btn-toggle-hitboxes').addEventListener('click', function () {
            state.showHitboxes = !state.showHitboxes;
            hitboxGroup.visible = state.showHitboxes;
            this.textContent = `Hitboxes ${state.showHitboxes ? 'ON' : 'OFF'}`;
        });
        document.getElementById('btn-toggle-props-vis').addEventListener('click', function () {
            state.showProps = !state.showProps;
            propGroup.visible = state.showProps;
            this.textContent = `Props ${state.showProps ? 'ON' : 'OFF'}`;
        });
        document.getElementById('btn-toggle-fog').addEventListener('click', function () {
            state.fogEnabled = !state.fogEnabled;
            scene.fog = state.fogEnabled ? new THREE.Fog(
                new THREE.Color(state.level.meta.fogColor),
                state.level.meta.fogNear,
                state.level.meta.fogFar
            ) : null;
            this.classList.toggle('active', state.fogEnabled);
            this.textContent = `Fog ${state.fogEnabled ? 'ON' : 'OFF'}`;
        });

        // ═══════════════════════════════════════════════════════════
        //  PALETTE
        // ═══════════════════════════════════════════════════════════

        // Collapse state persists across renders (true = collapsed)
        const paletteSectionCollapsed = { floor: true, wall: true, column: true, prop: true, spawn: true };

        // Which mode does each piece type map to when clicked?
        function modeForPieceType(type) {
            // All GLB types → PROP mode (walls, floors, columns are visual props)
            return 'PROP';
        }

        function selectPaletteItem(pieceId) {
            state.selectedPieceId = pieceId;
            // Update selection highlights without rebuilding DOM
            document.querySelectorAll('#piece-list .piece-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.pieceId === pieceId);
            });
            // Update ghost if we're in PROP mode
            if (state.mode === 'PROP') setGhostPiece(pieceId);
        }

        function selectSpawnItem(spawnId) {
            state.selectedSpawnType = spawnId;
            document.querySelectorAll('#spawn-list .piece-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.spawnId === spawnId);
            });
            if (state.mode === 'SPAWN') setGhostSpawn(spawnId);
        }

        function renderPalette() {
            const list = document.getElementById('piece-list');
            list.innerHTML = '';

            const groups = {};
            PIECES.forEach(p => { if (!groups[p.type]) groups[p.type] = []; groups[p.type].push(p); });
            const typeOrder = ['floor', 'wall', 'column', 'prop'];
            const typeLabels = { floor: '▦ Floors (GLB)', wall: '▬ Walls (GLB)', column: '◎ Columns (GLB)', prop: '⬡ Props & Structures' };

            typeOrder.forEach(type => {
                const items = groups[type]; if (!items?.length) return;
                const collapsed = paletteSectionCollapsed[type];

                const hdr = document.createElement('div');
                hdr.className = 'panel-title';
                hdr.style.cssText = 'cursor:pointer; font-size:9px; padding:5px 10px; display:flex; justify-content:space-between; user-select:none;';
                hdr.innerHTML = `<span>${typeLabels[type] || type}</span><span class="sec-arrow">${collapsed ? '▶' : '▼'}</span>`;

                const body = document.createElement('div');
                body.dataset.palType = type;
                if (collapsed) body.style.display = 'none';

                items.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'piece-item' + (state.selectedPieceId === p.id ? ' selected' : '');
                    d.dataset.pieceId = p.id;
                    d.innerHTML = `<div class="piece-icon">${p.icon}</div><div><div class="piece-name">${p.name}</div><div class="piece-type">${p.type} → PROP</div></div>`;
                    d.addEventListener('click', () => {
                        selectPaletteItem(p.id);
                        setMode('PROP');  // all GLBs always go to PROP mode
                        renderProps();    // refresh default props panel
                    });
                    body.appendChild(d);
                });

                hdr.addEventListener('click', () => {
                    paletteSectionCollapsed[type] = !paletteSectionCollapsed[type];
                    const nowCollapsed = paletteSectionCollapsed[type];
                    body.style.display = nowCollapsed ? 'none' : '';
                    hdr.querySelector('.sec-arrow').textContent = nowCollapsed ? '▶' : '▼';
                });

                list.appendChild(hdr);
                list.appendChild(body);
            });

            // Spawn types section
            const sl = document.getElementById('spawn-list');
            sl.innerHTML = '';

            const spawnHdr = sl.previousElementSibling;  // the .panel-title above spawn-list
            // Collapse spawn section too
            const spawnCollapsed = paletteSectionCollapsed['spawn'];
            sl.style.display = spawnCollapsed ? 'none' : '';

            // Make the existing spawn panel-title collapsible if not already wired
            if (spawnHdr && !spawnHdr.dataset.colWired) {
                spawnHdr.dataset.colWired = '1';
                spawnHdr.style.cursor = 'pointer';
                spawnHdr.style.userSelect = 'none';
                spawnHdr.style.display = 'flex';
                spawnHdr.style.justifyContent = 'space-between';
                const arrow = document.createElement('span');
                arrow.className = 'spawn-arrow';
                arrow.textContent = spawnCollapsed ? '▶' : '▼';
                spawnHdr.appendChild(arrow);
                spawnHdr.addEventListener('click', () => {
                    paletteSectionCollapsed['spawn'] = !paletteSectionCollapsed['spawn'];
                    const nc = paletteSectionCollapsed['spawn'];
                    sl.style.display = nc ? 'none' : '';
                    arrow.textContent = nc ? '▶' : '▼';
                });
            } else if (spawnHdr) {
                const arrow = spawnHdr.querySelector('.spawn-arrow');
                if (arrow) arrow.textContent = spawnCollapsed ? '▶' : '▼';
            }

            SPAWN_TYPES.forEach(st => {
                const d = document.createElement('div');
                d.className = 'piece-item' + (state.selectedSpawnType === st.id ? ' selected' : '');
                d.dataset.spawnId = st.id;
                d.innerHTML = `<div class="piece-icon">${st.icon}</div><div><div class="piece-name">${st.name}</div><div class="piece-type">→ SPAWN</div></div>`;
                d.addEventListener('click', () => {
                    selectSpawnItem(st.id);
                    setMode('SPAWN');
                    renderProps();
                });
                sl.appendChild(d);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  PROPERTIES PANEL
        // ═══════════════════════════════════════════════════════════
        function renderProps() {
            const c = document.getElementById('props-content');
            let html = '';

            // ── 1. Default / next-placement panel ──────────────────
            const mode = state.mode;
            if (mode === 'LIGHT') {
                const d = state.defaults.light;
                html += secDim('✦ Next Light',
                    r3('X', 'Y', 'Z', '<span style="opacity:.4;font-size:11px;font-family:var(--mono)">cursor</span>', ni('nd-ly', d.y, 0.1), '<span style="opacity:.4;font-size:11px;font-family:var(--mono)">cursor</span>') +
                    r('Color', `<input type="color" id="nd-col" value="${d.color}">`) +
                    r2('Intensity', 'Distance', ni('nd-int', d.intensity, 0.1), ni('nd-dist', d.distance, 1))
                );
            } else if (mode === 'PROP') {
                const d = state.defaults.prop;
                const piece = PIECES.find(p => p.id === state.selectedPieceId);
                html += secDim('⬡ Next Prop',
                    r('Piece', `<div style="font-family:var(--mono);font-size:11px;color:var(--accent2);padding:3px 0">${piece ? piece.name : '—'}</div>`) +
                    r2('Rot Y', 'Scale', ni('nd-ry', d.rotY, 0.1), ni('nd-sc', d.scale, 0.1))
                );
            } else if (mode === 'WALL') {
                html += secDim('▬ Next Wall Hitbox',
                    r('Face', `<div style="font-family:var(--mono);font-size:14px;color:var(--accent);padding:4px 0;letter-spacing:4px">${state.selectedFace} — ${fLabel(state.selectedFace)}</div>`) +
                    `<div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);padding:2px 0">Hitbox only · no GLB placed<br>Use F / R to rotate face</div>`
                );
            } else if (mode === 'COLUMN') {
                html += secDim('◎ Next Column Hitbox',
                    `<div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);padding:4px 0">Hitbox only · no GLB placed</div>`
                );
            } else if (mode === 'SPAWN') {
                const st = SPAWN_TYPES.find(s => s.id === state.selectedSpawnType);
                html += secDim('⊕ Next Spawn',
                    r('Type', `<div style="font-family:var(--mono);font-size:12px;color:var(--accent2);padding:3px 0">${st?.icon || ''} ${st?.name || '—'}</div>`)
                );
            }

            // ── 2. Selected object panel ────────────────────────────
            if (state.selectedObject) {
                const { type, data, spawnId } = state.selectedObject;
                const faceOpts = FACES.map(f => `<option value="${f}"${f === data?.face ? ' selected' : ''}>${f} — ${fLabel(f)}</option>`).join('');

                if (type === 'wall' && data) {
                    html += sec('▬ Selected Wall Hitbox',
                        r2('GX', 'GZ', ni('p-gx', data.gx, 1), ni('p-gz', data.gz, 1)) +
                        r('Face', `<select id="p-face">${faceOpts}</select>`) +
                        '<button class="danger-btn" id="p-del">⌫ DELETE</button>'
                    );
                } else if (type === 'column' && data) {
                    html += sec('◎ Selected Column Hitbox',
                        r2('GX', 'GZ', ni('p-gx', data.gx, 1), ni('p-gz', data.gz, 1)) +
                        '<button class="danger-btn" id="p-del">⌫ DELETE</button>'
                    );
                } else if (type === 'floor' && data) {
                    const flrOpts = PIECES.filter(p => p.type === 'floor').map(p => `<option value="${p.id}"${p.id === data.id ? ' selected' : ''}>${p.name}</option>`).join('');
                    html += sec('▦ Selected Floor Tile',
                        r2('GX', 'GZ', ni('p-gx', data.gx, 1), ni('p-gz', data.gz, 1)) +
                        r('GLB Piece', `<select id="p-glbid">${flrOpts}</select>`) +
                        '<button class="danger-btn" id="p-del">⌫ DELETE</button>'
                    );
                } else if (type === 'light' && data) {
                    html += sec('✦ Selected Light',
                        r3('X', 'Y', 'Z', ni('p-lx', data.pos[0], 0.5), ni('p-ly', data.pos[1], 0.1), ni('p-lz', data.pos[2], 0.5)) +
                        r('Color', `<input type="color" id="p-col" value="${data.color}">`) +
                        r2('Intensity', 'Distance', ni('p-int', data.intensity, 0.1), ni('p-dist', data.distance, 1)) +
                        '<button class="danger-btn" id="p-del">⌫ DELETE</button>'
                    );
                } else if (type === 'prop' && data) {
                    html += sec('⬡ Selected Prop',
                        r('Piece', `<input type="text" value="${data.pieceId}" readonly style="opacity:.5">`) +
                        r2('X', 'Z', ni('p-x', data.x, 0.5), ni('p-z', data.z, 0.5)) +
                        r2('Rot Y', 'Scale', ni('p-ry', data.rotY, 0.1), ni('p-sc', data.scale, 0.1)) +
                        '<button class="danger-btn" id="p-del">⌫ DELETE</button>'
                    );
                } else if (type === 'spawn') {
                    html += buildSpawnHtml(spawnId);
                }
            } else if (mode === 'SELECT') {
                // No selection and not in a placement mode → show level meta
                renderLevelMeta(c);
                return;
            }

            c.innerHTML = html;
            attachDefaultListeners();
            if (state.selectedObject) attachListeners(state.selectedObject.type, state.selectedObject.data, state.selectedObject.spawnId);
        }

        // Dim section (for next-placement defaults) — slightly different styling
        function secDim(t, b) { return `<div class="prop-section" style="opacity:.85;border-left:2px solid var(--accent2)"><div class="prop-section-title" style="color:var(--accent2)">${t}</div><div class="prop-section-body">${b}</div></div>`; }

        function attachDefaultListeners() {
            const ge = id => document.getElementById(id), nv = id => { const el = ge(id); return el ? parseFloat(el.value) : null; };
            const d = state.defaults;
            // Light defaults
            ge('nd-ly')?.addEventListener('input', () => { d.light.y = nv('nd-ly') ?? d.light.y; });
            ge('nd-col')?.addEventListener('input', () => { d.light.color = ge('nd-col').value; });
            ge('nd-int')?.addEventListener('input', () => { d.light.intensity = nv('nd-int') ?? d.light.intensity; });
            ge('nd-dist')?.addEventListener('input', () => { d.light.distance = nv('nd-dist') ?? d.light.distance; });
            // Prop defaults
            ge('nd-ry')?.addEventListener('input', () => { d.prop.rotY = nv('nd-ry') ?? d.prop.rotY; });
            ge('nd-sc')?.addEventListener('input', () => { d.prop.scale = nv('nd-sc') || d.prop.scale; });
        }

        function fLabel(f) { return { N: 'North ↑', S: 'South ↓', E: 'East →', W: 'West ←' }[f] || f; }
        function sec(t, b) { return `<div class="prop-section"><div class="prop-section-title">${t}</div><div class="prop-section-body">${b}</div></div>`; }
        function r(l, i) { return `<div class="prop-row"><label>${l}</label>${i}</div>`; }
        function r2(l1, l2, i1, i2) { return `<div class="prop-row-2"><div class="prop-row"><label>${l1}</label>${i1}</div><div class="prop-row"><label>${l2}</label>${i2}</div></div>`; }
        function r3(l1, l2, l3, i1, i2, i3) { return `<div class="prop-row-3"><div class="prop-row"><label>${l1}</label>${i1}</div><div class="prop-row"><label>${l2}</label>${i2}</div><div class="prop-row"><label>${l3}</label>${i3}</div></div>`; }
        function ni(id, val, step) { return `<input type="number" id="${id}" value="${val}" step="${step}">`; }

        function buildSpawnHtml(spawnId) {
            const L = state.level;
            if (spawnId === 'playerSpawn') return sec('Player Spawn', r2('X', 'Z', ni('sp-x', L.playerSpawn.x, 1), ni('sp-z', L.playerSpawn.z, 1)) + r('Yaw (rad)', ni('sp-yaw', L.playerSpawn.yaw, 0.1)));
            if (spawnId === 'nexus') return sec('Nexus', r2('X', 'Z', ni('sp-x', L.nexus.x, 1), ni('sp-z', L.nexus.z, 1)));
            if (spawnId?.startsWith('enemySpawn_')) { const i = +spawnId.split('_')[1], es = L.enemySpawns[i]; return sec(`Enemy #${i}`, r2('X', 'Z', ni('sp-x', es.x, 1), ni('sp-z', es.z, 1)) + '<button class="danger-btn" id="p-del">⌫ REMOVE</button>'); }
            if (spawnId?.startsWith('path_')) { const i = +spawnId.split('_')[1], pt = L.path[i]; return sec(`Path Node #${i}`, r2('X', 'Z', ni('sp-x', pt.x, 1), ni('sp-z', pt.z, 1)) + '<button class="danger-btn" id="p-del">⌫ REMOVE</button>'); }
            return '';
        }

        function attachListeners(type, data, spawnId) {
            const ge = id => document.getElementById(id), nv = id => { const el = ge(id); return el ? parseFloat(el.value) : null; };

            if (type === 'wall' && data) {
                const rf = () => { data.gx = nv('p-gx') ?? data.gx; data.gz = nv('p-gz') ?? data.gz; data.face = ge('p-face')?.value || data.face; buildWallMesh(data); selectObject({ type, data, mesh: hitboxGroup.getObjectByName(data._id) }); };
                ['p-gx', 'p-gz'].forEach(id => ge(id)?.addEventListener('input', rf));
                ge('p-face')?.addEventListener('change', rf);
                ge('p-del')?.addEventListener('click', () => { removeWall(data); deselect(); });
            }
            if (type === 'column' && data) {
                const rf = () => { data.gx = nv('p-gx') ?? data.gx; data.gz = nv('p-gz') ?? data.gz; buildColMesh(data); selectObject({ type, data, mesh: hitboxGroup.getObjectByName(data._id) }); };
                ['p-gx', 'p-gz'].forEach(id => ge(id)?.addEventListener('input', rf));
                ge('p-del')?.addEventListener('click', () => { removeColumn(data); deselect(); });
            }
            if (type === 'floor' && data) {
                const rf = () => { data.gx = nv('p-gx') ?? data.gx; data.gz = nv('p-gz') ?? data.gz; data.id = ge('p-glbid')?.value || data.id; buildFloorVis(data); selectObject({ type, data, mesh: propGroup.getObjectByName(data._id) }); };
                ['p-gx', 'p-gz'].forEach(id => ge(id)?.addEventListener('input', rf));
                ge('p-glbid')?.addEventListener('change', rf);
                ge('p-del')?.addEventListener('click', () => { removeFloor(data); deselect(); });
            }
            if (type === 'light' && data) {
                const rf = () => { data.pos[0] = nv('p-lx') ?? data.pos[0]; data.pos[1] = nv('p-ly') ?? data.pos[1]; data.pos[2] = nv('p-lz') ?? data.pos[2]; data.intensity = nv('p-int') ?? data.intensity; data.distance = nv('p-dist') ?? data.distance; data.color = ge('p-col')?.value || data.color; buildLightGizmo(data); selectObject({ type, data, mesh: lightGroup.getObjectByName(data._id) }); };
                ['p-lx', 'p-ly', 'p-lz', 'p-int', 'p-dist'].forEach(id => ge(id)?.addEventListener('input', rf));
                ge('p-col')?.addEventListener('input', rf);
                ge('p-del')?.addEventListener('click', () => { removeLight(data); deselect(); });
            }
            if (type === 'prop' && data) {
                const rf = () => { data.x = nv('p-x') ?? data.x; data.z = nv('p-z') ?? data.z; data.rotY = nv('p-ry') ?? data.rotY; data.scale = nv('p-sc') || data.scale; buildPropMesh(data); selectObject({ type, data, mesh: propGroup.getObjectByName(data._id) }); };
                ['p-x', 'p-z', 'p-ry', 'p-sc'].forEach(id => ge(id)?.addEventListener('input', rf));
                ge('p-del')?.addEventListener('click', () => { removeProp(data); deselect(); });
            }
            if (type === 'spawn') {
                const L = state.level;
                const mv = () => {
                    const x = nv('sp-x'), z = nv('sp-z');
                    if (spawnId === 'playerSpawn') { L.playerSpawn.x = x; L.playerSpawn.z = z; }
                    else if (spawnId === 'nexus') { L.nexus.x = x; L.nexus.z = z; }
                    else if (spawnId?.startsWith('enemySpawn_')) { const i = +spawnId.split('_')[1]; L.enemySpawns[i].x = x; L.enemySpawns[i].z = z; }
                    else if (spawnId?.startsWith('path_')) { const i = +spawnId.split('_')[1]; L.path[i].x = x; L.path[i].z = z; }
                    rebuildSpawns();
                };
                ge('sp-x')?.addEventListener('input', mv); ge('sp-z')?.addEventListener('input', mv);
                ge('sp-yaw')?.addEventListener('input', () => { if (spawnId === 'playerSpawn') L.playerSpawn.yaw = nv('sp-yaw'); });
                ge('p-del')?.addEventListener('click', () => {
                    if (spawnId?.startsWith('enemySpawn_')) L.enemySpawns.splice(+spawnId.split('_')[1], 1);
                    else if (spawnId?.startsWith('path_')) L.path.splice(+spawnId.split('_')[1], 1);
                    rebuildSpawns(); deselect();
                });
            }
        }

        // Collapsible sections — delegated
        document.getElementById('props-content').addEventListener('click', e => {
            const t = e.target.closest('.prop-section-title'); if (!t) return;
            t.classList.toggle('collapsed'); t.nextElementSibling?.classList.toggle('collapsed');
        });

        // ═══════════════════════════════════════════════════════════
        //  LEVEL META PANEL
        // ═══════════════════════════════════════════════════════════
        function renderLevelMeta(c) {
            const L = state.level;
            c.innerHTML =
                sec('Level Info',
                    r('Name', `<input type="text" id="m-name" value="${esc(L.meta.name)}">`) +
                    r('Description', `<textarea id="m-desc">${esc(L.meta.description)}</textarea>`) +
                    r('Accent Color', `<input type="color" id="m-acc" value="${L.meta.accentColor}">`)
                ) +
                sec('Floor & Fog',
                    r2('Floor Size', 'Floor Color', ni('m-fsz', L.meta.floorSize, 1), `<input type="color" id="m-fc" value="${L.meta.floorColor}">`) +
                    r2('Fog Near', 'Fog Far', ni('m-fn', L.meta.fogNear, 0.5), ni('m-ff', L.meta.fogFar, 1)) +
                    r('Fog Color', `<input type="color" id="m-fogc" value="${L.meta.fogColor}">`)
                ) +
                sec('Ambient Light',
                    r('Color', `<input type="color" id="m-ac" value="${L.ambient.color}">`) +
                    r('Intensity', ni('m-ai', L.ambient.intensity, 0.1))
                ) +
                sec('Sun (Directional)',
                    r('Color', `<input type="color" id="m-sc" value="${L.sun.color}">`) +
                    r('Intensity', ni('m-si', L.sun.intensity, 0.1)) +
                    r3('X', 'Y', 'Z', ni('m-sx', L.sun.pos[0], 1), ni('m-sy', L.sun.pos[1], 1), ni('m-sz', L.sun.pos[2], 1))
                );

            const bnd = (id, cb) => document.getElementById(id)?.addEventListener('input', cb);
            bnd('m-name', e => L.meta.name = e.target.value);
            bnd('m-desc', e => L.meta.description = e.target.value);
            bnd('m-acc', e => L.meta.accentColor = e.target.value);
            bnd('m-fsz', e => { L.meta.floorSize = +e.target.value; syncScene(); });
            bnd('m-fc', e => { L.meta.floorColor = e.target.value; syncScene(); });
            bnd('m-fn', e => { L.meta.fogNear = +e.target.value; syncScene(); });
            bnd('m-ff', e => { L.meta.fogFar = +e.target.value; syncScene(); });
            bnd('m-fogc', e => { L.meta.fogColor = e.target.value; syncScene(); });
            bnd('m-ac', e => { L.ambient.color = e.target.value; syncScene(); });
            bnd('m-ai', e => { L.ambient.intensity = +e.target.value; syncScene(); });
            bnd('m-sc', e => { L.sun.color = e.target.value; syncScene(); });
            bnd('m-si', e => { L.sun.intensity = +e.target.value; syncScene(); });
            bnd('m-sx', e => { L.sun.pos[0] = +e.target.value; syncScene(); });
            bnd('m-sy', e => { L.sun.pos[1] = +e.target.value; syncScene(); });
            bnd('m-sz', e => { L.sun.pos[2] = +e.target.value; syncScene(); });
        }

        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        function syncScene() {
            const L = state.level;
            floorVis.scale.set(L.meta.floorSize / 40, 1, L.meta.floorSize / 40);
            floorVis.material.color.set(L.meta.floorColor);
            scene.fog = state.fogEnabled ? new THREE.Fog(
                new THREE.Color(L.meta.fogColor), L.meta.fogNear, L.meta.fogFar
            ) : null;
            scene.background.set(L.meta.fogColor);
            ambLight.color.set(L.ambient.color); ambLight.intensity = L.ambient.intensity;
            sunLight.color.set(L.sun.color); sunLight.intensity = L.sun.intensity;
            sunLight.position.set(...L.sun.pos);
        }

        function updateCounts() {
            const L = state.level;
            document.getElementById('st-counts').textContent = `W:${L.walls.length} C:${L.columns.length} F:${L.floors.length} L:${L.pointLights.length} P:${L.props.length}`;
        }

        // ═══════════════════════════════════════════════════════════
        //  EXPORT / IMPORT
        // ═══════════════════════════════════════════════════════════
        function hexNum(str) {
            try { return parseInt(new THREE.Color(str).getHexString(), 16); } catch { return 0; }
        }

        function exportLevel() {
            const L = state.level;
            return {
                name: L.meta.name, description: L.meta.description, accentColor: L.meta.accentColor,
                floorSize: L.meta.floorSize, floorColor: hexNum(L.meta.floorColor),
                fogColor: hexNum(L.meta.fogColor), fogNear: L.meta.fogNear, fogFar: L.meta.fogFar,
                ambient: { color: hexNum(L.ambient.color), intensity: L.ambient.intensity },
                sun: { color: hexNum(L.sun.color), intensity: L.sun.intensity, pos: L.sun.pos },
                pointLights: L.pointLights.map(pl => ({ color: hexNum(pl.color), intensity: pl.intensity, distance: pl.distance, pos: pl.pos })),
                // Old schema — gx/gz/face for walls, gx/gz for columns
                floors: L.floors.map(f => ({ gx: f.gx, gz: f.gz, id: f.id })),
                walls: L.walls.map(w => ({ gx: w.gx, gz: w.gz, face: w.face })),
                columns: L.columns.map(c => ({ gx: c.gx, gz: c.gz })),
                props: L.props.map(p => ({ pieceId: p.pieceId, x: p.x, y: p.y, z: p.z, rotY: p.rotY, scale: p.scale })),
                playerSpawn: { x: L.playerSpawn.x, z: L.playerSpawn.z, yaw: L.playerSpawn.yaw },
                enemySpawns: L.enemySpawns.map(es => ({ x: es.x, z: es.z })),
                path: L.path.map(pt => ({ x: pt.x, z: pt.z })),
                nexus: { x: L.nexus.x, z: L.nexus.z },
            };
        }

        function importLevel(json) {
            hitboxGroup.clear(); propGroup.clear(); lightGroup.clear(); spawnGroup.clear();
            const h = n => '#' + ((n || 0) >>> 0).toString(16).padStart(6, '0');

            state.level = {
                meta: {
                    name: json.name || 'Level', description: json.description || '', accentColor: json.accentColor || '#ff3333',
                    floorSize: json.floorSize ?? 40, floorColor: h(json.floorColor), fogColor: h(json.fogColor),
                    fogNear: json.fogNear ?? 4, fogFar: json.fogFar ?? 22
                },
                ambient: { color: h(json.ambient?.color), intensity: json.ambient?.intensity ?? 1.0 },
                sun: { color: h(json.sun?.color), intensity: json.sun?.intensity ?? 0.5, pos: json.sun?.pos ?? [2, 10, 2] },
                pointLights: [], floors: [], walls: [], columns: [], props: [],
                playerSpawn: json.playerSpawn ?? { x: 0, z: 0, yaw: 0 },
                enemySpawns: json.enemySpawns ?? [], path: json.path ?? [], nexus: json.nexus ?? { x: 0, z: 0 },
            };

            (json.floors || []).forEach(f => { const d = { _id: uid(), gx: f.gx, gz: f.gz, id: f.id }; state.level.floors.push(d); buildFloorVis(d); });
            (json.walls || []).forEach(w => { const d = { _id: uid(), gx: w.gx, gz: w.gz, face: w.face || 'N' }; state.level.walls.push(d); buildWallMesh(d); });
            (json.columns || []).forEach(c => { const d = { _id: uid(), gx: c.gx, gz: c.gz }; state.level.columns.push(d); buildColMesh(d); });
            (json.pointLights || []).forEach(pl => { const d = { _id: uid(), color: h(pl.color), intensity: pl.intensity, distance: pl.distance, pos: [...pl.pos] }; state.level.pointLights.push(d); buildLightGizmo(d); });
            (json.props || []).forEach(p => { const d = { _id: uid(), pieceId: p.pieceId, x: p.x, y: p.y || 0, z: p.z, rotY: p.rotY || 0, scale: p.scale || 1 }; state.level.props.push(d); buildPropMesh(d); });

            rebuildSpawns(); syncScene(); updateCounts(); deselect();
        }

        document.getElementById('btn-download').addEventListener('click', () => {
            const b = new Blob([JSON.stringify(exportLevel(), null, 2)], { type: 'application/json' });
            const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(b), download: `${(state.level.meta.name || 'level').replace(/\s+/g, '_').toLowerCase()}.json` });
            a.click(); URL.revokeObjectURL(a.href);
        });
        document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = ev => { try { importLevel(JSON.parse(ev.target.result)); } catch (err) { alert('Invalid JSON: ' + err.message); } };
            r.readAsText(f); e.target.value = '';
        });

        // ═══════════════════════════════════════════════════════════
        //  LEVEL MANIFEST SELECTOR  (config/levels.js → LEVEL_MANIFEST)
        // ═══════════════════════════════════════════════════════════
        (function initLevelSelector() {
            const sel = document.getElementById('level-select');
            const manifest = (typeof LEVEL_MANIFEST !== 'undefined') ? LEVEL_MANIFEST : [];

            if (!manifest.length) {
                const opt = document.createElement('option');
                opt.textContent = '(no levels.js)'; opt.disabled = true;
                sel.appendChild(opt);
                document.getElementById('btn-load-level').disabled = true;
                return;
            }

            // Add blank first option
            const blank = document.createElement('option');
            blank.value = ''; blank.textContent = '— pick level —';
            sel.appendChild(blank);

            manifest.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name.replace(/_/g, ' ');
                sel.appendChild(opt);
            });

            document.getElementById('btn-load-level').addEventListener('click', async () => {
                const name = sel.value; if (!name) return;
                const btn = document.getElementById('btn-load-level');
                btn.textContent = '…'; btn.disabled = true;
                try {
                    const resp = await fetch(`levels/${name}.json`);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const json = await resp.json();
                    importLevel(json);
                    document.getElementById('st-hint').textContent = `Loaded: levels/${name}.json`;
                } catch (err) {
                    alert(`Could not load levels/${name}.json\n${err.message}`);
                } finally {
                    btn.textContent = 'Load'; btn.disabled = false;
                }
            });
        })();

        // ═══════════════════════════════════════════════════════════
        //  RENDER LOOP + INIT
        // ═══════════════════════════════════════════════════════════
        (function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();

        renderPalette();
        renderProps();
        rebuildSpawns();
        setMode('SELECT');
        setFace('N');

    </script>
</body>

</html>
