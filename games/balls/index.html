<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drift Pool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      touch-action:none;
      background:#1a1228;
      font-family: system-ui, sans-serif;
      user-select:none; -webkit-user-select:none;
    }
    #game-container { position:fixed; inset:0; }
    #game-container canvas { display:block; position:absolute; top:0; left:0; touch-action:none; }

    /* ── Centered action bar ── */
    #action-bar {
      position:fixed; top:10px; left:50%; transform:translateX(-50%);
      z-index:30;
      display:flex; align-items:center; gap:8px;
      background:rgba(14,8,28,0.82);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:24px; padding:6px 12px;
      backdrop-filter:blur(8px);
      white-space:nowrap;
      pointer-events:auto;
    }
    #money-display {
      color:rgba(250,230,100,0.95);
      font-size:13px; font-weight:600; letter-spacing:0.04em;
      min-width:44px;
    }
    #tech-display {
      color:rgba(120,220,255,0.95);
      font-size:13px; font-weight:600; letter-spacing:0.04em;
      min-width:36px;
    }
    .top-bar-sep {
      width:1px; height:16px;
      background:rgba(255,255,255,0.12);
    }
    .action-btn {
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.20);
      color:rgba(225,215,255,0.88);
      font-size:11px; font-weight:500; letter-spacing:0.06em;
      padding:5px 12px; border-radius:14px;
      cursor:pointer; white-space:nowrap;
      transition:background 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .action-btn:active { background:rgba(255,255,255,0.18); }
    .action-btn:disabled { opacity:0.35; cursor:default; }
    #btn-clear-balls {
      background:rgba(255,255,255,0.06);
      border-color:rgba(255,255,255,0.14);
      color:rgba(200,190,220,0.65);
    }

    /* ── Unified panel modal (Shop / Research / Unlocks) ── */
    #panel-backdrop {
      position:fixed; inset:0; z-index:50;
      background:rgba(6,4,18,0.82);
      backdrop-filter:blur(8px);
      display:none; align-items:center; justify-content:center;
    }
    #panel-backdrop.visible { display:flex; }
    #panel-modal {
      background:rgba(14,8,30,0.97);
      border:1px solid rgba(160,130,255,0.25);
      border-radius:20px;
      padding:20px 22px 18px;
      width:min(92vw, 480px);
      max-height:88vh;
      overflow-y:auto;
      display:flex; flex-direction:column; gap:12px;
      box-shadow:0 0 60px rgba(120,80,255,0.14);
      position:relative;
    }
    #panel-tabs { display:flex; gap:6px; }
    #panel-status-row {
      display:flex; align-items:center; gap:10px;
      font-size:12px;
    }
    #panel-money-display { color:rgba(250,230,100,0.9); font-weight:600; }
    #panel-tech-display  { color:rgba(120,220,255,0.9); font-weight:600; }
    #panel-limit-display {
      margin-left:auto;
      font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    }
    #panel-content { display:flex; flex-direction:column; gap:10px; }
    #research-tabs {
      display:flex; gap:6px;
    }
    .res-tab {
      flex:1;
      background:rgba(20,100,160,0.12);
      border:1px solid rgba(40,160,220,0.22);
      color:rgba(100,190,230,0.65);
      font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
      padding:6px 0; border-radius:10px;
      cursor:pointer; transition:background 0.15s, color 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .res-tab.active {
      background:rgba(30,160,220,0.28);
      border-color:rgba(40,200,255,0.55);
      color:rgba(160,230,255,0.95);
    }
    .res-tab:active { background:rgba(30,160,220,0.40); }
    /* Unlock cards — slightly different tint */
    .res-card.unlock {
      background:rgba(120,60,180,0.12);
      border-color:rgba(160,100,255,0.28);
    }
    .res-card.unlock .res-card-label { color:rgba(210,180,255,0.95); }
    .res-card.unlock .res-card-desc  { color:rgba(170,140,220,0.65); }
    .res-card.unlock .res-card-level { color:rgba(140,100,200,0.6); }
    .res-card.unlock .res-buy-btn {
      background:rgba(140,60,220,0.18);
      border-color:rgba(160,100,255,0.40);
      color:rgba(200,170,255,0.92);
    }
    .res-card.unlock .res-buy-btn:active { background:rgba(140,60,220,0.36); }
    .res-card {
      display:flex; align-items:center; gap:12px;
      background:rgba(20,140,200,0.10);
      border:1px solid rgba(40,180,255,0.22);
      border-radius:14px; padding:12px 14px;
      transition:background 0.15s;
    }
    .res-card.res-cant-afford {
      opacity:0.55;
    }
    .res-card-info { flex:1; display:flex; flex-direction:column; gap:3px; }
    .res-card-label {
      color:rgba(160,230,255,0.95);
      font-size:13px; font-weight:600; letter-spacing:0.04em;
    }
    .res-card-desc {
      color:rgba(120,195,230,0.65);
      font-size:11px; letter-spacing:0.03em;
    }
    .res-card-level {
      color:rgba(80,170,220,0.5);
      font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
      margin-top:2px;
    }
    .res-buy-btn {
      background:rgba(30,160,220,0.18);
      border:1px solid rgba(40,190,255,0.40);
      color:rgba(140,220,255,0.92);
      font-size:12px; font-weight:600; letter-spacing:0.06em;
      padding:7px 14px; border-radius:12px;
      cursor:pointer; white-space:nowrap;
      transition:background 0.15s;
      -webkit-tap-highlight-color:transparent;
      flex-shrink:0;
    }
    .res-buy-btn:active { background:rgba(30,160,220,0.36); }
    .res-buy-btn:disabled { opacity:0.30; cursor:default; }

    /* ── Item cards (used in Shop and Unlocks tabs) ── */
    .shop-item-card {
      display:flex; align-items:center; gap:12px;
      background:rgba(180,140,255,0.07);
      border:1px solid rgba(180,140,255,0.18);
      border-radius:14px; padding:10px 14px;
    }
    .shop-item-info { flex:1; display:flex; flex-direction:column; gap:2px; }
    .shop-item-label {
      color:rgba(220,205,255,0.95);
      font-size:13px; font-weight:600; letter-spacing:0.04em;
    }
    .shop-item-desc {
      color:rgba(180,160,230,0.55);
      font-size:10px; letter-spacing:0.03em;
    }
    .shop-item-btn {
      background:rgba(180,120,255,0.18);
      border:1px solid rgba(180,120,255,0.40);
      color:rgba(220,200,255,0.92);
      font-size:12px; font-weight:600; letter-spacing:0.05em;
      padding:7px 14px; border-radius:12px;
      cursor:pointer; white-space:nowrap;
      transition:background 0.15s;
      -webkit-tap-highlight-color:transparent;
      flex-shrink:0;
    }
    .shop-item-btn:active { background:rgba(180,120,255,0.38); }
    .shop-item-btn:disabled { opacity:0.30; cursor:default; }
    .shop-item-card.locked { opacity:0.38; }

    /* ── Shop area overlay (balls in play — now inside shop modal, but keep for compat) ── */
    #shop-area {
      position:relative;
      display:flex; align-items:center; gap:8px;
    }
    #shop-overlay {
      display:none;
      position:absolute;
      inset:-6px -8px;
      border-radius:16px;
      background:rgba(8,4,20,0.76);
      backdrop-filter:blur(3px);
      z-index:10;
      align-items:center; justify-content:center;
      pointer-events:auto;
    }
    #shop-overlay.visible { display:flex; }
    #shop-overlay span {
      color:rgba(200,185,255,0.72);
      font-size:10px; letter-spacing:0.10em; text-transform:uppercase;
      text-align:center; line-height:1.4;
      pointer-events:none;
    }
    /* Platform limit warning — appears below the top-bar when at capacity */
    #platform-limit-warning {
      position:fixed; top:54px; left:50%; transform:translateX(-50%);
      z-index:29;
      display:none;
      background:rgba(180,30,30,0.82);
      border:1px solid rgba(255,100,100,0.45);
      border-radius:12px; padding:4px 14px;
      color:rgba(255,200,200,0.95);
      font-size:10px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase;
      backdrop-filter:blur(4px);
      pointer-events:none;
      white-space:nowrap;
    }
    #platform-limit-warning.visible { display:block; }

    /* ── Settings modal ── */
    #modal-backdrop {
      position:fixed; inset:0; z-index:50;
      background:rgba(8,4,18,0.72);
      backdrop-filter:blur(8px);
      display:none; align-items:center; justify-content:center;
    }
    #modal-backdrop.visible { display:flex; }
    #settings-modal {
      background:rgba(22,12,42,0.97);
      border:1px solid rgba(200,160,255,0.25);
      border-radius:20px;
      padding:24px 24px 20px;
      width:min(92vw, 420px);
      max-height:88vh;
      overflow-y:auto;
      display:flex; flex-direction:column; gap:18px;
      box-shadow:0 0 60px rgba(140,80,255,0.18);
    }
    .modal-title {
      color:rgba(230,210,255,0.9);
      font-size:15px; font-weight:600; letter-spacing:0.1em;
      text-transform:uppercase; text-align:center;
    }
    .modal-close {
      position:absolute; top:14px; right:18px;
      background:none; border:none;
      color:rgba(255,255,255,0.4); font-size:20px;
      cursor:pointer; line-height:1;
      -webkit-tap-highlight-color:transparent;
    }
    #settings-modal { position:relative; }
    .s-section {
      display:flex; flex-direction:column; gap:10px;
    }
    .s-label {
      color:rgba(200,180,240,0.55);
      font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    }
    .s-row {
      display:flex; align-items:center; gap:10px;
    }
    .s-row-label {
      color:rgba(220,205,255,0.75);
      font-size:12px; min-width:110px;
    }
    .s-val {
      color:rgba(230,215,255,0.9);
      font-size:12px; min-width:36px; text-align:right;
    }
    input[type=range] {
      flex:1; accent-color:#c084fc;
      height:4px; cursor:pointer;
    }
    /* Toggle */
    .s-toggle {
      display:flex; align-items:center; gap:10px; cursor:pointer;
    }
    .toggle-track {
      width:40px; height:22px; border-radius:11px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      position:relative; transition:background 0.2s;
      flex-shrink:0; cursor:pointer;
    }
    .toggle-track.on { background:rgba(180,120,255,0.55); border-color:rgba(200,150,255,0.5); }
    .toggle-thumb {
      width:16px; height:16px; border-radius:50%;
      background:rgba(255,255,255,0.85);
      position:absolute; top:2px; left:2px;
      transition:transform 0.2s;
    }
    .toggle-track.on .toggle-thumb { transform:translateX(18px); }
    .toggle-label { color:rgba(220,205,255,0.75); font-size:12px; }
    /* Reset button */
    .reset-btn {
      align-self:center;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.15);
      color:rgba(200,180,240,0.6);
      font-size:11px; letter-spacing:0.08em;
      padding:6px 16px; border-radius:12px;
      cursor:pointer; margin-top:4px;
    }
    .reset-btn:active { background:rgba(255,255,255,0.14); }
    /* Divider */
    .s-divider { border:none; border-top:1px solid rgba(255,255,255,0.07); margin:2px 0; }

    /* ── Shelf action bar ── */
    #shelf-actions {
      position:fixed; bottom:0; left:0; right:0; z-index:20;
      display:none; justify-content:center; align-items:center;
      gap:8px; padding:10px 12px 18px; flex-wrap:wrap;
      background:linear-gradient(to top, rgba(15,8,30,0.95) 65%, transparent);
      pointer-events:none;
    }
    #shelf-actions.visible { display:flex; pointer-events:auto; }
    .sa-btn {
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.18);
      color:rgba(255,255,255,0.82);
      font-size:13px; border-radius:10px;
      padding:8px 14px; cursor:pointer;
      backdrop-filter:blur(4px);
      transition:background 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .sa-btn:active { background:rgba(255,255,255,0.22); }
    .sa-btn.danger { border-color:rgba(255,120,120,0.35); color:rgba(255,160,160,0.9); }
    .sa-btn.accent { border-color:rgba(180,140,255,0.45); color:rgba(210,190,255,0.9); }

    /* ── Ball row (canvas-drawn; this div is just a hit-test spacer) ── */
    #ball-row-spacer {
      position:fixed; bottom:0; left:0; right:0;
      height:52px; z-index:14; pointer-events:none;
    }

  </style>
</head>
<body>
<div id="game-container"></div>

<!-- Settings modal -->
<div id="modal-backdrop">
  <div id="settings-modal">
    <button class="modal-close" id="btn-modal-close">✕</button>
    <div class="modal-title">Settings</div>

    <div class="s-section">
      <div class="s-label">Physics</div>
      <div class="s-row">
        <span class="s-row-label">Gravity down</span>
        <input type="range" id="sl-gravity-y" min="0.01" max="0.40" step="0.01">
        <span class="s-val" id="val-gravity-y"></span>
      </div>
      <div class="s-row">
        <span class="s-row-label">Side drift <span style="color:rgba(180,160,230,0.45);font-size:9px;font-weight:400;">(tilts gravity left/right, like a sloped table)</span></span>
        <input type="range" id="sl-gravity-x" min="-0.010" max="0.010" step="0.0005">
        <span class="s-val" id="val-gravity-x"></span>
      </div>
      <div class="s-row">
        <span class="s-row-label">Air friction</span>
        <input type="range" id="sl-air" min="0.001" max="0.04" step="0.001">
        <span class="s-val" id="val-air"></span>
      </div>
      <div class="s-row">
        <span class="s-row-label">Bounciness</span>
        <input type="range" id="sl-restitution" min="0.1" max="0.95" step="0.05">
        <span class="s-val" id="val-restitution"></span>
      </div>
      <div class="s-row">
        <span class="s-row-label">Shot power</span>
        <input type="range" id="sl-power" min="0.05" max="0.40" step="0.01">
        <span class="s-val" id="val-power"></span>
      </div>
    </div>

    <button class="reset-btn" id="btn-reset-settings">Reset physics to defaults</button>
    <button class="reset-btn" id="btn-fullscreen" style="margin-top:0">⛶ Fullscreen</button>
    <button class="reset-btn" id="btn-restart-game" style="margin-top:0; border-color:rgba(255,180,50,0.35); color:rgba(255,210,100,0.85);">↺ Restart game</button>
    <button class="reset-btn" id="btn-clear-data" style="margin-top:0; border-color:rgba(255,100,100,0.3); color:rgba(255,140,140,0.7);">🗑 Clear all saved data</button>
  </div>
</div>

<div id="top-left-btns" style="display:none"></div>

<!-- Centered action bar -->
<div id="action-bar">
  <button class="modal-close" id="btn-settings" style="position:static;font-size:15px;color:rgba(255,255,255,0.5);background:none;border:none;cursor:pointer;padding:2px 4px;">⚙</button>
  <div class="top-bar-sep"></div>
  <span id="money-display">$0</span>
  <div class="top-bar-sep"></div>
  <span id="tech-display">⬡ 0</span>
  <div class="top-bar-sep"></div>
  <button class="action-btn" id="btn-buy-basic">Ball $5</button>
  <button class="action-btn" id="btn-shop">Shop</button>
  <button class="action-btn" id="btn-research">Research</button>
  <button class="action-btn" id="btn-unlocks">Unlocks</button>
  <div class="top-bar-sep"></div>
  <button class="action-btn" id="btn-clear-balls">Clear</button>
</div>

<!-- Unified panel modal (Shop / Research / Unlocks tabs) -->
<div id="panel-backdrop">
  <div id="panel-modal">
    <button class="modal-close" id="btn-panel-close">✕</button>
    <div id="panel-tabs">
      <button class="res-tab" data-tab="shop">Shop</button>
      <button class="res-tab" data-tab="research">Research</button>
      <button class="res-tab" data-tab="unlocks">Unlocks</button>
    </div>
    <div id="panel-status-row">
      <span id="panel-money-display">$0</span>
      <span id="panel-tech-display">⬡ 0</span>
      <span id="panel-limit-display"></span>
    </div>
    <div id="panel-content"></div>
  </div>
</div>

<!-- Shelf rotate/delete actions (shown when a platform is selected) -->
<div id="shelf-actions">
  <button class="sa-btn" id="sa-rot-left">↺</button>
  <button class="sa-btn" id="sa-rot-right">↻</button>
  <button class="sa-btn danger" id="sa-sell">Sell $0</button>
</div>

<!-- Ball row spacer (actual balls drawn on canvas) -->
<div id="ball-row-spacer"></div>

<script>
'use strict';
const { Engine, Bodies, Body, World, Events } = Matter;

// ── Storage keys ──────────────────────────────────────────────────────────────
const LS_SHELVES    = 'driftpool_shelves_v3';
const LS_SETTINGS   = 'driftpool_settings_v2';
const LS_INVENTORY  = 'driftpool_inventory_v1';
const LS_MONEY      = 'driftpool_money_v1';
const LS_MAX_BALLS  = 'driftpool_maxballs_v1';
const LS_TECH_PTS   = 'driftpool_techpts_v1';
const LS_RESEARCH   = 'driftpool_research_v1';
const LS_WIRES      = 'driftpool_wires_v1';

// ── Ball type registry ────────────────────────────────────────────────────────
const BALL_TYPES = {
  basic:       { label: 'Basic',      cost: 5, paletteIdx: 0, lifetime: 10 },
  bouncy_ball: { label: 'Bouncy Ball',cost: 5, paletteIdx: 7, lifetime: 10, restitutionMult: 3.0 },
  gold_ball:   { label: 'Gold Ball',  cost: 5, paletteIdx: 3, lifetime: 10 },
  tech_ball:   { label: 'Tech Ball',  cost: 5, paletteIdx: 1, lifetime: 10 },
};
function getBallPalette(type) {
  const def = BALL_TYPES[type];
  return ALL_PALETTES[def ? def.paletteIdx : 0];
}

// ── Platform type registry ────────────────────────────────────────────────────
// Each entry: { label, cost, restitution, friction }
// 'bumper'             — static circle, earns $5 per ball hit
// 'tech_bumper'        — static circle, earns 1 Tech Point per ball hit
// 'golden_tech_bumper' — static circle, consumes $10 and earns 10 Tech Points per ball hit
// 'basic'              — static rectangle shelf, moderate restitution
const PLATFORM_TYPES = {
  bumper: {
    label:       'Gold Bumper',
    cost:        50,
    restitution: 0.98,
    friction:    0.0,
  },
  tech_bumper: {
    label:       'Tech Bumper',
    cost:        50,
    restitution: 0.98,
    friction:    0.0,
  },
  golden_tech_bumper: {
    label:       'Golden Tech Bumper',
    cost:        150,
    restitution: 0.98,
    friction:    0.0,
  },
  basic: {
    label:       'Shelf',
    cost:        10,
    width:       0.09,
    restitution: 0.65,
    friction:    0.35,
  },
  bouncy_shelf: {
    label:       'Bouncy Shelf',
    cost:        100,
    width:       0.09,
    restitution: 1.0,
    friction:    0.0,
  },
  long_shelf: {
    label:       'Long Shelf',
    cost:        50,
    width:       0.27,
    restitution: 0.65,
    friction:    0.35,
  },
  one_way_shelf: {
    label:       'One-Way Shelf',
    cost:        500,
    width:       0.09,
    restitution: 0.65,
    friction:    0.35,
  },
  split_bumper: {
    label:       'Split Bumper',
    cost:        400,
    restitution: 0.85,
    friction:    0.0,
  },
  windmill_shelf: {
    label:       'Windmill',
    cost:        333,
    width:       0.09,
    restitution: 0.5,
    friction:    0.1,
  },
  detector_shelf: {
    label:       'Detector',
    cost:        150,
    width:       0.09,
    restitution: 0.65,
    friction:    0.35,
  },
  connection_wire: {
    label:       'Wire',
    cost:        50,
  },
  time_bumper: {
    label:       'Time Bumper',
    cost:        50,
    restitution: 0.98,
    friction:    0.0,
    maxUses:     10,
  },
};

// ── Default settings ──────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
  gravityY:     0.20,
  gravityX:     0.0003,
  airFriction:  0.008,
  restitution:  0.55,
  powerMult:    0.16,
};

// ── Default shelf layout ──────────────────────────────────────────────────────
// No default platforms — players buy them in edit mode.
const DEFAULT_SHELVES = [
  { fx:0.35, fy:0.65, fw:0.20, a:-3, platformType:'basic'  },
  { fx:0.65, fy:0.45, fw:0.08, a: 0, platformType:'bumper' },
];

// ── 8 player palettes ─────────────────────────────────────────────────────────

// ── p5 sketch ─────────────────────────────────────────────────────────────────
new p5(function(p) {

  // Live settings object
  let cfg = loadSettings();

  // Dimensions
  let W, H, FLOOR_Y, LAUNCH_H, BR;

  // Physics
  let engine, world;

  // Game objects
  let balls   = [];  // {body, palette}  — in-flight physics balls
  let shelves = [];  // {body, fw(px), def{fx,fy,fw,a}, lit, toggled}
  let wires   = [];  // {p1:{x,y}, p2:{x,y}, lit, def:{p1fx,p1fy,p2fx,p2fy}}

  // ── Incremental game state ────────────────────────────────────────────────────
  // inventory: array of BallDef objects { type: string }
  // The first element is the next ball to be thrown.
  let inventory      = loadInventory();
  let money          = loadMoney();
  let maxBalls       = loadMaxBalls();
  let techPts        = loadTechPts();
  let researchLevels = loadResearch();

  // Returns true if this platform type has been unlocked (or needs no unlock)
  function isUnlocked(platformType) {
    const entry = UNLOCK_RESEARCH.find(u => u.unlocks === platformType);
    if (!entry) return true; // no unlock required
    return !!researchLevels[entry.id];
  }

  // Compute effective restitution for a bumper type including research bonuses
  function getBumperRestitution(type) {
    const base = PLATFORM_TYPES[type] ? PLATFORM_TYPES[type].restitution : 0.98;
    if (type === 'bumper')      return base + (researchLevels.goldBounce || 0) * 0.05;
    if (type === 'tech_bumper') return base + (researchLevels.techBounce || 0) * 0.05;
    return base;
  }

  // Update restitution on all existing bodies of a given bumper type
  function applyBumperRestitution(type) {
    for (const s of shelves) {
      if (s.platformType === type) {
        s.body.restitution = getBumperRestitution(type);
      }
    }
  }

  // Visuals
  let bgGfx;

  // Aiming
  let aiming = false;
  let startX=0, startY=0, curX=0, curY=0;

  // Edit availability — true only when no balls are in flight
  let canEdit         = true;
  let selectedShelf   = null;
  let dragShelf       = null;
  let selectedWire    = null;   // index into wires[]
  let dragWireEp      = null;   // { wireIdx, ep:'p1'|'p2' }

  // Modal pause
  let paused = false;

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const btnSettings      = document.getElementById('btn-settings');
  const modalBackdrop    = document.getElementById('modal-backdrop');
  const btnModalClose    = document.getElementById('btn-modal-close');
  const shelfActions     = document.getElementById('shelf-actions');
  const actionBar        = document.getElementById('action-bar');
  const moneyDisplay     = document.getElementById('money-display');
  const techDisplay      = document.getElementById('tech-display');
  const researchBackdrop = null; // merged into panelBackdrop
  const shopBackdrop     = null; // merged into panelBackdrop
  const panelBackdrop    = document.getElementById('panel-backdrop');

  // ── Setup ───────────────────────────────────────────────────────────────────
  p.setup = function() {
    const cnv = p.createCanvas(window.innerWidth, window.innerHeight);
    cnv.parent('game-container');
    cnv.elt.addEventListener('contextmenu', e => e.preventDefault());
    cnv.elt.addEventListener('touchstart',  e => { e.preventDefault(); onTouchStart(e);   }, {passive:false});
    cnv.elt.addEventListener('touchmove',   e => { e.preventDefault(); onTouchMove(e);    }, {passive:false});
    cnv.elt.addEventListener('touchend',    e => { e.preventDefault(); onTouchEnd(e);     }, {passive:false});
    cnv.elt.addEventListener('touchcancel', e => { e.preventDefault(); resetInteraction();}, {passive:false});

    buildSettingsUI();
    wireUI();
    initAll();
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    rebuildAfterResize();
  };

  // ── Init / rebuild ───────────────────────────────────────────────────────────
  function initAll() {
    W = p.width; H = p.height;
    LAUNCH_H = Math.round(H * 0.25);
    FLOOR_Y  = H - LAUNCH_H;
    BR = Math.round(p.constrain(W * 0.027, 10, 18));

    resetInteraction();

    if (engine) { World.clear(world); Engine.clear(engine); }
    balls = []; shelves = []; wires = [];

    engine = Engine.create();
    engine.gravity.x = cfg.gravityX;
    engine.gravity.y = cfg.gravityY;
    world  = engine.world;

    Events.on(engine, 'afterUpdate', handleFallOff);
    Events.on(engine, 'collisionStart',  handleBumperCollision);
    Events.on(engine, 'collisionStart',  handleOneWayShelf);
    Events.on(engine, 'collisionActive', handleOneWayShelf);
    Events.on(engine, 'collisionStart',  handleSpecialBallCollision);

    const wo = {isStatic:true, friction:0.1, restitution:0.45};
    World.add(world, [
      Bodies.rectangle(-25,   H/2,   50,  H*2, wo), // left
      Bodies.rectangle(W+25,  H/2,   50,  H*2, wo), // right
      Bodies.rectangle(W/2,  -25,   W*2,   50, wo), // top
    ]);

    const defs = loadShelfDefs();
    for (const d of defs) spawnShelf(d);

    const wireDefs = loadWires();
    for (const wd of wireDefs) spawnWire(wd);

    buildBg();
    updateMoneyDisplay();
    updateBallRow();
  }

  function rebuildAfterResize() {
    const defs = shelves.map(s => s.def);
    saveShelfDefs(defs);
    saveWires(wires.map(w => w.def));

    W = p.width; H = p.height;
    LAUNCH_H = Math.round(H * 0.25);
    FLOOR_Y  = H - LAUNCH_H;
    BR = Math.round(p.constrain(W * 0.027, 10, 18));
    resetInteraction();

    World.clear(world); Engine.clear(engine);
    balls = []; shelves = []; wires = [];

    engine = Engine.create();
    engine.gravity.x = cfg.gravityX;
    engine.gravity.y = cfg.gravityY;
    world  = engine.world;
    Events.on(engine, 'afterUpdate', handleFallOff);
    Events.on(engine, 'collisionStart',  handleBumperCollision);
    Events.on(engine, 'collisionStart',  handleOneWayShelf);
    Events.on(engine, 'collisionActive', handleOneWayShelf);
    Events.on(engine, 'collisionStart',  handleSpecialBallCollision);

    const wo = {isStatic:true, friction:0.1, restitution:0.45};
    World.add(world, [
      Bodies.rectangle(-25,   H/2,   50,  H*2, wo), // left
      Bodies.rectangle(W+25,  H/2,   50,  H*2, wo), // right
      Bodies.rectangle(W/2,  -25,   W*2,   50, wo), // top
    ]);
    for (const d of defs) spawnShelf(d);
    for (const wd of loadWires()) spawnWire(wd);
    buildBg();
  }

  function spawnShelf(def) {
    const sx = def.fx * W, sy = def.fy * H;
    const pt = def.platformType || 'basic';
    let body, fw;

    if (pt === 'bumper' || pt === 'tech_bumper' || pt === 'split_bumper' || pt === 'golden_tech_bumper' || pt === 'time_bumper') {
      const pd = PLATFORM_TYPES[pt];
      const radius = BR;
      fw = radius * 2;
      const restitution = (pt === 'bumper' || pt === 'tech_bumper')
        ? getBumperRestitution(pt)
        : pd.restitution;
      body = Bodies.circle(sx, sy, radius, {
        isStatic: true, friction: pd.friction, restitution,
        label: pt,
      });
    } else {
      // 'basic' (and any future rect types)
      const pd = PLATFORM_TYPES[pt] || PLATFORM_TYPES.basic;
      fw = (def.fw || pd.width) * W;
      body = Bodies.rectangle(sx, sy, fw, 20, {
        isStatic: true, friction: pd.friction, restitution: pd.restitution,
        label: pt,
      });
      Body.setAngle(body, (def.a || 0) * Math.PI / 180);
    }

    World.add(world, body);
    shelves.push({
      body,
      fw,
      platformType: pt,
      def: { ...def, fw: fw / W, platformType: pt },
      lit: false,
      toggled: false,
      toggleCooldown: 0,
      usesLeft: (pt === 'time_bumper') ? (def.usesLeft ?? PLATFORM_TYPES.time_bumper.maxUses) : undefined,
    });
  }

  function spawnWire(def) {
    const w = {
      p1: { x: def.p1fx * W, y: def.p1fy * H },
      p2: { x: def.p2fx * W, y: def.p2fy * H },
      lit: false,
      def: { ...def },
    };
    wires.push(w);
  }

  function syncWireDef(idx) {
    const w = wires[idx];
    w.def.p1fx = w.p1.x / W; w.def.p1fy = w.p1.y / H;
    w.def.p2fx = w.p2.x / W; w.def.p2fy = w.p2.y / H;
    saveAllDefs();
  }

  function syncDef(idx) {
    const s = shelves[idx];
    s.def.fx = s.body.position.x / W;
    s.def.fy = s.body.position.y / H;
    s.def.fw = s.fw / W;
    s.def.a  = s.body.angle * 180 / Math.PI;
    s.def.platformType = s.platformType;
    if (s.platformType === 'time_bumper') s.def.usesLeft = s.usesLeft;
    saveAllDefs();
  }
  function saveAllDefs() {
    saveShelfDefs(shelves.map(s => s.def));
    saveWires(wires.map(w => w.def));
  }

  // ── Background ──────────────────────────────────────────────────────────────
  function buildBg() {
    if (bgGfx) bgGfx.remove();
    bgGfx = p.createGraphics(W, H);
    for (let y=0; y<H; y++) {
      const t=y/H;
      bgGfx.stroke(p.lerp(20,38,t), p.lerp(14,22,t), p.lerp(40,58,t));
      bgGfx.line(0,y,W,y);
    }
    bgGfx.noStroke();
    const cr=Math.min(W,H)*0.55;
    for (let r=cr; r>0; r-=5) {
      bgGfx.fill(110,70,175, p.map(r,0,cr,14,0));
      bgGfx.ellipse(W/2, H*0.42, r*2, r*1.5);
    }
    for (let y=FLOOR_Y; y<H; y++) {
      const t=(y-FLOOR_Y)/LAUNCH_H;
      bgGfx.stroke(65,30,120, p.lerp(0,90,t));
      bgGfx.line(0,y,W,y);
    }
  }

  // ── Physics ──────────────────────────────────────────────────────────────────

  function handleFallOff() {
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];

      // Remove if fallen off the bottom
      if (b.body.position.y > H + 80) {
        World.remove(world, b.body);
        balls.splice(i, 1);
        continue;
      }

      // Count down lifetime (in frames at 60 fps)
      b.lifeFrames -= 1;
      if (b.lifeFrames <= 0) {
        World.remove(world, b.body);
        balls.splice(i, 1);
      }
    }
    // Update canEdit whenever ball count changes
    const nowCanEdit = balls.length === 0;
    if (nowCanEdit !== canEdit) {
      canEdit = nowCanEdit;
      if (!canEdit) {
        selectedShelf = null;
        dragShelf = null;
        shelfActions.classList.remove('visible');
      }
      updateMoneyDisplay();
    }
  }

  // ── Inventory UI ─────────────────────────────────────────────────────────────
  function updateMoneyDisplay() {
    moneyDisplay.textContent = '$' + money;
    techDisplay.textContent  = '⬡ ' + techPts;

    const effectiveMax      = maxBalls + (researchLevels.maxSlots || 0);
    const full              = inventory.length >= effectiveMax;
    const effectiveBallCost = BALL_TYPES.basic.cost + (researchLevels.ballTime || 0) * 5;
    const buyBallBtn        = document.getElementById('btn-buy-basic');
    if (buyBallBtn) {
      buyBallBtn.textContent = `Ball $${effectiveBallCost}`;
      buyBallBtn.disabled    = money < effectiveBallCost || full;
    }

    // Refresh panel if open
    if (panelBackdrop.classList.contains('visible')) buildPanelUI();
  }

  // Ball row is drawn on canvas — this just triggers a redraw flag (no-op; draw is per-frame)
  function updateBallRow() { /* drawn in p.draw via drawInventoryRow() */ }

  // Buy a ball of the given type id
  function buyBall(type) {
    const def = BALL_TYPES[type];
    const effectiveCost = def.cost + (researchLevels.ballTime || 0) * 5;
    if (!def || money < effectiveCost || inventory.length >= maxBalls + (researchLevels.maxSlots || 0)) return;
    money -= effectiveCost;

    // 5% chance per unlocked ball research to upgrade the ball type
    let chosenType = type;
    const roll = Math.random();
    const options = [];
    if (researchLevels.bouncyBalls > 0) options.push('bouncy_ball');
    if (researchLevels.goldBalls   > 0) options.push('gold_ball');
    if (researchLevels.techBalls   > 0) options.push('tech_ball');
    const totalChance = options.length * 0.05;
    if (options.length > 0 && roll < totalChance) {
      const pick = Math.floor((roll / totalChance) * options.length);
      chosenType = options[pick];
    }

    inventory.push({ type: chosenType });
    saveMoney(money);
    saveInventory(inventory);
    updateMoneyDisplay();
  }

  // ── Platform cost scaling ────────────────────────────────────────────────────
  function platformCost(type) {
    const def = PLATFORM_TYPES[type];
    if (!def) return Infinity;
    if (type === 'connection_wire') {
      const count = wires.length;
      return Math.ceil(def.cost + 0.5 * def.cost * Math.pow(count, 1.5));
    }
    if (type === 'time_bumper') {
      // Count only bumpers with uses remaining; price resets when all are gone
      const count = shelves.filter(s => s.platformType === 'time_bumper' && (s.usesLeft ?? 0) > 0).length;
      return Math.ceil(def.cost + 0.5 * def.cost * Math.pow(count, 1.5));
    }
    const count = shelves.filter(s => s.platformType === type).length;
    return Math.ceil(def.cost + 0.5 * def.cost * Math.pow(count, 1.5));
  }

  // Buy a platform and place it centred in the play area
  function buyPlatform(type) {
    const def = PLATFORM_TYPES[type];
    const platformLimit = BASE_PLATFORM_LIMIT + (researchLevels.platformSlots || 0);
    const cost = platformCost(type);
    if (!def || money < cost || !canEdit || !isUnlocked(type)) return;

    // Wires don't use the platform body limit
    if (type === 'connection_wire') {
      money -= cost;
      saveMoney(money);
      const cx = 0.5, cy = 0.4;
      spawnWire({ p1fx: cx - 0.08, p1fy: cy, p2fx: cx + 0.08, p2fy: cy });
      selectedWire  = wires.length - 1;
      selectedShelf = null;
      shelfActions.classList.add('visible');
      updateSellButton();
      saveAllDefs();
      updateMoneyDisplay();
      return;
    }

    if (shelves.length >= platformLimit) return;
    money -= cost;
    saveMoney(money);
    updateMoneyDisplay();
    const isCircle = type === 'bumper' || type === 'tech_bumper' || type === 'split_bumper' || type === 'golden_tech_bumper' || type === 'time_bumper';
    const fw = isCircle ? (BR * 2) / W : (def.width || 0.09);
    spawnShelf({ fx: 0.5, fy: 0.5, fw, a: 0, platformType: type });
    selectedShelf = shelves.length - 1;
    selectedWire  = null;
    shelfActions.classList.add('visible');
    updateSellButton();
    saveAllDefs();
  }

  // ── Bumper collision ─────────────────────────────────────────────────────────
  // Awards $10 every time a ball hits a bumper from any direction.
  // ── Bouncy shelf speed constant ───────────────────────────────────────────────
  const BOUNCY_MIN_SPEED = 18; // px/frame — minimum speed after hitting a bouncy shelf

  function handleBumperCollision(event) {
    for (const pair of event.pairs) {
      const { bodyA, bodyB } = pair;
      const labelA = bodyA.label, labelB = bodyB.label;

      if (labelA === 'bumper' || labelB === 'bumper') {
        money += 5 + (researchLevels.goldGain || 0);
        saveMoney(money);
        updateMoneyDisplay();
      } else if (labelA === 'tech_bumper' || labelB === 'tech_bumper') {
        techPts += 1 + (researchLevels.techGain || 0);
        saveTechPts(techPts);
        updateMoneyDisplay();
      } else if (labelA === 'golden_tech_bumper' || labelB === 'golden_tech_bumper') {
        money   = Math.max(0, money - 10);
        techPts += 10;
        saveMoney(money);
        saveTechPts(techPts);
        updateMoneyDisplay();
      } else if (labelA === 'bouncy_shelf' || labelB === 'bouncy_shelf') {
        const ballBody  = labelA === 'bouncy_shelf' ? bodyB : bodyA;
        const shelfBody = labelA === 'bouncy_shelf' ? bodyA : bodyB;
        // If toggled off by a wire signal, act as a normal shelf (no kick)
        const shelfEntry = shelves.find(s => s.body === shelfBody);
        if (shelfEntry && shelfEntry.toggled) break;

        const dx = ballBody.position.x - shelfBody.position.x;
        const dy = ballBody.position.y - shelfBody.position.y;
        const dist = Math.hypot(dx, dy) || 1;
        const nx = dx / dist, ny = dy / dist;
        const curSpeed = Math.hypot(ballBody.velocity.x, ballBody.velocity.y);
        const speed    = Math.max(curSpeed, BOUNCY_MIN_SPEED);
        Body.setVelocity(ballBody, { x: nx * speed, y: ny * speed });
      } else if (labelA === 'split_bumper' || labelB === 'split_bumper') {
        const ballBody = labelA === 'split_bumper' ? bodyB : bodyA;
        // Defer split so Matter.js finishes this collision step cleanly
        pendingSplits.push(ballBody.id);
      } else if (labelA === 'time_bumper' || labelB === 'time_bumper') {
        const shelfBody = labelA === 'time_bumper' ? bodyA : bodyB;
        const ballBody  = labelA === 'time_bumper' ? bodyB : bodyA;
        const shelfIdx  = shelves.findIndex(s => s.body === shelfBody);
        if (shelfIdx === -1) continue;
        const s = shelves[shelfIdx];
        if (s.usesLeft <= 0) continue;

        // Double the ball's remaining lifetime
        const ballObj = balls.find(b => b.body === ballBody);
        if (ballObj) {
          ballObj.lifeFrames      = ballObj.lifeFrames * 2;
          ballObj.totalLifeFrames = Math.max(ballObj.totalLifeFrames, ballObj.lifeFrames);
        }

        // Consume one use
        s.usesLeft -= 1;
        s.def.usesLeft = s.usesLeft;
        saveAllDefs();

        // Schedule removal if depleted
        if (s.usesLeft <= 0) {
          pendingTimeBumperRemovals.push(shelfIdx);
        }
        updateMoneyDisplay();
      }
    }
  }

  // ── Signal system constants ───────────────────────────────────────────────────
  const DETECT_DEPTH    = 60;   // px above the detector shelf face that counts as "in range"
  const DETECT_WIDTH_PAD = 8;   // extra px either side of fw/2 for detection
  const WIRE_SNAP_R     = 26;   // px — how close an endpoint must be to connect to an object

  const TOGGLEABLE_TYPES = new Set(['windmill_shelf', 'bouncy_shelf', 'one_way_shelf']);

  // Called every frame before rendering — computes s.lit, wire.lit, s.toggled
  function updateSignals() {
    // 1. Detector shelves: lit if any ball is in front (upward face corridor)
    for (const s of shelves) {
      s.lit     = false;
      s.toggled = false;
      if (s.platformType !== 'detector_shelf') continue;
      const px = s.body.position.x, py = s.body.position.y;
      const ang = s.body.angle;
      const cosA = Math.cos(-ang), sinA = Math.sin(-ang);
      const halfW = s.fw / 2 + DETECT_WIDTH_PAD;
      for (const b of balls) {
        const dx = b.body.position.x - px, dy = b.body.position.y - py;
        const lx =  dx * cosA - dy * sinA;
        const ly =  dx * sinA + dy * cosA;
        if (Math.abs(lx) <= halfW && ly >= -DETECT_DEPTH && ly <= 10) {
          s.lit = true; break;
        }
      }
    }

    // 2. Wire lit: an endpoint is within WIRE_SNAP_R of a lit detector OR another lit wire ep.
    //    We propagate until stable (max 8 passes for chained wires).
    for (const w of wires) w.lit = false;
    for (let pass = 0; pass < 8; pass++) {
      let changed = false;
      for (const w of wires) {
        if (w.lit) continue;
        if (_wireEpNearLit(w.p1) || _wireEpNearLit(w.p2)) {
          w.lit = true; changed = true;
        }
      }
      if (!changed) break;
    }

    // 3. Toggleable shelves: toggled if any lit wire endpoint is within WIRE_SNAP_R
    //    Cooldown of ~3s (180 frames) prevents rapid re-toggling.
    const TOGGLE_COOLDOWN = 180;
    for (const s of shelves) {
      if (!TOGGLEABLE_TYPES.has(s.platformType)) continue;

      // Count down cooldown
      if (s.toggleCooldown > 0) { s.toggleCooldown -= 1; continue; }

      const wantToggled = wires.some(w => {
        if (!w.lit) return false;
        const cx = s.body.position.x, cy = s.body.position.y;
        return Math.hypot(w.p1.x - cx, w.p1.y - cy) <= WIRE_SNAP_R ||
               Math.hypot(w.p2.x - cx, w.p2.y - cy) <= WIRE_SNAP_R;
      });

      if (wantToggled !== s.toggled) {
        s.toggled = wantToggled;
        s.toggleCooldown = TOGGLE_COOLDOWN;
      }
    }
  }

  // Helper: is this point near any lit detector or lit wire endpoint?
  function _wireEpNearLit(pt) {
    for (const s of shelves) {
      if (s.platformType !== 'detector_shelf' || !s.lit) continue;
      if (Math.hypot(pt.x - s.body.position.x, pt.y - s.body.position.y) <= WIRE_SNAP_R) return true;
    }
    for (const w of wires) {
      if (!w.lit) continue;
      if (Math.hypot(pt.x - w.p1.x, pt.y - w.p1.y) <= WIRE_SNAP_R) return true;
      if (Math.hypot(pt.x - w.p2.x, pt.y - w.p2.y) <= WIRE_SNAP_R) return true;
    }
    return false;
  }
  const WIND_LENGTH    = 320;   // how far the corridor extends (px)
  const WIND_WIDTH_PAD = 14;    // extra px either side beyond fw/2
  const WIND_STRENGTH  = 0.28;  // velocity impulse per frame (px/frame)

  // Applies wind impulses to all balls in range of each windmill shelf.
  // Called once per physics frame (inside processPendingSplits is fine).
  function applyWindForces() {
    for (const s of shelves) {
      if (s.platformType !== 'windmill_shelf') continue;
      if (s.toggled) continue; // suppressed by wire signal
      const px  = s.body.position.x;
      const py  = s.body.position.y;
      const ang = s.body.angle;
      // Shelf up-normal in world space (direction wind blows toward)
      const upNx = -Math.sin(ang);
      const upNy = -Math.cos(ang);
      const halfW = s.fw / 2 + WIND_WIDTH_PAD;

      for (const b of balls) {
        const dx = b.body.position.x - px;
        const dy = b.body.position.y - py;
        // Transform to shelf local space
        const cosA = Math.cos(-ang), sinA = Math.sin(-ang);
        const lx   =  dx * cosA - dy * sinA;  // along shelf length
        const ly   =  dx * sinA + dy * cosA;  // perpendicular (+ = above in screen, - = below)

        // Ball must be within width and in the upward corridor (ly negative = above shelf)
        if (Math.abs(lx) > halfW) continue;
        if (ly > -10) continue;            // below or on the shelf surface — skip
        if (ly < -(WIND_LENGTH + 10)) continue; // too far away

        // Fade force linearly from full at the shelf to 0 at WIND_LENGTH
        const dist   = Math.abs(ly);
        const factor = 1 - dist / WIND_LENGTH;
        const force  = WIND_STRENGTH * factor;

        Body.setVelocity(b.body, {
          x: fin(b.body.velocity.x + upNx * force),
          y: fin(b.body.velocity.y + upNy * force),
        });
      }
    }
  }
  let pendingSplits = [];
  let pendingTimeBumperRemovals = [];

  function processPendingSplits() {
    if (pendingSplits.length === 0) return;
    const ids = pendingSplits;
    pendingSplits = [];

    for (const id of ids) {
      const idx = balls.findIndex(b => b.body.id === id);
      if (idx === -1) continue; // already removed
      const b = balls[idx];

      const x   = fin(b.body.position.x);
      const y   = fin(b.body.position.y);
      const vx  = b.body.velocity.x;
      const vy  = b.body.velocity.y;
      const spd = Math.hypot(vx, vy) || 8;
      const parentRadius = b.radius ?? BR;

      // Only split balls that are still full-size (don't chain-split)
      if (parentRadius < BR * 0.75) continue;

      const childRadius = parentRadius * 0.5;
      const childLife   = Math.ceil(b.lifeFrames * 0.5);

      // Two outgoing directions: rotate velocity ±60°
      const angle = Math.atan2(vy, vx);
      const spread = Math.PI / 3; // 60°

      for (const sign of [-1, 1]) {
        const a  = angle + sign * spread;
        const cb = Bodies.circle(x, y, childRadius, {
          restitution: cfg.restitution,
          friction:    0.04,
          frictionAir: cfg.airFriction,
          density:     0.002,
        });
        Body.setVelocity(cb, { x: Math.cos(a) * spd, y: Math.sin(a) * spd });
        World.add(world, cb);
        balls.push({
          body:            cb,
          palette:         b.palette,
          lifeFrames:      childLife,
          totalLifeFrames: childLife,
          radius:          childRadius,
        });
      }

      // Remove the original ball
      World.remove(world, b.body);
      balls.splice(idx, 1);
    }
  }

  function processTimeBumperRemovals() {
    if (pendingTimeBumperRemovals.length === 0) return;
    // Sort descending so splice indices stay valid
    const indices = [...new Set(pendingTimeBumperRemovals)].sort((a, b) => b - a);
    pendingTimeBumperRemovals = [];
    for (const idx of indices) {
      if (idx < 0 || idx >= shelves.length) continue;
      World.remove(world, shelves[idx].body);
      shelves.splice(idx, 1);
    }
    if (selectedShelf !== null && selectedShelf >= shelves.length) {
      selectedShelf = null;
      shelfActions.classList.remove('visible');
    }
    saveAllDefs();
    updateMoneyDisplay();
  }
  // We test by projecting the ball→shelf vector onto the shelf's up-normal.
  // If the ball is on the lower side (positive projection with downward normal),
  // we cancel the collision so the ball passes through.
  function handleOneWayShelf(event) {
    for (const pair of event.pairs) {
      const { bodyA, bodyB } = pair;
      const labelA = bodyA.label, labelB = bodyB.label;
      if (labelA !== 'one_way_shelf' && labelB !== 'one_way_shelf') continue;

      const shelfBody = labelA === 'one_way_shelf' ? bodyA : bodyB;
      const ballBody  = labelA === 'one_way_shelf' ? bodyB : bodyA;

      // If toggled by wire, behave as a normal solid shelf — don't cancel any collisions
      const shelfEntry = shelves.find(s => s.body === shelfBody);
      if (shelfEntry && shelfEntry.toggled) continue;

      const a    = shelfBody.angle;
      const upNx = -Math.sin(a), upNy = -Math.cos(a);
      const dx   = ballBody.position.x - shelfBody.position.x;
      const dy   = ballBody.position.y - shelfBody.position.y;
      const dot  = dx * upNx + dy * upNy;
      if (dot < 0) pair.isActive = false; // ball below — pass through
    }
  }

  // ── Special ball collision effects ───────────────────────────────────────────
  // Gold balls earn $1, tech balls earn 1⬡ on any collision with a static body.
  function handleSpecialBallCollision(event) {
    for (const pair of event.pairs) {
      const { bodyA, bodyB } = pair;
      // Find which is a special ball (check our balls array)
      let ballBody = null;
      if (bodyA._ballType && bodyA._ballType !== 'basic' && bodyA._ballType !== 'bouncy_ball') ballBody = bodyA;
      else if (bodyB._ballType && bodyB._ballType !== 'basic' && bodyB._ballType !== 'bouncy_ball') ballBody = bodyB;
      if (!ballBody) continue;

      if (ballBody._ballType === 'gold_ball') {
        money += researchLevels.goldBalls || 1;
        saveMoney(money);
        updateMoneyDisplay();
      } else if (ballBody._ballType === 'tech_ball') {
        techPts += researchLevels.techBalls || 1;
        saveTechPts(techPts);
        updateMoneyDisplay();
      }
    }
  }

  function drawInventoryRow() {
    const gc  = p.drawingContext;
    const r   = BR;
    const gap = r * 2.6;
    const maxW = W - 40;
    const effectiveMax = maxBalls + (researchLevels.maxSlots || 0);
    const visCount = Math.min(effectiveMax, Math.floor(maxW / gap) || 1);
    const rowW  = visCount * gap - (gap - r * 2);
    const row0X = W / 2 - rowW / 2 + r;
    const cy    = H - r - 14;

    for (let i = 0; i < visCount; i++) {
      const cx      = row0X + i * gap;
      const hasBall = i < inventory.length;
      const isNext  = (i === 0) && hasBall;
      const drawR   = isNext ? r * 1.22 : r;

      if (hasBall) {
        const ball = inventory[i];
        const pal  = getBallPalette(ball.type);

        // Outer glow for next ball
        if (isNext) {
          const gw = gc.createRadialGradient(cx, cy, 0, cx, cy, drawR * 2.4);
          gw.addColorStop(0, hexA(pal[1], 0.22));
          gw.addColorStop(1, 'rgba(0,0,0,0)');
          gc.fillStyle = gw;
          gc.beginPath(); gc.arc(cx, cy, drawR * 2.4, 0, Math.PI * 2); gc.fill();
        }

        // Ball body
        const gr = gc.createRadialGradient(cx - drawR * .32, cy - drawR * .38, drawR * .04, cx, cy, drawR);
        gr.addColorStop(0, pal[0]);
        gr.addColorStop(0.55, pal[1]);
        gr.addColorStop(1, pal[2]);
        gc.globalAlpha = isNext ? 1.0 : 0.5;
        gc.fillStyle = gr;
        gc.beginPath(); gc.arc(cx, cy, drawR, 0, Math.PI * 2); gc.fill();

        // Specular highlight
        const sp = gc.createRadialGradient(cx - drawR*.3, cy - drawR*.4, 0, cx - drawR*.3, cy - drawR*.4, drawR*.48);
        sp.addColorStop(0, 'rgba(255,255,255,0.78)');
        sp.addColorStop(1, 'rgba(255,255,255,0)');
        gc.fillStyle = sp;
        gc.beginPath(); gc.arc(cx, cy, drawR, 0, Math.PI * 2); gc.fill();

        gc.strokeStyle = 'rgba(255,255,255,0.12)'; gc.lineWidth = 0.7;
        gc.beginPath(); gc.arc(cx, cy, drawR, 0, Math.PI * 2); gc.stroke();
        gc.globalAlpha = 1;

        // Pulse ring on next ball
        if (isNext) {
          const pulse = (Math.sin(p.frameCount * 0.065) + 1) / 2;
          gc.strokeStyle = hexA(pal[1], 0.28 * (1 - pulse));
          gc.lineWidth = 1.5;
          gc.beginPath(); gc.arc(cx, cy, drawR + 4 + pulse * 6, 0, Math.PI * 2); gc.stroke();
        }

      } else {
        // Empty slot — ghost circle
        gc.globalAlpha = 1;
        gc.strokeStyle = 'rgba(255,255,255,0.10)';
        gc.lineWidth   = 1.2;
        gc.setLineDash([3, 4]);
        gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
        gc.setLineDash([]);

        // Faint inner fill so the slot reads as a "hole"
        gc.fillStyle = 'rgba(255,255,255,0.03)';
        gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
      }
    }
  }

  // ── Settings UI build ────────────────────────────────────────────────────────
  function buildSettingsUI() {
    setupSlider('sl-gravity-y', 'val-gravity-y', cfg.gravityY,     v => { cfg.gravityY = v; applyGravity(); });
    setupSlider('sl-gravity-x', 'val-gravity-x', cfg.gravityX,     v => { cfg.gravityX = v; applyGravity(); });
    setupSlider('sl-air',       'val-air',        cfg.airFriction,  v => { cfg.airFriction = v; });
    setupSlider('sl-restitution','val-restitution',cfg.restitution, v => { cfg.restitution = v; });
    setupSlider('sl-power',     'val-power',      cfg.powerMult,    v => { cfg.powerMult = v; });
  }

  function setupSlider(sliderId, valId, initVal, onChange) {
    const sl  = document.getElementById(sliderId);
    const val = document.getElementById(valId);
    sl.value = initVal;
    val.textContent = fmtVal(initVal);
    sl.addEventListener('input', () => {
      const v = parseFloat(sl.value);
      val.textContent = fmtVal(v);
      onChange(v);
      saveSettings(cfg);
    });
  }

  function fmtVal(v) {
    if (Math.abs(v) < 0.01) return v.toFixed(4);
    if (Math.abs(v) < 0.1)  return v.toFixed(3);
    return v.toFixed(2);
  }

  function applyGravity() {
    if (engine) { engine.gravity.x = cfg.gravityX; engine.gravity.y = cfg.gravityY; }
  }

  function buildPanelUI() {

    // Update status row
    document.getElementById('panel-money-display').textContent = '$' + money;
    document.getElementById('panel-tech-display').textContent  = '⬡ ' + techPts;

    const platformLimit = BASE_PLATFORM_LIMIT + (researchLevels.platformSlots || 0);
    const platformsFull = shelves.length >= platformLimit;
    const limitEl = document.getElementById('panel-limit-display');
    if (limitEl) {
      limitEl.textContent   = platformsFull
        ? `Platform limit: ${shelves.length} / ${platformLimit}`
        : `Platforms: ${shelves.length} / ${platformLimit}`;
      limitEl.style.color      = platformsFull ? 'rgba(255,80,80,0.95)'   : 'rgba(180,165,220,0.45)';
      limitEl.style.fontWeight = platformsFull ? '700' : '';
    }

    // Tab highlight
    document.querySelectorAll('#panel-tabs .res-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === panelActiveTab);
      btn.onclick = () => { panelActiveTab = btn.dataset.tab; buildPanelUI(); };
    });

    const content = document.getElementById('panel-content');
    content.innerHTML = '';

    if (panelActiveTab === 'shop') {
      _buildShopContent(content, platformsFull);
    } else if (panelActiveTab === 'research') {
      _buildResearchContent(content);
    } else {
      _buildUnlocksContent(content);

  function _buildShopContent(content, platformsFull) {
    for (const item of SHOP_ITEMS) {
      const unlocked = isUnlocked(item.type);
      const cost     = platformCost(item.type);
      // Wires don't count against platform limit
      const blocked  = item.type !== 'connection_wire' && platformsFull;
      const canBuy   = unlocked && !blocked && canEdit && money >= cost;

      const card = document.createElement('div');
      card.className = 'shop-item-card' + (unlocked ? '' : ' locked');
      const lockNote = unlocked ? '' : ' <span style="color:rgba(255,160,80,0.7);font-size:10px;">🔒 Unlock required</span>';
      card.innerHTML = `
        <div class="shop-item-info">
          <div class="shop-item-label">${item.label}${lockNote}</div>
          <div class="shop-item-desc">${item.desc}</div>
        </div>
        <button class="shop-item-btn" data-type="${item.type}" ${canBuy ? '' : 'disabled'}>$${cost}</button>`;
      content.appendChild(card);
    }
    content.querySelectorAll('.shop-item-btn').forEach(btn => {
      btn.addEventListener('click', () => { buyPlatform(btn.dataset.type); buildPanelUI(); });

      const card = document.createElement('div');
