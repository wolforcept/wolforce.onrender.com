  // ── Unified panel (Shop / Research / Unlocks) ────────────────────────────────
  let panelActiveTab = 'shop';

  function openPanel(tab) {
    panelActiveTab = tab;
    paused = true;
    aiming = false;
    panelBackdrop.classList.add('visible');
    buildPanelUI();
  }
  function closePanel() {
    panelBackdrop.classList.remove('visible');
    paused = false;
  }

  function buildPanelUI() {
    // Apply theme class to modal
    const modal = document.getElementById('panel-modal');
    modal.classList.remove('tab-shop', 'tab-research', 'tab-unlocks');
    modal.classList.add('tab-' + panelActiveTab);

    // Update status row
    document.getElementById('panel-money-display').textContent = '$' + money;
    document.getElementById('panel-tech-display').textContent  = '⬡ ' + techPts;

    const platformLimit = BASE_PLATFORM_LIMIT + (researchLevels.platformSlots || 0) * 3;
    const platformsFull = shelves.length >= platformLimit;
    const limitEl = document.getElementById('panel-limit-display');
    if (limitEl) {
      limitEl.textContent   = platformsFull
        ? `Platform limit: ${shelves.length} / ${platformLimit}`
        : `Platforms: ${shelves.length} / ${platformLimit}`;
      limitEl.style.color      = platformsFull ? 'rgba(255,80,80,0.95)' : 'rgba(180,165,220,0.45)';
      limitEl.style.fontWeight = platformsFull ? '700' : '';
    }

    // Tab buttons — wire onclick, no active class needed (CSS uses data-tab attribute)
    document.querySelectorAll('#panel-tabs .res-tab').forEach(btn => {
      btn.onclick = () => { panelActiveTab = btn.dataset.tab; buildPanelUI(); };
    });

    const content = document.getElementById('panel-content');
    content.innerHTML = '';

    if (panelActiveTab === 'shop') {
      _buildShopContent(content, platformsFull);
    } else if (panelActiveTab === 'research') {
      _buildResearchContent(content);
    } else {
      _buildUnlocksContent(content);
    }
  }

  // ── Discovery system ─────────────────────────────────────────────────────────
  // An item is discovered once restockCount has reached its discoveryRestock threshold.
  function isDiscovered(discoveryRestock) {
    return restockCount >= (discoveryRestock ?? 0);
  }

  function _buildShopContent(content, platformsFull) {
    if (!canEdit) {
      const warn = document.createElement('div');
      warn.style.cssText = `
        background:rgba(200,30,30,0.22);
        border:1px solid rgba(255,80,80,0.55);
        border-radius:12px;
        padding:10px 14px;
        color:rgba(255,150,150,0.95);
        font-size:12px; font-weight:600; letter-spacing:0.06em;
        text-align:center;
      `;
      warn.textContent = '⚠ Balls in play — platforms cannot be placed';
      content.appendChild(warn);
    }

    for (const item of SHOP_ITEMS) {
      if (!isDiscovered(item.discoveryRestock)) continue;
      const unlocked = isUnlocked(item.type);
      const cost     = platformCost(item.type);
      // Wires don't count against platform limit
      const blocked  = item.type !== 'connection_wire' && platformsFull;
      const canBuy   = unlocked && !blocked && canEdit && money >= cost;

      const card = document.createElement('div');
      card.className = 'shop-item-card' + (unlocked ? '' : ' locked');
      const lockNote = unlocked ? '' : ' <span style="color:rgba(255,160,80,0.7);font-size:10px;">🔒 Unlock required</span>';
      card.innerHTML = `
        <div class="shop-item-info">
          <div class="shop-item-label">${item.label}${lockNote}</div>
          <div class="shop-item-desc">${item.desc}</div>
        </div>
        <button class="shop-item-btn" data-type="${item.type}" ${canBuy ? '' : 'disabled'}>$${cost}</button>`;
      content.appendChild(card);
    }
    content.querySelectorAll('.shop-item-btn').forEach(btn => {
      btn.addEventListener('click', () => { buyPlatform(btn.dataset.type); buildPanelUI(); });
    });
  }

  function _buildResearchContent(content) {
    for (const r of RESEARCH) {
      if (!isDiscovered(r.discoveryRestock)) continue;
      const level     = researchLevels[r.id] || 0;
      const cost      = researchCost(r.baseCost, level, r.growthRate);
      const canAfford = techPts >= cost;

      const card = document.createElement('div');
      card.className = 'res-card' + (canAfford ? '' : ' res-cant-afford');
      card.innerHTML = `
        <div class="res-card-info">
          <div class="res-card-label">${r.label}</div>
          <div class="res-card-desc">${r.desc}</div>
          <div class="res-card-level">Level ${level}</div>
        </div>
        <button class="res-buy-btn" data-id="${r.id}" ${canAfford ? '' : 'disabled'}>⬡ ${cost}</button>`;
      content.appendChild(card);
    }
    content.querySelectorAll('.res-buy-btn').forEach(btn => {
      btn.addEventListener('click', () => buyResearch(btn.dataset.id));
    });
  }

  function _buildUnlocksContent(content) {
    for (const u of UNLOCK_RESEARCH) {
      if (!isDiscovered(u.discoveryRestock)) continue;
      const done      = !!researchLevels[u.id];
      const canAfford = !done && techPts >= u.costTech && money >= u.costMoney;

      const card = document.createElement('div');
      card.className = 'res-card unlock' + (canAfford || done ? '' : ' res-cant-afford');
      const btnLabel = done
        ? '✓ Unlocked'
        : `⬡ ${u.costTech}  +  $${u.costMoney}`;
      card.innerHTML = `
        <div class="res-card-info">
          <div class="res-card-label">${u.label}</div>
          <div class="res-card-desc">${u.desc}</div>
          <div class="res-card-level">${done ? 'Unlocked ✓' : `Costs ⬡${u.costTech} + $${u.costMoney}`}</div>
        </div>
        <button class="res-buy-btn" data-id="${u.id}" ${done || !canAfford ? 'disabled' : ''}>${btnLabel}</button>`;
      content.appendChild(card);
    }
    content.querySelectorAll('.res-buy-btn').forEach(btn => {
      btn.addEventListener('click', () => buyResearch(btn.dataset.id));
    });
  }

  function buyResearch(id) {
    // Unlock research (one-time) — costs both tech and money
    const unlock = UNLOCK_RESEARCH.find(x => x.id === id);
    if (unlock) {
      if (researchLevels[id] || techPts < unlock.costTech || money < unlock.costMoney) return;
      techPts -= unlock.costTech;
      money   -= unlock.costMoney;
      researchLevels[id] = true;
      saveTechPts(techPts);
      saveMoney(money);
      saveResearch(researchLevels);
      updateMoneyDisplay();
      buildPanelUI();
      return;
    }
    // Upgrade research (repeatable) — costs only tech
    const r = RESEARCH.find(x => x.id === id);
    if (!r) return;
    const level = researchLevels[id] || 0;
    const cost  = researchCost(r.baseCost, level, r.growthRate);
    if (techPts < cost) return;
    techPts -= cost;
    researchLevels[id] = level + 1;
    saveTechPts(techPts);
    saveResearch(researchLevels);
    if (id === 'goldBounce') applyBumperRestitution('bumper');
    if (id === 'techBounce') applyBumperRestitution('tech_bumper');
    updateMoneyDisplay();
    buildPanelUI();
  }


  // ── Export / Import save ─────────────────────────────────────────────────────
  function exportSave() {
    const data = {
      version: 1,
      money,
      techPts,
      maxBalls,
      restockCount,
      inventory,
      researchLevels,
      settings: cfg,
      shelves: shelves.map(s => s.def),
      wires: wires.map(w => w.def),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'driftpool-save.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importSave(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data || typeof data !== 'object') throw new Error('Invalid save file');

        // Apply all fields
        if (typeof data.money        === 'number') { money        = data.money;        saveMoney(money); }
        if (typeof data.techPts      === 'number') { techPts      = data.techPts;      saveTechPts(techPts); }
        if (typeof data.maxBalls     === 'number') { maxBalls     = data.maxBalls;     saveMaxBalls(maxBalls); }
        if (typeof data.restockCount === 'number') { restockCount = data.restockCount; saveRestockCount(restockCount); }
        if (Array.isArray(data.inventory))         { inventory    = data.inventory;    saveInventory(inventory); }
        if (data.researchLevels && typeof data.researchLevels === 'object') {
          researchLevels = Object.assign({}, DEFAULT_RESEARCH, data.researchLevels);
          saveResearch(researchLevels);
        }
        if (data.settings && typeof data.settings === 'object') {
          Object.assign(cfg, DEFAULT_SETTINGS, data.settings);
          saveSettings(cfg);
        }
        if (Array.isArray(data.shelves)) saveShelfDefs(data.shelves);
        if (Array.isArray(data.wires))   saveWires(data.wires);

        closeModal();
        initAll();
        buildSettingsUI();
        alert('Save imported successfully!');
      } catch(err) {
        alert('Failed to import save: ' + err.message);
      }
      // Reset file input so the same file can be re-imported
      e.target.value = '';
    };
    reader.readAsText(file);
  }

  function resetSettings() {
    Object.assign(cfg, DEFAULT_SETTINGS);
    saveSettings(cfg);
    applyGravity();
    buildSettingsUI();
  }

  function restartGame() {
    // Reset all persisted values to defaults
    money          = 50;
    inventory      = [];
    maxBalls       = 5;
    techPts        = 0;
    researchLevels = Object.assign({}, DEFAULT_RESEARCH);
    Object.assign(cfg, DEFAULT_SETTINGS);
    saveMoney(money);
    saveInventory(inventory);
    saveMaxBalls(maxBalls);
    saveTechPts(techPts);
    saveResearch(researchLevels);
    saveSettings(cfg);
    saveShelfDefs(DEFAULT_SHELVES.map(d => ({...d})));
    saveWires([]);
    restockCount = 0;
    saveRestockCount(0);
    // Close modal, then fully reinitialise the scene
    closeModal();
    initAll();
    buildSettingsUI();
  }

  function clearAllData() {
    if (!confirm('Clear all saved data and restart? This cannot be undone.')) return;
    try {
      localStorage.removeItem(LS_SHELVES);
      localStorage.removeItem(LS_SETTINGS);
      localStorage.removeItem(LS_INVENTORY);
      localStorage.removeItem(LS_MONEY);
      localStorage.removeItem(LS_MAX_BALLS);
      localStorage.removeItem(LS_TECH_PTS);
      localStorage.removeItem(LS_RESEARCH);
      localStorage.removeItem(LS_WIRES);
      localStorage.removeItem(LS_RESTOCK);
    } catch(e) {}
    location.reload();
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  // ── Shelf operations ─────────────────────────────────────────────────────────
  // ── Rotate: 90 deg/s, time-based so framerate-independent ───────────────────
  const ROT_DEG_PER_SEC = 90; // degrees per second while held

  function rotateSelected(deg) {
    if (selectedShelf === null) return;
    const s = shelves[selectedShelf];
    if (s.platformType === 'bumper' || s.platformType === 'one_way_shelf') return;
    Body.setAngle(s.body, s.body.angle + deg * Math.PI / 180);
    syncDef(selectedShelf);
  }

  function wireRotateButton(id, dir) {
    const btn = document.getElementById(id);
    let rafId   = null;
    let lastT   = null;

    function tick(ts) {
      if (lastT === null) { lastT = ts; }
      const dt  = (ts - lastT) / 1000; // seconds
      lastT = ts;
      rotateSelected(dir * ROT_DEG_PER_SEC * dt);
      rafId = requestAnimationFrame(tick);
    }

    function start(e) {
      e.preventDefault();
      if (rafId !== null) return; // already running
      lastT = null;
      // Immediate small step so it feels instant on tap
      rotateSelected(dir * ROT_DEG_PER_SEC * (1 / 60));
      rafId = requestAnimationFrame(tick);
    }

    function stop() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
      lastT = null;
    }

    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup',   stop);
    btn.addEventListener('pointerleave', stop);
    btn.addEventListener('contextmenu', e => e.preventDefault());
  }

  function sellSelected() {
    // Wire selected
    if (selectedWire !== null) {
      const cost = PLATFORM_TYPES.connection_wire.cost;
      const refund = Math.floor(cost * 0.5);
      wires.splice(selectedWire, 1);
      selectedWire = null;
      shelfActions.classList.remove('visible');
      saveAllDefs();
      money += refund;
      saveMoney(money);
      updateMoneyDisplay();
      return;
    }
    if (selectedShelf === null) return;
    const s       = shelves[selectedShelf];
    const ptDef   = PLATFORM_TYPES[s.platformType];
    const refund  = ptDef ? Math.floor(ptDef.cost * 0.5) : 0;
    World.remove(world, s.body);
    shelves.splice(selectedShelf, 1);
    selectedShelf = null;
    shelfActions.classList.remove('visible');
    saveAllDefs();
    money += refund;
    saveMoney(money);
    updateMoneyDisplay();
  }

  function updateSellButton() {
    const btn     = document.getElementById('sa-sell');
    const rotL    = document.getElementById('sa-rot-left');
    const rotR    = document.getElementById('sa-rot-right');
    if (!btn) return;

    if (selectedWire !== null) {
      // Wire selected: hide rotate buttons, show sell
      if (rotL) rotL.style.display = 'none';
      if (rotR) rotR.style.display = 'none';
      const refund = Math.floor(PLATFORM_TYPES.connection_wire.cost * 0.5);
      btn.textContent = `Sell $${refund}`; return;
    }
    // Shelf (or nothing): show rotate buttons
    if (rotL) rotL.style.display = '';
    if (rotR) rotR.style.display = '';
    if (selectedShelf === null) { btn.textContent = 'Sell'; return; }
    const s      = shelves[selectedShelf];
    const ptDef  = PLATFORM_TYPES[s.platformType];
    const refund = ptDef ? Math.floor(ptDef.cost * 0.5) : 0;
    btn.textContent = `Sell $${refund}`;
  }

  function clearBalls() {
    for (const b of balls) World.remove(world, b.body);
    balls = [];
    canEdit = true;
    aiming  = false;
    updateMoneyDisplay();
  }

  // ── Input helpers ────────────────────────────────────────────────────────────
  function resetInteraction() { aiming = false; dragShelf = null; dragWireEp = null; }

  // Convert any client (screen) coordinate to game canvas coordinates.
  // Works regardless of CSS scale — uses the canvas's actual rendered rect.
  function clientToGame(clientX, clientY) {
    const rect = p.canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width;
    const scaleY = GAME_H / rect.height;
    return {
      x: fin((clientX - rect.left) * scaleX, W / 2),
      y: fin((clientY - rect.top)  * scaleY, H / 2),
    };
  }

  function isOverUI(x, y) {
    // x,y are in game space; UI elements' rects are in screen space — convert via canvas scale
    const cr     = p.canvas.getBoundingClientRect();
    const scaleX = GAME_W / cr.width;
    const scaleY = GAME_H / cr.height;
    function hits(el) {
      if (!el) return false;
      const r = el.getBoundingClientRect();
      const elLeft   = (r.left   - cr.left) * scaleX;
      const elRight  = (r.right  - cr.left) * scaleX;
      const elTop    = (r.top    - cr.top)  * scaleY;
      const elBottom = (r.bottom - cr.top)  * scaleY;
      return x >= elLeft && x <= elRight && y >= elTop && y <= elBottom;
    }
    const modalOpen = modalBackdrop.classList.contains('visible');
    const panelOpen = panelBackdrop.classList.contains('visible');
    return hits(shelfActions) || hits(actionBar) ||
           hits(document.getElementById('btn-restock')) ||
           (modalOpen && hits(modalBackdrop)) ||
           (panelOpen && hits(panelBackdrop));
  }

  function getTouchPos(e) {
    const t = (e.changedTouches && e.changedTouches.length) ? e.changedTouches[0] : e.touches[0];
    return clientToGame(t.clientX, t.clientY);
  }

  // ── Touch ────────────────────────────────────────────────────────────────────
  function onTouchStart(e) {
    const pos = getTouchPos(e);
    handlePressAt(pos.x, pos.y);
  }
  function onTouchMove(e) {
    const pos = getTouchPos(e);
    handleMoveAt(pos.x, pos.y);
  }
  function onTouchEnd(e) {
    const pos = getTouchPos(e);
    handleReleaseAt(pos.x, pos.y);
  }

  // ── Mouse — use clientToGame so scale is always accounted for ────────────────
  p.mousePressed  = function() {
    const pos = clientToGame(p.winMouseX, p.winMouseY);
    handlePressAt(pos.x, pos.y);
  };
  p.mouseDragged  = function() {
    const pos = clientToGame(p.winMouseX, p.winMouseY);
    handleMoveAt(pos.x, pos.y);
  };
  p.mouseReleased = function() {
    const pos = clientToGame(p.winMouseX, p.winMouseY);
    handleReleaseAt(pos.x, pos.y);
  };

  // ── Wire hit test ────────────────────────────────────────────────────────────
  const WIRE_HIT_R = 18; // px — radius for clicking a wire endpoint
  function hitTestWireEndpoint(x, y) {
    for (let i = wires.length - 1; i >= 0; i--) {
      const w = wires[i];
      if (Math.hypot(x - w.p1.x, y - w.p1.y) <= WIRE_HIT_R) return { wireIdx: i, ep: 'p1' };
      if (Math.hypot(x - w.p2.x, y - w.p2.y) <= WIRE_HIT_R) return { wireIdx: i, ep: 'p2' };
    }
    return null;
  }

  // ── Shelf hit test ───────────────────────────────────────────────────────────
  function hitTestShelf(x, y) {
    for (let i = shelves.length - 1; i >= 0; i--) {
      const s = shelves[i], pos = s.body.position, ang = s.body.angle;
      const dx = x - pos.x, dy = y - pos.y;
      const lx = dx * Math.cos(-ang) - dy * Math.sin(-ang);
      const ly = dx * Math.sin(-ang) + dy * Math.cos(-ang);
      if (Math.abs(lx) < s.fw / 2 + 22 && Math.abs(ly) < 24) return i;
    }
    return -1;
  }

  // ── Unified interactions ─────────────────────────────────────────────────────
  // Press: try to grab a shelf first (if canEdit), otherwise start aiming
  function handlePressAt(x, y) {
    if (paused || isOverUI(x, y)) return;

    if (canEdit) {
      // Check wire endpoints first
      const wireHit = hitTestWireEndpoint(x, y);
      if (wireHit) {
        selectedWire  = wireHit.wireIdx;
        selectedShelf = null;
        dragWireEp    = wireHit;
        shelfActions.classList.add('visible');
        updateSellButton();
        return;
      }

      const hit = hitTestShelf(x, y);
      if (hit >= 0) {
        selectedShelf = hit;
        selectedWire  = null;
        shelfActions.classList.add('visible');
        updateSellButton();
        const pos = shelves[hit].body.position;
        dragShelf = { idx: hit, offX: x - pos.x, offY: y - pos.y };
        return;
      } else {
        selectedShelf = null;
        selectedWire  = null;
        dragShelf     = null;
        shelfActions.classList.remove('visible');
        updateSellButton();
      }
    }

    if (inventory.length === 0) return;
    if (y < FLOOR_Y - BR * 3) return;
    aiming = true;
    startX = fin(x, W/2); startY = fin(y, FLOOR_Y + LAUNCH_H * 0.5);
    curX = startX; curY = startY;
  }

  function handleMoveAt(x, y) {
    if (dragWireEp !== null) {
      const w = wires[dragWireEp.wireIdx];
      w[dragWireEp.ep] = { x: fin(x, w[dragWireEp.ep].x), y: fin(y, w[dragWireEp.ep].y) };
      syncWireDef(dragWireEp.wireIdx);
    } else if (dragShelf !== null) {
      const s = shelves[dragShelf.idx];
      Body.setPosition(s.body, {
        x: fin(x - dragShelf.offX, s.body.position.x),
        y: fin(y - dragShelf.offY, s.body.position.y),
      });
      syncDef(dragShelf.idx);
    } else if (aiming) {
      curX = x; curY = y;
    }
  }

  function handleReleaseAt(x, y) {
    if (isOverUI(x, y)) { dragShelf = null; dragWireEp = null; return; }
    if (dragWireEp !== null) { syncWireDef(dragWireEp.wireIdx); dragWireEp = null; return; }
    if (dragShelf !== null) { syncDef(dragShelf.idx); dragShelf = null; return; }
    if (aiming) { curX = x; curY = y; gameRelease(); }
  }

  // ── Game: fire ball ──────────────────────────────────────────────────────────
  function gameRelease() {
    if (paused) return;
    if (!aiming) return;
    aiming = false;
    if (inventory.length === 0) return;

    const dx = startX - curX, dy = startY - curY;
    const dist = Math.hypot(dx, dy);
    if (!isFinite(dist) || dist < 6) return;

    // Cancel if shot direction is downward (ny > 0 means pointing down in screen coords)
    const ny = dy / dist;
    if (ny > 0) return; // silently cancel — drawAim already showed the indicator

    // Consume the next ball from inventory
    const ballDef = inventory.shift();
    saveInventory(inventory);

    // canEdit becomes false the moment a ball is in play
    canEdit = false;
    updateMoneyDisplay();

    const ballTypeDef = BALL_TYPES[ballDef.type] || BALL_TYPES.basic;
    const lifeBonus   = 1 + (researchLevels.ballTime || 0) * 0.05;
    const lifeFrames  = Math.round((ballTypeDef.lifetime || 5) * lifeBonus * 60);

    const palette = getBallPalette(ballDef.type);
    const spd = p.constrain(dist * cfg.powerMult, 1, 22);
    const nx = dx / dist;
    const sx = p.constrain(startX, BR + 20, W - BR - 20);
    const sy = FLOOR_Y - BR - 2;

    // Bouncy ball restitution scales with research level: 3.0 + 0.1 per extra level
    const bouncyMult = ballDef.type === 'bouncy_ball'
      ? 2.0 + Math.max(0, (researchLevels.bouncyBalls || 0) - 1) * 0.1
      : (ballTypeDef.restitutionMult || 1);

    const body = Bodies.circle(sx, sy, BR, {
      restitution: cfg.restitution * bouncyMult,
      friction: 0.04,
      frictionAir: cfg.airFriction,
      density: 0.002,
      label: 'ball',
    });
    body._ballType = ballDef.type; // store type for collision handler lookup
    Body.setVelocity(body, { x: fin(nx * spd), y: fin(ny * spd) });
    World.add(world, body);
    balls.push({ body, palette, lifeFrames, totalLifeFrames: lifeFrames, radius: BR, ballType: ballDef.type });
  }


  // ── Draw ─────────────────────────────────────────────────────────────────────
  p.draw = function() {
    if (!paused) {
      processPendingSplits();
      processTimeBumperRemovals();
      processLaunchers();
      applyWindForces();
      Engine.update(engine, 1000/60);
    }
    updateSignals();
    p.image(bgGfx, 0, 0);

    drawWires();
    drawShelves();
    drawWallEdges();
    drawLaunchZone();

    for (const b of balls) drawBall(b);
    if (aiming) drawAim(); else drawIdlePreview();
    drawInventoryRow();
    drawGlows();
  };

  // ── Render: wires ─────────────────────────────────────────────────────────────
  function drawWires() {
    const gc = p.drawingContext;
    for (let i = 0; i < wires.length; i++) {
      const w   = wires[i];
      const sel = canEdit && selectedWire === i;
      const lit = w.lit;

      // Wire line
      gc.save();
      gc.lineCap = 'round';
      if (lit) {
        // Glowing orange wire
        gc.strokeStyle = 'rgba(255,180,40,0.18)';
        gc.lineWidth   = 10;
        gc.beginPath(); gc.moveTo(w.p1.x, w.p1.y); gc.lineTo(w.p2.x, w.p2.y); gc.stroke();
        gc.strokeStyle = 'rgba(255,210,80,0.85)';
        gc.lineWidth   = 2.5;
        gc.beginPath(); gc.moveTo(w.p1.x, w.p1.y); gc.lineTo(w.p2.x, w.p2.y); gc.stroke();
      } else {
        gc.strokeStyle = sel ? 'rgba(220,200,255,0.60)' : 'rgba(140,110,180,0.35)';
        gc.lineWidth   = sel ? 2.5 : 1.5;
        gc.setLineDash([6, 4]);
        gc.beginPath(); gc.moveTo(w.p1.x, w.p1.y); gc.lineTo(w.p2.x, w.p2.y); gc.stroke();
        gc.setLineDash([]);
      }
      gc.restore();

      // Endpoint handles (always shown when canEdit)
      if (canEdit) {
        for (const pt of [w.p1, w.p2]) {
          gc.fillStyle = lit ? 'rgba(255,210,80,0.92)' : 'rgba(180,150,255,0.75)';
          gc.beginPath(); gc.arc(pt.x, pt.y, WIRE_HIT_R * 0.55, 0, Math.PI * 2); gc.fill();
          gc.strokeStyle = lit ? 'rgba(255,240,120,0.8)' : 'rgba(220,200,255,0.45)';
          gc.lineWidth   = 1.2;
          gc.beginPath(); gc.arc(pt.x, pt.y, WIRE_HIT_R * 0.55, 0, Math.PI * 2); gc.stroke();
        }
      }
    }
  }

  // ── Render: shelves ───────────────────────────────────────────────────────────
  function drawShelves() {
    for (let i = 0; i < shelves.length; i++) {
      const s   = shelves[i];
      const pos = s.body.position;
      const sel = canEdit && selectedShelf === i;
      const gc  = p.drawingContext;

      if (s.platformType === 'bumper') {
        drawBumper(gc, pos.x, pos.y, s.fw / 2, sel);
      } else if (s.platformType === 'tech_bumper') {
        drawTechBumper(gc, pos.x, pos.y, s.fw / 2, sel);
      } else if (s.platformType === 'golden_tech_bumper') {
        drawGoldenTechBumper(gc, pos.x, pos.y, s.fw / 2, sel, s.usesLeft ?? PLATFORM_TYPES.golden_tech_bumper.maxUses);
      } else if (s.platformType === 'split_bumper') {
        drawSplitBumper(gc, pos.x, pos.y, s.fw / 2, sel);
      } else if (s.platformType === 'time_bumper') {
        drawTimeBumper(gc, pos.x, pos.y, s.fw / 2, sel, s.usesLeft ?? 0);
      } else if (s.platformType === 'soft_shelf') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawSoftShelf(gc, s.fw, sel);
        p.pop();
      } else if (s.platformType === 'bouncy_shelf') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawBouncyShelf(gc, s.fw, sel);
        if (s.toggled) {
          gc.fillStyle = 'rgba(40,30,60,0.52)';
          gc.beginPath(); gc.roundRect(-s.fw/2, -10, s.fw, 20, 4); gc.fill();
        }
        p.pop();
      } else if (s.platformType === 'one_way_shelf') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawOneWayShelf(gc, s.fw, sel);
        if (s.toggled) {
          gc.fillStyle = 'rgba(40,30,60,0.52)';
          gc.beginPath(); gc.roundRect(-s.fw/2, -10, s.fw, 20, 4); gc.fill();
        }
        p.pop();
      } else if (s.platformType === 'windmill_shelf') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawWindmillShelf(gc, s.fw, sel);
        if (s.toggled) {
          gc.fillStyle = 'rgba(40,30,60,0.52)';
          gc.beginPath(); gc.roundRect(-s.fw/2, -10, s.fw, 20, 4); gc.fill();
        }
        p.pop();
      } else if (s.platformType === 'detector_shelf') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawDetectorShelf(gc, s.fw, sel, s.lit);
        p.pop();
      } else if (s.platformType === 'launcher') {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawLauncher(gc, s.fw, sel, s.heldBallId !== null, s.holdFrames / 60);
        p.pop();
      } else {
        p.push();
        p.translate(pos.x, pos.y);
        p.rotate(s.body.angle);
        drawBasicShelf(gc, s.fw, sel);
        // Toggled overlay — grey tint when suppressed by wire
        if (s.toggled) {
          gc.fillStyle = 'rgba(40,30,60,0.52)';
          gc.beginPath(); gc.roundRect(-s.fw/2, -10, s.fw, 20, 4); gc.fill();
        }
        p.pop();
      }
    }
  }

  function drawBumper(gc, cx, cy, r, sel) {
    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(255,220,80,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.arc(cx, cy, r + 12, 0, Math.PI * 2); gc.stroke();
    }
    // Outer glow rings
    for (let j = 5; j > 0; j--) {
      gc.strokeStyle = `rgba(255,200,40,${0.06 * j})`;
      gc.lineWidth   = j * 2.5;
      gc.beginPath(); gc.arc(cx, cy, r + j * 2, 0, Math.PI * 2); gc.stroke();
    }
    // Body — radial gold gradient
    const gr = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx, cy, r);
    gr.addColorStop(0,   'rgba(255,240,120,0.98)');
    gr.addColorStop(0.4, 'rgba(255,200,30,0.99)');
    gr.addColorStop(0.8, 'rgba(210,145,0,0.97)');
    gr.addColorStop(1,   'rgba(160,100,0,0.90)');
    gc.fillStyle = gr;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Specular highlight
    const sp = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0,
                                       cx - r * 0.3, cy - r * 0.38, r * 0.52);
    sp.addColorStop(0, 'rgba(255,255,255,0.75)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Rim
    gc.strokeStyle = 'rgba(255,180,0,0.55)';
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
  }

  function drawTechBumper(gc, cx, cy, r, sel) {
    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(80,220,255,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.arc(cx, cy, r + 12, 0, Math.PI * 2); gc.stroke();
    }
    // Outer glow rings — cyan
    for (let j = 5; j > 0; j--) {
      gc.strokeStyle = `rgba(40,210,255,${0.06 * j})`;
      gc.lineWidth   = j * 2.5;
      gc.beginPath(); gc.arc(cx, cy, r + j * 2, 0, Math.PI * 2); gc.stroke();
    }
    // Body — radial cyan/blue gradient
    const gr = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx, cy, r);
    gr.addColorStop(0,   'rgba(180,245,255,0.98)');
    gr.addColorStop(0.4, 'rgba(30,200,255,0.99)');
    gr.addColorStop(0.8, 'rgba(0,130,210,0.97)');
    gr.addColorStop(1,   'rgba(0,80,160,0.90)');
    gc.fillStyle = gr;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Specular highlight
    const sp = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0,
                                       cx - r * 0.3, cy - r * 0.38, r * 0.52);
    sp.addColorStop(0, 'rgba(255,255,255,0.75)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Rim
    gc.strokeStyle = 'rgba(40,200,255,0.60)';
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
  }

  function drawGoldenTechBumper(gc, cx, cy, r, sel, usesLeft) {
    const maxUses  = PLATFORM_TYPES.golden_tech_bumper.maxUses;
    const deplete  = usesLeft !== undefined ? 1 - usesLeft / maxUses : 0;

    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(255,220,60,0.80)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.arc(cx, cy, r + 12, 0, Math.PI * 2); gc.stroke();
    }
    // Outer glow rings — gold-tinted cyan, fade with depletion
    for (let j = 5; j > 0; j--) {
      gc.strokeStyle = `rgba(200,210,40,${0.05 * j * (1 - deplete * 0.7)})`;
      gc.lineWidth   = j * 2.5;
      gc.beginPath(); gc.arc(cx, cy, r + j * 2, 0, Math.PI * 2); gc.stroke();
    }
    // Body — cyan/blue
    const gr = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx, cy, r);
    gr.addColorStop(0,   'rgba(180,245,255,0.98)');
    gr.addColorStop(0.4, 'rgba(30,200,255,0.99)');
    gr.addColorStop(0.8, 'rgba(0,130,210,0.97)');
    gr.addColorStop(1,   'rgba(0,80,160,0.90)');
    gc.fillStyle = gr;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Specular highlight
    const sp = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0,
                                       cx - r * 0.3, cy - r * 0.38, r * 0.52);
    sp.addColorStop(0, 'rgba(255,255,255,0.75)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Depletion dark sweep
    if (deplete > 0) {
      gc.fillStyle = 'rgba(0,0,0,0.30)';
      gc.beginPath();
      gc.moveTo(cx, cy);
      gc.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + deplete * Math.PI * 2);
      gc.closePath(); gc.fill();
    }
    // Gold rim — double stroke
    gc.strokeStyle = `rgba(255,200,30,${0.90 - deplete * 0.5})`;
    gc.lineWidth   = 2.5;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
    gc.strokeStyle = 'rgba(255,240,120,0.55)';
    gc.lineWidth   = 0.8;
    gc.beginPath(); gc.arc(cx, cy, r - 1.5, 0, Math.PI * 2); gc.stroke();
    // $ symbol
    gc.fillStyle = `rgba(255,220,50,${0.95 - deplete * 0.4})`;
    gc.font = `bold ${Math.round(r * 1.1)}px system-ui`;
    gc.textAlign = 'center'; gc.textBaseline = 'middle';
    gc.fillText('$', cx, cy + r * 0.06);
    gc.textAlign = 'left'; gc.textBaseline = 'alphabetic';
    // Uses badge
    if (usesLeft !== undefined) {
      gc.fillStyle = 'rgba(255,240,160,0.85)';
      gc.font = `bold ${Math.round(r * 0.55)}px system-ui`;
      gc.textAlign = 'center'; gc.textBaseline = 'middle';
      gc.fillText(String(usesLeft), cx + r * 0.58, cy - r * 0.58);
      gc.textAlign = 'left'; gc.textBaseline = 'alphabetic';
    }
  }

  function drawSplitBumper(gc, cx, cy, r, sel) {
    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(255,100,220,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.arc(cx, cy, r + 12, 0, Math.PI * 2); gc.stroke();
    }
    // Outer glow rings — magenta
    for (let j = 5; j > 0; j--) {
      gc.strokeStyle = `rgba(255,60,200,${0.06 * j})`;
      gc.lineWidth   = j * 2.5;
      gc.beginPath(); gc.arc(cx, cy, r + j * 2, 0, Math.PI * 2); gc.stroke();
    }
    // Body — radial magenta/violet gradient
    const gr = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx, cy, r);
    gr.addColorStop(0,   'rgba(255,200,240,0.98)');
    gr.addColorStop(0.4, 'rgba(240,60,200,0.99)');
    gr.addColorStop(0.8, 'rgba(160,20,160,0.97)');
    gr.addColorStop(1,   'rgba(90,0,110,0.90)');
    gc.fillStyle = gr;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Specular
    const sp = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0,
                                       cx - r * 0.3, cy - r * 0.38, r * 0.52);
    sp.addColorStop(0, 'rgba(255,255,255,0.75)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Two split arrows pointing outward left/right
    gc.strokeStyle = 'rgba(255,230,255,0.85)';
    gc.lineWidth   = 1.4;
    gc.lineCap     = 'round';
    const ar = r * 0.45;
    for (const sign of [-1, 1]) {
      const ax = cx + sign * ar;
      gc.beginPath(); gc.moveTo(cx, cy); gc.lineTo(ax, cy); gc.stroke();
      gc.beginPath(); gc.moveTo(ax, cy); gc.lineTo(ax - sign * ar * 0.4, cy - ar * 0.4); gc.stroke();
      gc.beginPath(); gc.moveTo(ax, cy); gc.lineTo(ax - sign * ar * 0.4, cy + ar * 0.4); gc.stroke();
    }
    // Rim
    gc.strokeStyle = 'rgba(220,60,200,0.55)';
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
  }

  function drawTimeBumper(gc, cx, cy, r, sel, usesLeft) {
    const maxUses = PLATFORM_TYPES.time_bumper.maxUses;
    const deplete = 1 - usesLeft / maxUses; // 0=full, 1=empty

    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(80,220,120,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.arc(cx, cy, r + 12, 0, Math.PI * 2); gc.stroke();
    }
    // Outer glow rings — green, fades as uses deplete
    for (let j = 5; j > 0; j--) {
      gc.strokeStyle = `rgba(60,220,100,${0.06 * j * (1 - deplete * 0.7)})`;
      gc.lineWidth   = j * 2.5;
      gc.beginPath(); gc.arc(cx, cy, r + j * 2, 0, Math.PI * 2); gc.stroke();
    }
    // Body — green gradient, greys out as depleted
    const saturation = Math.round(180 * (1 - deplete * 0.6));
    const gr = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx, cy, r);
    gr.addColorStop(0,   `rgba(${saturation + 70},240,${saturation + 50},0.98)`);
    gr.addColorStop(0.4, `rgba(30,${saturation + 60},50,0.99)`);
    gr.addColorStop(0.8, `rgba(10,${saturation},30,0.97)`);
    gr.addColorStop(1,   `rgba(5,${Math.round(saturation*0.6)},15,0.90)`);
    gc.fillStyle = gr;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Specular
    const sp = gc.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0,
                                       cx - r * 0.3, cy - r * 0.38, r * 0.52);
    sp.addColorStop(0, 'rgba(255,255,255,0.70)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.fill();
    // Use-depletion arc (dark overlay sweeping clockwise as uses are consumed)
    if (deplete > 0) {
      gc.fillStyle = 'rgba(0,0,0,0.30)';
      gc.beginPath();
      gc.moveTo(cx, cy);
      gc.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + deplete * Math.PI * 2);
      gc.closePath();
      gc.fill();
    }
    // Rim
    gc.strokeStyle = `rgba(60,220,100,${0.7 - deplete * 0.4})`;
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.arc(cx, cy, r, 0, Math.PI * 2); gc.stroke();
    // Hourglass symbol
    gc.fillStyle = `rgba(220,255,230,${0.90 - deplete * 0.4})`;
    gc.font = `bold ${Math.round(r * 0.9)}px system-ui`;
    gc.textAlign = 'center'; gc.textBaseline = 'middle';
    gc.fillText('⏳', cx, cy + r * 0.05);
    gc.textAlign = 'left'; gc.textBaseline = 'alphabetic';
    // Uses remaining badge
    gc.fillStyle = 'rgba(220,255,230,0.85)';
    gc.font = `bold ${Math.round(r * 0.55)}px system-ui`;
    gc.textAlign = 'center'; gc.textBaseline = 'middle';
    gc.fillText(String(usesLeft), cx + r * 0.58, cy - r * 0.58);
    gc.textAlign = 'left'; gc.textBaseline = 'alphabetic';
  }

  function drawBasicShelf(gc, fw, sel) {
    if (sel) {
      gc.strokeStyle = 'rgba(200,170,255,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();
    }
    for (let j = 7; j > 0; j--) {
      gc.fillStyle = `rgba(180,140,255,${0.022 * j})`;
      gc.beginPath(); gc.roundRect(-fw/2 - j, -10 - j, fw + j*2, 20 + j*2, 6); gc.fill();
    }
    const g = gc.createLinearGradient(-fw/2, -10, fw/2, 10);
    g.addColorStop(0,   'rgba(215,195,255,0.82)');
    g.addColorStop(0.5, 'rgba(245,225,255,0.96)');
    g.addColorStop(1,   'rgba(185,162,235,0.75)');
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.fill();
    gc.strokeStyle = 'rgba(255,255,255,0.5)';
    gc.lineWidth   = 0.8;
    gc.beginPath(); gc.moveTo(-fw/2 + 5, -8); gc.lineTo(fw/2 - 5, -8); gc.stroke();

  function drawSoftShelf(gc, fw, sel) {
    if (sel) {
      gc.strokeStyle = 'rgba(160,230,180,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();
    }
    // Soft green glow
    for (let j = 6; j > 0; j--) {
      gc.fillStyle = `rgba(80,200,120,${0.018 * j})`;
      gc.beginPath(); gc.roundRect(-fw/2 - j, -12 - j, fw + j*2, 24 + j*2, 7); gc.fill();
    }
    // Body — teal/green gradient, thick and spongy-looking
    const g = gc.createLinearGradient(-fw/2, -12, fw/2, 12);
    g.addColorStop(0,   'rgba(100,210,145,0.88)');
    g.addColorStop(0.5, 'rgba(140,235,175,0.96)');
    g.addColorStop(1,   'rgba(80,185,120,0.82)');
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -12, fw, 24, 7); gc.fill();
    // Wavy inner lines to suggest softness
    gc.strokeStyle = 'rgba(255,255,255,0.30)';
    gc.lineWidth   = 1;
    gc.lineCap     = 'round';
    const step = fw / 4;
    for (let i = 0; i < 3; i++) {
      const cx = -fw/2 + step * (i + 0.9);
      gc.beginPath();
      gc.moveTo(cx,      -5);
      gc.bezierCurveTo(cx + 4, -1, cx - 4, 3, cx, 7);
      gc.stroke();
    }
    gc.strokeStyle = 'rgba(120,230,160,0.55)';
    gc.lineWidth   = 0.8;
    gc.beginPath(); gc.roundRect(-fw/2, -12, fw, 24, 7); gc.stroke();
  }

  function drawLauncher(gc, fw, sel, held, chargeT) {
    // fw is narrower now (~half ball width). Tube height = fw * 1.4.
    const th = fw * 1.4;
    const hw = fw / 2;

    // Selection ring
    if (sel) {
      gc.strokeStyle = 'rgba(100,220,255,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-hw - 8, -th/2 - 8, fw + 16, th + 16, hw + 4); gc.stroke();
    }

    // Charge glow — pulses when holding a ball
    if (held) {
      const pulse = (Math.sin(Date.now() * 0.012) + 1) * 0.5;
      for (let j = 4; j > 0; j--) {
        gc.fillStyle = `rgba(255,220,80,${0.04 * j * (0.5 + pulse * 0.5)})`;
        gc.beginPath(); gc.roundRect(-hw - j*2, -th/2 - j*2, fw + j*4, th + j*4, hw + j); gc.fill();
      }
    } else {
      // Normal idle glow
      for (let j = 4; j > 0; j--) {
        gc.fillStyle = `rgba(60,180,255,${0.015 * j})`;
        gc.beginPath(); gc.roundRect(-hw - j, -th/2 - j, fw + j*2, th + j*2, hw + 1); gc.fill();
      }
    }

    // Barrel body — steel-blue gradient
    const g = gc.createLinearGradient(-hw, 0, hw, 0);
    g.addColorStop(0,   'rgba(50,80,120,0.95)');
    g.addColorStop(0.3, 'rgba(90,140,200,0.99)');
    g.addColorStop(0.7, 'rgba(70,120,180,0.99)');
    g.addColorStop(1,   'rgba(40,65,110,0.92)');
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-hw, -th/2, fw, th, hw); gc.fill();

    // Specular sheen
    const sp = gc.createLinearGradient(-hw, 0, -hw + fw * 0.35, 0);
    sp.addColorStop(0, 'rgba(255,255,255,0.28)');
    sp.addColorStop(1, 'rgba(255,255,255,0)');
    gc.fillStyle = sp;
    gc.beginPath(); gc.roundRect(-hw, -th/2, fw, th, hw); gc.fill();

    // Muzzle ring
    gc.strokeStyle = held ? 'rgba(255,220,80,0.95)' : 'rgba(140,220,255,0.90)';
    gc.lineWidth   = 2;
    gc.beginPath(); gc.arc(0, -th/2, hw * 0.88, Math.PI, 0); gc.stroke();

    // Bore
    const bore = gc.createRadialGradient(0, -th/2, 0, 0, -th/2, hw * 0.55);
    bore.addColorStop(0, 'rgba(4,8,20,0.95)');
    bore.addColorStop(1, 'rgba(20,40,80,0.50)');
    gc.fillStyle = bore;
    gc.beginPath(); gc.arc(0, -th/2, hw * 0.55, 0, Math.PI * 2); gc.fill();

    // Charge timer arc around muzzle (fills as time passes)
    if (held && chargeT !== undefined) {
      const elapsed = 1 - chargeT; // chargeT goes 1→0, elapsed goes 0→1
      gc.strokeStyle = 'rgba(255,220,80,0.85)';
      gc.lineWidth   = 2;
      gc.beginPath();
      gc.arc(0, -th/2, hw * 1.4, -Math.PI / 2, -Math.PI / 2 + elapsed * Math.PI * 2);
      gc.stroke();
    }

    // Direction arrow
    gc.strokeStyle = held ? 'rgba(255,220,80,0.65)' : 'rgba(140,220,255,0.65)';
    gc.lineWidth   = 1.2;
    const arrTip  = -th/2 + hw * 0.5;
    const arrBase = th * 0.12;
    gc.beginPath(); gc.moveTo(0, arrBase); gc.lineTo(0, arrTip); gc.stroke();
    const arrW = hw * 0.35;
    gc.beginPath();
    gc.moveTo(-arrW, arrTip + arrW * 0.9);
    gc.lineTo(0, arrTip);
    gc.lineTo( arrW, arrTip + arrW * 0.9);
    gc.stroke();

    // Outer rim
    gc.strokeStyle = 'rgba(80,160,220,0.50)';
    gc.lineWidth   = 1;
    gc.beginPath(); gc.roundRect(-hw, -th/2, fw, th, hw); gc.stroke();
  }

  function drawDetectorShelf(gc, fw, sel, lit) {
    // Selection ring
    if (sel) {
      gc.strokeStyle = lit ? 'rgba(255,200,60,0.85)' : 'rgba(255,160,60,0.65)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();
    }
    // Detection zone — faint orange cone above when lit
    if (lit) {
      const grad = gc.createLinearGradient(0, -10, 0, -10 - DETECT_DEPTH);
      grad.addColorStop(0,   'rgba(255,180,40,0.22)');
      grad.addColorStop(1,   'rgba(255,180,40,0)');
      gc.fillStyle = grad;
      gc.beginPath(); gc.roundRect(-(fw/2 + DETECT_WIDTH_PAD), -10 - DETECT_DEPTH,
                                   fw + DETECT_WIDTH_PAD*2, DETECT_DEPTH, 4); gc.fill();
    }
    // Glow rings — orange when lit, dim when not
    for (let j = 7; j > 0; j--) {
      gc.fillStyle = lit
        ? `rgba(255,160,30,${0.028 * j})`
        : `rgba(180,100,40,${0.014 * j})`;
      gc.beginPath(); gc.roundRect(-fw/2 - j, -10 - j, fw + j*2, 20 + j*2, 6); gc.fill();
    }
    // Body gradient — orange-amber
    const g = gc.createLinearGradient(-fw/2, -10, fw/2, 10);
    if (lit) {
      g.addColorStop(0,   'rgba(255,220,100,0.95)');
      g.addColorStop(0.5, 'rgba(255,180,40,0.99)');
      g.addColorStop(1,   'rgba(210,120,10,0.90)');
    } else {
      g.addColorStop(0,   'rgba(160,100,60,0.85)');
      g.addColorStop(0.5, 'rgba(130,80,40,0.90)');
      g.addColorStop(1,   'rgba(100,60,20,0.80)');
    }
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.fill();
    // Specular stripe
    gc.strokeStyle = lit ? 'rgba(255,240,160,0.70)' : 'rgba(200,140,80,0.40)';
    gc.lineWidth   = 0.8;
    gc.beginPath(); gc.moveTo(-fw/2 + 5, -8); gc.lineTo(fw/2 - 5, -8); gc.stroke();
    // Rim
    gc.strokeStyle = lit ? 'rgba(255,200,60,0.80)' : 'rgba(180,100,40,0.45)';
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.stroke();
    // Small sensor dot on top face centre
    gc.fillStyle = lit ? 'rgba(255,240,100,0.95)' : 'rgba(180,120,60,0.60)';
    gc.beginPath(); gc.arc(0, -10, 3, 0, Math.PI * 2); gc.fill();
  }

  function drawBouncyShelf(gc, fw, sel) {
    if (sel) {
      gc.strokeStyle = 'rgba(100,255,160,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();

    }
    // Body — bright lime/green gradient

    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.fill();

  }

  function drawOneWayShelf(gc, fw, sel) {
    if (sel) {
      gc.strokeStyle = 'rgba(255,200,80,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();
    }
    // Glow — orange
    for (let j = 7; j > 0; j--) {
      gc.fillStyle = `rgba(255,160,30,${0.022 * j})`;
      gc.beginPath(); gc.roundRect(-fw/2 - j, -10 - j, fw + j*2, 20 + j*2, 6); gc.fill();
    }
    // Body — dark amber gradient (solid top, translucent bottom to hint passability)
    const g = gc.createLinearGradient(0, -10, 0, 10);
    g.addColorStop(0,   'rgba(255,190,50,0.97)');
    g.addColorStop(0.5, 'rgba(220,140,20,0.90)');
    g.addColorStop(1,   'rgba(160,90,10,0.45)');
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.fill();
    // Rim — solid on top, faint on bottom
    gc.strokeStyle = 'rgba(255,210,80,0.75)';
    gc.lineWidth   = 1.5;
    gc.beginPath(); gc.moveTo(-fw/2 + 4, -10); gc.lineTo(fw/2 - 4, -10); gc.stroke();
    gc.strokeStyle = 'rgba(180,100,10,0.25)';
    gc.lineWidth   = 1;
    gc.beginPath(); gc.moveTo(-fw/2 + 4,  10); gc.lineTo(fw/2 - 4,  10); gc.stroke();
    // Upward arrow indicators showing the pass-through direction
    const arrowCount = Math.max(1, Math.floor(fw / 22));
    const arrowSpacing = fw / (arrowCount + 1);
    gc.strokeStyle = 'rgba(255,240,160,0.70)';
    gc.lineWidth   = 1.2;
    gc.lineCap     = 'round';
    for (let i = 1; i <= arrowCount; i++) {
      const ax = -fw/2 + i * arrowSpacing;
      gc.beginPath(); gc.moveTo(ax, 4); gc.lineTo(ax, -4); gc.stroke();
      gc.beginPath(); gc.moveTo(ax, -4); gc.lineTo(ax - 3, 0); gc.stroke();
      gc.beginPath(); gc.moveTo(ax, -4); gc.lineTo(ax + 3, 0); gc.stroke();
    }
  }

  function drawWindmillShelf(gc, fw, sel) {
    // ── Wind corridor visualisation (drawn first, behind the shelf) ──────────────
    const corridorW = fw + WIND_WIDTH_PAD * 2;
    const halfCW    = corridorW / 2;
    // Fading gradient stream — teal/cyan upward
    const grad = gc.createLinearGradient(0, -10, 0, -(WIND_LENGTH + 10));
    grad.addColorStop(0,   'rgba(80,220,200,0.18)');
    grad.addColorStop(0.4, 'rgba(60,200,180,0.08)');
    grad.addColorStop(1,   'rgba(40,180,160,0)');
    gc.fillStyle = grad;
    gc.beginPath();
    gc.roundRect(-halfCW, -(WIND_LENGTH + 10), corridorW, WIND_LENGTH, 6);
    gc.fill();

    // Animated streaks inside the corridor
    const t = p.frameCount;
    gc.strokeStyle = 'rgba(120,240,210,0.30)';
    gc.lineWidth   = 1;
    gc.lineCap     = 'round';
    const streakCount = 5;
    for (let i = 0; i < streakCount; i++) {
      // Each streak cycles upward at a different phase and x offset
      const phase  = ((t * 1.8 + i * 137) % WIND_LENGTH);
      const sx     = -halfCW * 0.7 + (i / streakCount) * corridorW * 0.8 - corridorW * 0.1;
      const sy0    = -10 - phase;
      const sy1    = sy0 - 18;
      if (sy1 < -(WIND_LENGTH + 10)) continue;
      gc.globalAlpha = 0.5 * (1 - phase / WIND_LENGTH);
      gc.beginPath(); gc.moveTo(sx, sy0); gc.lineTo(sx, sy1); gc.stroke();
    }
    gc.globalAlpha = 1;

    // ── Selection ring ────────────────────────────────────────────────────────────
    if (sel) {
      gc.strokeStyle = 'rgba(80,240,200,0.75)';
      gc.lineWidth   = 2;
      gc.beginPath(); gc.roundRect(-fw/2 - 10, -24, fw + 20, 48, 9); gc.stroke();
    }

    // ── Shelf body — dark teal ─────────────────────────────────────────────────
    for (let j = 7; j > 0; j--) {
      gc.fillStyle = `rgba(40,180,160,${0.022 * j})`;
      gc.beginPath(); gc.roundRect(-fw/2 - j, -10 - j, fw + j*2, 20 + j*2, 6); gc.fill();
    }
    const g = gc.createLinearGradient(-fw/2, -10, fw/2, 10);
    g.addColorStop(0,   'rgba(100,230,210,0.90)');
    g.addColorStop(0.5, 'rgba(60,210,185,0.99)');
    g.addColorStop(1,   'rgba(30,160,145,0.85)');
    gc.fillStyle = g;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.fill();
    gc.strokeStyle = 'rgba(140,255,235,0.65)';
    gc.lineWidth   = 1.2;
    gc.beginPath(); gc.moveTo(-fw/2 + 5, -8); gc.lineTo(fw/2 - 5, -8); gc.stroke();
    gc.strokeStyle = 'rgba(40,180,160,0.5)';
    gc.lineWidth   = 1;
    gc.beginPath(); gc.roundRect(-fw/2, -10, fw, 20, 4); gc.stroke();

    // ── Spinning fan blades ────────────────────────────────────────────────────
    const bladeAngle = (p.frameCount * 0.07) % (Math.PI * 2);
    const bladeCount = 4;
    const bladeLen   = Math.min(fw * 0.38, 14);
    gc.save();
    gc.translate(0, -10); // centre of fan at top face
    gc.strokeStyle = 'rgba(200,255,245,0.85)';
    gc.lineWidth   = 2;
    gc.lineCap     = 'round';
    for (let i = 0; i < bladeCount; i++) {
      const a = bladeAngle + (i / bladeCount) * Math.PI * 2;
      gc.beginPath();
      gc.moveTo(0, 0);
      gc.lineTo(Math.cos(a) * bladeLen, Math.sin(a) * bladeLen);
      gc.stroke();
    }
    // Hub
    gc.fillStyle = 'rgba(255,255,255,0.7)';
    gc.beginPath(); gc.arc(0, 0, 2.5, 0, Math.PI * 2); gc.fill();
    gc.restore();
  }
  function drawWallEdges() {
    const gc=p.drawingContext;
    const gl=gc.createLinearGradient(0,0,16,0);
    gl.addColorStop(0,'rgba(150,100,220,0.45)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    gc.fillStyle=gl; gc.fillRect(0,0,16,H);
    const gr=gc.createLinearGradient(W-16,0,W,0);
    gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(1,'rgba(150,100,220,0.45)');
    gc.fillStyle=gr; gc.fillRect(W-16,0,16,H);
  }

  // ── Render: launch zone line ──────────────────────────────────────────────────
  function drawLaunchZone() {
    const gc=p.drawingContext;
    const lg=gc.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,   'rgba(200,160,255,0)');
    lg.addColorStop(0.15,'rgba(225,185,255,0.65)');
    lg.addColorStop(0.85,'rgba(225,185,255,0.65)');
    lg.addColorStop(1,   'rgba(200,160,255,0)');
    gc.strokeStyle=lg; gc.lineWidth=1.2;
    gc.beginPath(); gc.moveTo(0,FLOOR_Y); gc.lineTo(W,FLOOR_Y); gc.stroke();
  }

  // ── Render: ball ─────────────────────────────────────────────────────────────
  function drawBall(b) {
    const x=fin(b.body.position.x), y=fin(b.body.position.y);
    if (x===0&&y===0) return;
    const gc=p.drawingContext;
    const r = b.radius ?? BR;

    const lifeRatio = b.lifeFrames / b.totalLifeFrames; // 1 → 0
    const fadeAlpha = p.constrain(p.map(lifeRatio, 0, 0.15, 0, 1), 0, 1);

    gc.globalAlpha = fadeAlpha;

    const gw=gc.createRadialGradient(x,y,0, x,y,r*2.4);
    gw.addColorStop(0,hexA(b.palette[1],0.2)); gw.addColorStop(1,'rgba(0,0,0,0)');
    gc.fillStyle=gw; gc.beginPath(); gc.arc(x,y,r*2.4,0,Math.PI*2); gc.fill();

    const gr=gc.createRadialGradient(x-r*.32,y-r*.38,r*.04, x,y,r);
    gr.addColorStop(0,b.palette[0]); gr.addColorStop(.55,b.palette[1]); gr.addColorStop(1,b.palette[2]);
    gc.fillStyle=gr; gc.beginPath(); gc.arc(x,y,r,0,Math.PI*2); gc.fill();

    const sp=gc.createRadialGradient(x-r*.3,y-r*.4,0, x-r*.3,y-r*.4,r*.48);
    sp.addColorStop(0,'rgba(255,255,255,0.78)'); sp.addColorStop(1,'rgba(255,255,255,0)');
    gc.fillStyle=sp; gc.beginPath(); gc.arc(x,y,r,0,Math.PI*2); gc.fill();
    gc.strokeStyle='rgba(255,255,255,0.1)'; gc.lineWidth=0.7; gc.stroke();

    // Timer arc — visible in the last 2 seconds
    const TIMER_SHOW = 2 * 60; // frames
    if (b.lifeFrames <= TIMER_SHOW) {
      const arcFrac = b.lifeFrames / TIMER_SHOW; // 1→0
      const startAngle = -Math.PI / 2;
      const endAngle   = startAngle + arcFrac * Math.PI * 2;
      gc.strokeStyle = hexA(b.palette[0], 0.85);
      gc.lineWidth   = 2.2;
      gc.lineCap     = 'round';
      gc.beginPath();
      gc.arc(x, y, r + 4, startAngle, endAngle);
      gc.stroke();
    }

    gc.globalAlpha = 1;
  }

  // ── Render: idle preview ──────────────────────────────────────────────────────
  function drawIdlePreview() {
    if (inventory.length === 0) return; // nothing to throw
    const pal = getBallPalette(inventory[0].type);
    const mouse = clientToGame(p.winMouseX, p.winMouseY);
    let px = fin(mouse.x, W/2);
    if (px<20||px>W-20) px=W/2;
    const py=FLOOR_Y+LAUNCH_H*0.35;
    const gc=p.drawingContext;

    const gr=gc.createRadialGradient(px-BR*.3,py-BR*.35,0, px,py,BR);
    gr.addColorStop(0,hexA(pal[0],0.55));
    gr.addColorStop(0.6,hexA(pal[1],0.45));
    gr.addColorStop(1,hexA(pal[2],0.28));
    gc.fillStyle=gr; gc.beginPath(); gc.arc(px,py,BR,0,Math.PI*2); gc.fill();
    gc.strokeStyle='rgba(255,255,255,0.18)'; gc.lineWidth=1; gc.stroke();

    const pulse=(Math.sin(p.frameCount*.065)+1)/2;
    gc.strokeStyle=hexA(pal[1],0.22*(1-pulse)); gc.lineWidth=1.5;
    gc.beginPath(); gc.arc(px,py,BR+4+pulse*6,0,Math.PI*2); gc.stroke();
  }


  // ── Render: aim ───────────────────────────────────────────────────────────────
  function drawAim() {
    const dx=startX-curX, dy=startY-curY;
    const dist=Math.hypot(dx,dy);
    if (!isFinite(dist)||dist<1) return;

    const palette = getBallPalette(inventory[0]?.type ?? 'basic');
    const pwr=p.constrain(dist*cfg.powerMult, 0, 22);
    const nx=dx/dist, ny=dy/dist;
    const sx=p.constrain(fin(startX,W/2), BR+20, W-BR-20);
    const sy=FLOOR_Y-BR-2;
    const gc=p.drawingContext;

    const isCancelled = ny > 0; // downward — shot would be cancelled

    if (isCancelled) {
      // Greyed-out ball + ✕ symbol
      gc.fillStyle = 'rgba(255,255,255,0.18)';
      gc.beginPath(); gc.arc(sx, sy, BR, 0, Math.PI * 2); gc.fill();
      gc.strokeStyle = 'rgba(255,80,80,0.80)';
      gc.lineWidth   = 2.5; gc.lineCap = 'round';
      const cr = BR * 0.5;
      gc.beginPath(); gc.moveTo(sx - cr, sy - cr); gc.lineTo(sx + cr, sy + cr); gc.stroke();
      gc.beginPath(); gc.moveTo(sx + cr, sy - cr); gc.lineTo(sx - cr, sy + cr); gc.stroke();
      return;
    }

    // Trajectory
    let vx=nx*pwr, vy=ny*pwr, bx=sx, by=sy;
    const gx=cfg.gravityX*0.5, gy=cfg.gravityY*0.5;
    for (let i=0;i<34;i++) {
      vx+=gx; vy+=gy; bx+=vx; by+=vy;
      if (by>FLOOR_Y+5||!isFinite(bx)||!isFinite(by)) break;
      gc.fillStyle=hexA(palette[1], p.map(i,0,34,0.7,0)*0.85);
      gc.beginPath(); gc.arc(bx,by,p.map(i,0,34,BR*.38,1.2),0,Math.PI*2); gc.fill();
    }

    // Power bar
    const barW=Math.min(180,W*.40), barX=fin(sx-barW/2,10), barY=FLOOR_Y+10;
    gc.fillStyle='rgba(255,255,255,0.07)';
    gc.beginPath(); gc.roundRect(barX,barY,barW,6,3); gc.fill();
    if (pwr>0) {
      const bg=gc.createLinearGradient(barX,0,barX+barW,0);
      bg.addColorStop(0,hexA(palette[0],0.9)); bg.addColorStop(1,hexA(palette[2],0.9));
      gc.fillStyle=bg;
      gc.beginPath(); gc.roundRect(barX,barY,(pwr/22)*barW,6,3); gc.fill();
    }

    // Ball at spawn
    const gr=gc.createRadialGradient(sx-BR*.3,sy-BR*.35,0, sx,sy,BR);
    gr.addColorStop(0,palette[0]); gr.addColorStop(.55,palette[1]); gr.addColorStop(1,palette[2]);
    gc.fillStyle=gr; gc.beginPath(); gc.arc(sx,sy,BR,0,Math.PI*2); gc.fill();

    // ── Cue stick ───────────────────────────────────────────────────────────────
    if (dist > 8) {
      const stickLen = p.constrain(dist * .85, 0, 95);
      const ex = sx - nx * stickLen, ey = sy - ny * stickLen;
      const sg = gc.createLinearGradient(sx, sy, fin(ex, sx), fin(ey, sy));
      sg.addColorStop(0, hexA(palette[1], 0.9));
      sg.addColorStop(1, hexA(palette[0], 0.12));
      gc.strokeStyle = sg; gc.lineWidth = 3; gc.lineCap = 'round';
      gc.beginPath();
      gc.moveTo(sx + nx * (BR + 3), sy + ny * (BR + 3));
      gc.lineTo(ex, ey);
      gc.stroke();
    }
  }

  // ── Render: glows ─────────────────────────────────────────────────────────────
  function drawGlows() {
    const gc=p.drawingContext;
    gc.save(); gc.globalCompositeOperation='screen';
    for (const b of balls) {
      const x=fin(b.body.position.x), y=fin(b.body.position.y);
      const spd=Math.hypot(b.body.velocity.x,b.body.velocity.y);
      const a=p.map(fin(spd,0),0,10,0.03,0.22);
      const gw=gc.createRadialGradient(x,y,0, x,y,BR*3.2);
      gw.addColorStop(0,hexA(b.palette[1],a)); gw.addColorStop(1,'rgba(0,0,0,0)');
      gc.fillStyle=gw; gc.beginPath(); gc.arc(x,y,BR*3.2,0,Math.PI*2); gc.fill();
    }
    gc.restore();
  }

}); // end p5
</script>
