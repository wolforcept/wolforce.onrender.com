<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calculator body -->
  <rect x="4" y="2" width="24" height="28" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  
  <!-- Display -->
  <rect x="6" y="4" width="20" height="6" fill="#9aba9a" stroke="#808080" stroke-width="1"/>
  <text x="23" y="9" font-size="6" font-family="monospace" text-anchor="end">0</text>
  
  <!-- Buttons row 1 -->
  <rect x="6" y="12" width="4" height="4" fill="#808080"/>
  <rect x="11" y="12" width="4" height="4" fill="#808080"/>
  <rect x="16" y="12" width="4" height="4" fill="#808080"/>
  <rect x="21" y="12" width="4" height="4" fill="#ff8080"/>
  
  <!-- Buttons row 2 -->
  <rect x="6" y="17" width="4" height="4" fill="#ffffff"/>
  <rect x="11" y="17" width="4" height="4" fill="#ffffff"/>
  <rect x="16" y="17" width="4" height="4" fill="#ffffff"/>
  <rect x="21" y="17" width="4" height="4" fill="#808080"/>
  
  <!-- Buttons row 3 -->
  <rect x="6" y="22" width="4" height="4" fill="#ffffff"/>
  <rect x="11" y="22" width="4" height="4" fill="#ffffff"/>
  <rect x="16" y="22" width="4" height="4" fill="#ffffff"/>
  <rect x="21" y="22" width="4" height="4" fill="#808080"/>
</svg>



