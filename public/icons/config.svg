<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Document base -->
  <rect x="5" y="2" width="22" height="28" rx="1" fill="#fff" stroke="#000" stroke-width="1"/>
  
  <!-- Folded corner -->
  <path d="M22 2 L27 7 L22 7 Z" fill="#c0c0c0" stroke="#000" stroke-width="0.5"/>
  
  <!-- Gear symbol -->
  <circle cx="16" cy="17" r="6" fill="none" stroke="#808080" stroke-width="2"/>
  <circle cx="16" cy="17" r="2" fill="#808080"/>
  
  <!-- Gear teeth -->
  <rect x="15" y="9" width="2" height="3" fill="#808080"/>
  <rect x="15" y="22" width="2" height="3" fill="#808080"/>
  <rect x="8" y="16" width="3" height="2" fill="#808080"/>
  <rect x="21" y="16" width="3" height="2" fill="#808080"/>
  
  <!-- Diagonal teeth -->
  <rect x="10" y="11" width="2" height="3" fill="#808080" transform="rotate(-45 11 12.5)"/>
  <rect x="20" y="11" width="2" height="3" fill="#808080" transform="rotate(45 21 12.5)"/>
  <rect x="10" y="20" width="2" height="3" fill="#808080" transform="rotate(45 11 21.5)"/>
  <rect x="20" y="20" width="2" height="3" fill="#808080" transform="rotate(-45 21 21.5)"/>
</svg>

