<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper background -->
  <rect x="4" y="2" width="24" height="28" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  
  <!-- Spiral binding -->
  <circle cx="7" cy="5" r="1.5" fill="#808080"/>
  <circle cx="7" cy="9" r="1.5" fill="#808080"/>
  <circle cx="7" cy="13" r="1.5" fill="#808080"/>
  <circle cx="7" cy="17" r="1.5" fill="#808080"/>
  <circle cx="7" cy="21" r="1.5" fill="#808080"/>
  <circle cx="7" cy="25" r="1.5" fill="#808080"/>
  
  <!-- Text lines -->
  <line x1="11" y1="7" x2="24" y2="7" stroke="#0000aa" stroke-width="1"/>
  <line x1="11" y1="11" x2="22" y2="11" stroke="#0000aa" stroke-width="1"/>
  <line x1="11" y1="15" x2="24" y2="15" stroke="#0000aa" stroke-width="1"/>
  <line x1="11" y1="19" x2="20" y2="19" stroke="#0000aa" stroke-width="1"/>
  <line x1="11" y1="23" x2="23" y2="23" stroke="#0000aa" stroke-width="1"/>
  
  <!-- Code brackets for code editor feel -->
  <text x="11" y="28" font-family="monospace" font-size="5" fill="#0000aa">{...}</text>
</svg>
