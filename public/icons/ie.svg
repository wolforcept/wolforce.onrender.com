<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Globe -->
  <circle cx="16" cy="16" r="12" fill="#6699ff" stroke="#000080" stroke-width="2"/>
  
  <!-- Horizontal lines -->
  <ellipse cx="16" cy="16" rx="12" ry="4" fill="none" stroke="#000080" stroke-width="1"/>
  <ellipse cx="16" cy="16" rx="10" ry="8" fill="none" stroke="#000080" stroke-width="1"/>
  
  <!-- Vertical line -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#000080" stroke-width="1"/>
  
  <!-- E letter orbit -->
  <ellipse cx="16" cy="16" rx="14" ry="6" fill="none" stroke="#ffcc00" stroke-width="3" transform="rotate(-20 16 16)"/>
  
  <!-- E letter -->
  <text x="12" y="21" font-size="14" font-weight="bold" fill="#ffffff" font-family="Arial">e</text>
</svg>



