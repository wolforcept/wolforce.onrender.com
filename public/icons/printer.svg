<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper in tray -->
  <rect x="8" y="2" width="16" height="8" fill="#fff" stroke="#000" stroke-width="1"/>
  
  <!-- Printer body -->
  <rect x="2" y="10" width="28" height="14" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  
  <!-- Paper out tray -->
  <rect x="6" y="24" width="20" height="6" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <rect x="8" y="22" width="16" height="6" fill="#fff" stroke="#000" stroke-width="1"/>
  
  <!-- Control panel -->
  <rect x="20" y="14" width="8" height="6" fill="#e0e0e0" stroke="#808080" stroke-width="1"/>
  <circle cx="26" cy="16" r="1" fill="#00ff00"/>
  <rect x="22" y="18" width="4" height="1" fill="#808080"/>
</svg>



