<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Monitor -->
  <rect x="2" y="2" width="28" height="20" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <rect x="3" y="3" width="26" height="18" fill="#000080"/>
  <rect x="4" y="4" width="24" height="14" fill="#008080"/>
  
  <!-- Screen shine -->
  <rect x="5" y="5" width="8" height="4" fill="#00a0a0" opacity="0.5"/>
  
  <!-- Monitor stand -->
  <rect x="12" y="22" width="8" height="3" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  <rect x="8" y="25" width="16" height="4" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  
  <!-- Power light -->
  <rect x="14" y="19" width="4" height="2" fill="#808080"/>
  <rect x="15" y="19" width="2" height="2" fill="#00ff00"/>
</svg>



