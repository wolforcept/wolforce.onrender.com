<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Window frame -->
  <rect x="2" y="4" width="28" height="24" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="3" y="5" width="26" height="4" fill="#000080"/>
  
  <!-- Content area -->
  <rect x="3" y="10" width="26" height="16" fill="#fff" stroke="#808080" stroke-width="1"/>
  
  <!-- Run icon arrow -->
  <polygon points="10,14 10,22 18,18" fill="#000080"/>
  
  <!-- Text line -->
  <rect x="20" y="17" width="6" height="2" fill="#000"/>
</svg>



