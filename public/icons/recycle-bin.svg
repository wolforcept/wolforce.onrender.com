<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Base/bottom of trash can -->
  <rect x="6" y="10" width="20" height="18" rx="1" fill="#808080" stroke="#000" stroke-width="1"/>
  <rect x="7" y="11" width="18" height="16" fill="#c0c0c0"/>
  
  <!-- Vertical lines on can -->
  <line x1="11" y1="13" x2="11" y2="25" stroke="#808080" stroke-width="1.5"/>
  <line x1="16" y1="13" x2="16" y2="25" stroke="#808080" stroke-width="1.5"/>
  <line x1="21" y1="13" x2="21" y2="25" stroke="#808080" stroke-width="1.5"/>
  
  <!-- Lid -->
  <rect x="4" y="6" width="24" height="4" rx="1" fill="#808080" stroke="#000" stroke-width="1"/>
  <rect x="5" y="7" width="22" height="2" fill="#c0c0c0"/>
  
  <!-- Handle on lid -->
  <rect x="13" y="3" width="6" height="4" rx="1" fill="#808080" stroke="#000" stroke-width="1"/>
  <rect x="14" y="4" width="4" height="2" fill="#c0c0c0"/>
  
  <!-- Recycling arrows symbol (simplified) -->
