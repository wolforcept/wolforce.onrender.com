<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Red pane -->
  <rect x="2" y="2" width="12" height="12" fill="#ff0000" stroke="#000" stroke-width="1"/>
  
  <!-- Green pane -->
  <rect x="16" y="2" width="14" height="12" fill="#00ff00" stroke="#000" stroke-width="1"/>
  
  <!-- Blue pane -->
  <rect x="2" y="16" width="12" height="14" fill="#0000ff" stroke="#000" stroke-width="1"/>
  
  <!-- Yellow pane -->
  <rect x="16" y="16" width="14" height="14" fill="#ffff00" stroke="#000" stroke-width="1"/>
  
  <!-- Wave effect -->
  <path d="M2 8 Q8 6, 14 8 Q20 10, 30 6" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <path d="M2 22 Q8 20, 14 22 Q20 24, 30 20" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
