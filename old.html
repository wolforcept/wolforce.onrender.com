<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wolforce</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ============================================================
       SECTION: CSS VARIABLES / THEMES
    ============================================================ */
        /* ── Light themes ── */
        :root,
        [data-theme="light"] {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --border: #e2e2dc;
            --text: #1a1a18;
            --muted: #6b6b65;
            --accent: #2563eb;
            --nav-bg: #1a1a18;
            --nav-text: #f5f5f0;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        [data-theme="gray"] {
            --bg: #efefef;
            --surface: #f9f9f9;
            --border: #d8d8d8;
            --text: #111111;
            --muted: #666666;
            --accent: #2563eb;
            --nav-bg: #111111;
            --nav-text: #efefef;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        [data-theme="rose"] {
            --bg: #fdf4f5;
            --surface: #ffffff;
            --border: #f0d9dc;
            --text: #1e0f11;
            --muted: #8a6068;
            --accent: #e11d48;
            --nav-bg: #1e0f11;
            --nav-text: #fdf4f5;
            --shadow: 0 2px 16px rgba(225, 29, 72, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        [data-theme="mint"] {
            --bg: #f2faf6;
            --surface: #ffffff;
            --border: #ceeadb;
            --text: #0d2118;
            --muted: #4d8068;
            --accent: #059669;
            --nav-bg: #0d2118;
            --nav-text: #f2faf6;
            --shadow: 0 2px 16px rgba(5, 150, 105, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        [data-theme="violet"] {
            --bg: #f6f4ff;
            --surface: #ffffff;
            --border: #e0d9f7;
            --text: #130d2e;
            --muted: #6b5fa8;
            --accent: #7c3aed;
            --nav-bg: #130d2e;
            --nav-text: #f6f4ff;
            --shadow: 0 2px 16px rgba(124, 58, 237, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        [data-theme="amber"] {
            --bg: #fdf8ee;
            --surface: #ffffff;
            --border: #ecdfc0;
            --text: #1c1608;
            --muted: #8a7640;
            --accent: #d97706;
            --nav-bg: #1c1608;
            --nav-text: #fdf8ee;
            --shadow: 0 2px 16px rgba(217, 119, 6, 0.07);
            --chip-and: #2563eb;
            --chip-or: #16a34a;
            --chip-not: #dc2626;
        }

        /* ── Dark themes ── */
        [data-theme="dark"] {
            --bg: #111110;
            --surface: #1c1c1a;
            --border: #2e2e2c;
            --text: #e8e8e2;
            --muted: #888880;
            --accent: #60a5fa;
            --nav-bg: #0a0a09;
            --nav-text: #e8e8e2;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        [data-theme="dark-gray"] {
            --bg: #1e1e1e;
            --surface: #2a2a2a;
            --border: #3a3a3a;
            --text: #e0e0e0;
            --muted: #888888;
            --accent: #60a5fa;
            --nav-bg: #111111;
            --nav-text: #e0e0e0;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        [data-theme="dark-rose"] {
            --bg: #1a0c0e;
            --surface: #261215;
            --border: #3d1d21;
            --text: #f5d5d9;
            --muted: #a06870;
            --accent: #fb7185;
            --nav-bg: #0e0608;
            --nav-text: #f5d5d9;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        [data-theme="dark-mint"] {
            --bg: #091510;
            --surface: #0f1f17;
            --border: #1a3326;
            --text: #c8ecd8;
            --muted: #5a8a6a;
            --accent: #34d399;
            --nav-bg: #050d09;
            --nav-text: #c8ecd8;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        [data-theme="dark-violet"] {
            --bg: #0e0b1a;
            --surface: #161228;
            --border: #2a2045;
            --text: #ddd6fe;
            --muted: #7c6faa;
            --accent: #a78bfa;
            --nav-bg: #080612;
            --nav-text: #ddd6fe;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        [data-theme="dark-amber"] {
            --bg: #150f02;
            --surface: #1f1803;
            --border: #352a08;
            --text: #fde8b0;
            --muted: #a08030;
            --accent: #fbbf24;
            --nav-bg: #0a0701;
            --nav-text: #fde8b0;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            --chip-and: #60a5fa;
            --chip-or: #4ade80;
            --chip-not: #f87171;
        }

        /* ============================================================
       SECTION: BASE / RESET
    ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body, 'DM Sans', sans-serif);
            font-weight: 400;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-body, 'Syne', sans-serif);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ============================================================
       SECTION: NAVBAR
    ============================================================ */
        #navbar {
            background: var(--nav-bg);
            color: var(--nav-text);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        #navbar-logo {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }

        #navbar-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.04em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: var(--nav-text);
            pointer-events: none;
            white-space: nowrap;
        }

        #navbar-actions {
            display: flex;
            gap: 0.25rem;
            flex-shrink: 0;
            margin-left: auto;
            position: relative;
            z-index: 1;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--nav-text);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s;
            opacity: 0.8;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            opacity: 1;
        }

        /* ============================================================
       SECTION: MAIN CONTENT
    ============================================================ */
        #content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.25rem 120px;
        }

        /* ============================================================
       SECTION: POST GRID
    ============================================================ */
        #posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.85rem;
        }

        @media (min-width: 600px) {
            #posts-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        /* ── Mobile / tablet: square tiles with horizontal expand ── */
        .post-card {
            position: relative;
            border-radius: 10px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            transition: box-shadow 0.22s;
        }

        .post-card.expanded {
            grid-column: span 2;
            aspect-ratio: unset;
            height: var(--card-size, auto);
        }

        .post-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
        }

        /* Inner wrapper — row, fills card */
        .post-card-inner {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        /* Front face — square image, always left */
        .post-card-front {
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
            border-radius: 0;
            height: 100%;
            /* Collapsed: fills whole card width (card is square so this is correct).
               Expanded: width = height = the captured square size. */
            width: 100%;
        }

        .post-card.expanded .post-card-front {
            /* Lock to the original square dimension */
            width: var(--card-size, auto);
        }

        .post-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-color: var(--border);
        }

        .post-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    transparent 40%,
                    rgba(0, 0, 0, 0.65) 80%,
                    rgba(0, 0, 0, 0.88) 100%);
            pointer-events: none;
        }

        /* Title bar — always visible at bottom of image */
        .post-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.65rem 0.7rem 0.6rem;
            z-index: 2;
        }

        .post-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .post-title a {
            color: #fff;
        }

        .post-title a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        /* Detail panel — slides in from the right */
        .post-detail-overlay {
            background: var(--surface);
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            justify-content: flex-start;
            align-items: flex-start;
            /* Hidden: zero width, clipped, content cannot wrap out */
            width: 0;
            min-width: 0;
            overflow: hidden;
            opacity: 0;
            transition: width 0.38s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.28s ease;
            pointer-events: none;
            flex-shrink: 0;
        }

        .post-card.expanded .post-detail-overlay {
            width: 0;
            /* overridden by flex: 1 */
            flex: 1;
            opacity: 1;
            pointer-events: all;
        }

        /* Clamp all children so they don't overflow the panel */
        .post-detail-overlay>* {
            width: 100%;
            min-width: 0;
        }

        /* Ensure links inside the detail panel are always clickable */
        .post-detail-overlay a {
            pointer-events: all;
        }

        .post-detail-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .post-detail-title a {
            color: var(--text);
        }

        .post-detail-title a:hover {
            color: var(--accent);
            text-decoration: none;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .tag-chip {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--border);
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.02em;
            border: 1px solid var(--border);
        }

        .post-content {
            font-size: 0.78rem;
            color: var(--text);
            opacity: 0.75;
            line-height: 1.5;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .post-date {
            font-size: 0.68rem;
            color: var(--text);
            opacity: 0.45;
            margin-top: 0.2rem;
        }

        .post-other-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.3rem;
        }

        .post-other-link {
            font-size: 0.7rem;
            padding: 2px 9px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--accent);
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .post-other-link:hover {
            background: var(--border);
            border-color: var(--accent);
            text-decoration: none;
        }

        /* Desktop variant — links sit on light background */
        @media (min-width: 1024px) {
            .post-other-link {
                border-color: var(--border);
                color: var(--accent);
            }

            .post-other-link:hover {
                background: var(--border);
                border-color: var(--accent);
            }
        }

        /* Favourite button */
        .post-fav-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 4;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.15s, transform 0.15s;
            flex-shrink: 0;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .post-fav-btn:hover {
            color: #fff;
            transform: scale(1.2);
        }

        .post-fav-btn.faved {
            color: #f59e0b;
        }

        .post-fav-btn.faved:hover {
            color: #fbbf24;
        }

        @media (min-width: 1024px) {
            .post-fav-btn {
                color: var(--muted);
                text-shadow: none;
            }

            .post-fav-btn:hover {
                color: var(--text);
                transform: scale(1.2);
            }

            .post-fav-btn.faved {
                color: #f59e0b;
            }
        }

        /* no-image variant — hide the image area, always show content */
        .post-card.no-image .post-card-front {
            display: none;
        }

        .post-card.no-image .post-detail-overlay {
            width: 100% !important;
            opacity: 1 !important;
            padding: 0.9rem !important;
            pointer-events: all !important;
            overflow: visible;
        }

        /* ── Desktop (≥1024px): wider tiles, image left + details right ── */
        @media (min-width: 1024px) {
            #posts-grid {
                grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
                gap: 1rem;
            }

            .post-card {
                aspect-ratio: unset;
                height: 160px;
                display: flex;
                flex-direction: row;
                cursor: default;
                perspective: none;
                overflow: hidden;
            }

            .post-card:hover {
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            }

            /* Reset flip — inner is just a flat flex row */
            .post-card-inner {
                display: contents;
                /* let card be the flex container */
                transform: none !important;
                transform-style: flat;
                transition: none;
            }

            /* Front face becomes the image column */
            .post-card-front {
                position: relative;
                width: 140px;
                flex-shrink: 0;
                height: 100%;
                border-radius: 0;
                backface-visibility: visible;
                inset: unset;
            }

            .post-card-bg {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .post-card.no-image .post-card-front {
                width: 6px;
            }

            .post-card.no-image .post-card-bg {
                background-color: var(--accent);
            }

            /* Hide poster-only layers */
            .post-card-gradient {
                display: none;
            }

            .post-title-bar {
                display: none;
            }

            /* Content panel — always visible, flat */
            .post-detail-overlay {
                position: static;
                transform: none;
                backface-visibility: visible;
                pointer-events: all;
                background: transparent;
                flex: 1;
                padding: 1rem 1.1rem;
                gap: 0.4rem;
                overflow: hidden;
                border-radius: 0;
                transition: none;
                /* Override mobile collapsed defaults */
                width: auto;
                opacity: 1;
            }

            .post-detail-title {
                font-size: 0.95rem;
                color: var(--text);
            }

            .post-detail-title a {
                color: var(--text);
            }

            .post-detail-title a:hover {
                color: var(--accent);
            }

            .post-content {
                color: var(--text);
                opacity: 0.7;
                -webkit-line-clamp: 3;
            }

            .post-date {
                color: var(--text);
                opacity: 0.45;
            }

            .tag-chip {
                background: var(--border);
                color: var(--muted);
                border-color: var(--border);
            }

            .post-card.no-image .post-detail-overlay {
                padding-left: 1.4rem;
            }
        }

        /* ============================================================
       SECTION: FILTER DRAWER (mobile) / FAB (desktop)
    ============================================================ */
        #filter-drawer-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 900;
            pointer-events: none;
        }

        /* ── Mobile: bottom drawer ── */
        #filter-drawer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.1);
            pointer-events: all;
            transform: translateY(calc(100% - 44px));
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 60vh;
            display: flex;
            flex-direction: column;
        }

        #filter-drawer.open {
            transform: translateY(0);
        }

        #drawer-handle {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
            padding: 0 1rem;
        }

        #drawer-handle-bar {
            width: 36px;
            height: 3px;
            background: var(--border);
            border-radius: 999px;
            transition: background 0.2s;
        }

        #filter-drawer.open #drawer-handle-bar {
            background: var(--accent);
        }

        #drawer-handle-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        #filter-chips-wrap {
            padding: 0.5rem 1rem 1.25rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            overflow-y: auto;
        }

        /* ── Desktop: FAB + floating popover ── */
        @media (min-width: 1024px) {
            #filter-drawer-wrap {
                left: auto;
                bottom: 1.5rem;
                right: 1.5rem;
                width: auto;
            }

            #filter-drawer {
                transform: none;
                border-radius: 14px;
                border: 1px solid var(--border);
                border-top: 1px solid var(--border);
                box-shadow: var(--shadow);
                flex-direction: column;
                max-height: none;
                width: 320px;

                /* Hidden by default — shown as popover above the FAB */
                position: absolute;
                bottom: calc(44px + 0.75rem);
                right: 0;
                opacity: 0;
                pointer-events: none;
                transform: translateY(8px);
                transition: opacity 0.2s, transform 0.2s;
            }

            #filter-drawer.open {
                opacity: 1;
                pointer-events: all;
                transform: translateY(0);
            }

            /* Hide the drag handle on desktop */
            #drawer-handle {
                display: none;
            }

            #filter-chips-wrap {
                padding: 0.85rem 1rem 1rem;
            }

            /* FAB button */
            #filter-fab {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.4rem;
                width: auto;
                height: 44px;
                padding: 0 1.1rem;
                border-radius: 999px;
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--muted);
                font-size: 0.82rem;
                font-weight: 500;
                cursor: pointer;
                pointer-events: all;
                box-shadow: var(--shadow);
                transition: border-color 0.18s, color 0.18s, background 0.18s;
                white-space: nowrap;
                letter-spacing: 0.03em;
            }

            #filter-fab:hover,
            #filter-fab.active {
                border-color: var(--accent);
                color: var(--accent);
            }

            const fileKey = Object.keys(meta.files)[0];
            const currentContent = meta.files[fileKey].content;

            let parsed;
            try {
                parsed = JSON.parse(currentContent);
            } catch {
                const norm = currentContent.replace(/([{,]\s*)([a-zA-Z_]\w*)(\s*:)/g, '$1"$2"$3');
                parsed = JSON.parse(norm);
            }

            parsed.posts = [newPost, ...(parsed.posts || [])];

            const patchRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: {
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ files: { [fileKey]: { content: JSON.stringify(parsed, null, 2) } } })
            });
            if (!patchRes.ok) {
                const err = await patchRes.json().catch(() => ({}));
                throw new Error(err.message || 'Patch failed');
            }
        }


        // ================================================================
        //  SECTION: THEMES
        // ================================================================
        const THEMES = [
            // ── Light ──
            { id: 'light', label: 'Light', bg: '#f5f5f0', accent: '#2563eb' },
            { id: 'gray', label: 'Gray', bg: '#efefef', accent: '#2563eb' },
            { id: 'rose', label: 'Rose', bg: '#fdf4f5', accent: '#e11d48' },
            { id: 'mint', label: 'Mint', bg: '#f2faf6', accent: '#059669' },
            { id: 'violet', label: 'Violet', bg: '#f6f4ff', accent: '#7c3aed' },
            { id: 'amber', label: 'Amber', bg: '#fdf8ee', accent: '#d97706' },
            // ── Dark ──
            { id: 'dark', label: 'Dark', bg: '#111110', accent: '#60a5fa' },
            { id: 'dark-gray', label: 'Dark Gray', bg: '#1e1e1e', accent: '#60a5fa' },
            { id: 'dark-rose', label: 'Dark Rose', bg: '#1a0c0e', accent: '#fb7185' },
            { id: 'dark-mint', label: 'Dark Mint', bg: '#091510', accent: '#34d399' },
            { id: 'dark-violet', label: 'Dark Violet', bg: '#0e0b1a', accent: '#a78bfa' },
            { id: 'dark-amber', label: 'Dark Amber', bg: '#150f02', accent: '#fbbf24' },
        ];

        function applyTheme(id) {
            document.documentElement.dataset.theme = id;
            localStorage.setItem(STORAGE_KEY_THEME, id);
            document.querySelectorAll('.theme-swatch').forEach(el => {
                el.classList.toggle('active', el.dataset.themeId === id);
            });
        }

        function buildThemeGrid() {
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = '';
            const current = document.documentElement.dataset.theme || 'light';
            let shownDivider = false;
            THEMES.forEach(t => {
                // Insert divider before first dark theme
                if (!shownDivider && t.id.startsWith('dark')) {
                    shownDivider = true;
                    const div = document.createElement('div');
                    div.style.cssText = 'font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;padding:0.5rem 0.75rem 0.1rem;opacity:0.7';
                    div.textContent = 'Dark';
                    // Also add Light label before first item retroactively via a header
                    const lightDiv = document.createElement('div');
                    lightDiv.style.cssText = div.style.cssText + 'padding-top:0.1rem';
                    lightDiv.textContent = 'Light';
                    grid.insertBefore(lightDiv, grid.firstChild);
                    grid.appendChild(div);
                }
                const sw = document.createElement('div');
                sw.className = 'theme-swatch' + (t.id === current ? ' active' : '');
                sw.dataset.themeId = t.id;
                sw.innerHTML = `
        <span class="theme-swatch-label">${t.label}</span>
        <div class="theme-swatch-dots">
          <span class="theme-dot" style="background:${t.bg};border-color:rgba(128,128,128,0.25)" title="Background"></span>
          <span class="theme-dot" style="background:${t.accent};border-color:transparent" title="Accent"></span>
        </div>`;
                sw.addEventListener('click', () => { applyTheme(t.id); });
                grid.appendChild(sw);
            });
        }


        // ================================================================
        //  SECTION: MODAL UTILITIES
        // ================================================================
        function openModal(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('visible');
                el.addEventListener('click', function closeOnBg(e) {
                    if (e.target === el) { closeModal(id); el.removeEventListener('click', closeOnBg); }
                });
            }
        }

        function closeModal(id) {
            const el = document.getElementById(id);
            if (el) el.classList.remove('visible');
        }

        // Wire close buttons
        document.querySelectorAll('[data-close]').forEach(btn => {
            btn.addEventListener('click', () => closeModal(btn.dataset.close));
        });

        // Escape key closes any open modal
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.wf-modal-overlay.visible').forEach(el => el.classList.remove('visible'));
            }
        });


        // ================================================================
        //  SECTION: MODAL — Login
        // ================================================================
        document.getElementById('btn-login').addEventListener('click', () => {
            document.getElementById('login-key-input').value = '';
            openModal('modal-login');
            setTimeout(() => document.getElementById('login-key-input').focus(), 120);
        });

        document.getElementById('btn-do-login').addEventListener('click', () => {
            const key = document.getElementById('login-key-input').value.trim();
            if (!key) { showToast('Please enter a token'); return; }
            localStorage.setItem(STORAGE_KEY_TOKEN, key);
            closeModal('modal-login');
            updateAuthUI();
            showToast('Logged in ✓');
        });

        // Allow Enter key in login input
        document.getElementById('login-key-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-do-login').click();
        });

        function updateAuthUI() {
            const hasToken = !!localStorage.getItem(STORAGE_KEY_TOKEN);
            document.getElementById('btn-new').style.display = hasToken ? 'flex' : 'none';
            document.getElementById('btn-login').style.display = hasToken ? 'none' : 'flex';
        }


        // ================================================================
        //  SECTION: MODAL — Theme
        // ================================================================
        document.getElementById('btn-theme').addEventListener('click', () => {
            buildThemeGrid();
            openModal('modal-theme');
        });


        // ================================================================
        //  SECTION: MODAL — New Post
        // ================================================================
        document.getElementById('btn-new').addEventListener('click', () => {
            // Clear form
            ['np-title', 'np-link', 'np-image', 'np-tags', 'np-content'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('np-error').style.display = 'none';
            openModal('modal-new-post');
            setTimeout(() => document.getElementById('np-title').focus(), 120);
        });

        document.getElementById('btn-do-post').addEventListener('click', async () => {
            const title = document.getElementById('np-title').value.trim();
            const link = document.getElementById('np-link').value.trim();
            const image = document.getElementById('np-image').value.trim();
            const tagsRaw = document.getElementById('np-tags').value.trim();
            const content = document.getElementById('np-content').value.trim();
            const errEl = document.getElementById('np-error');

            if (!title) {
                errEl.textContent = 'Title is required.';
                errEl.style.display = 'block';
                return;
            }
            errEl.style.display = 'none';

            const newPost = {
                date: new Date().toISOString().slice(0, 10),
                title,
                content: content || undefined,
                image: image || undefined,
                tags: tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [],
                link: link || undefined
            };

            const btn = document.getElementById('btn-do-post');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publishing…';

            try {
                await patchGist(newPost);
                closeModal('modal-new-post');
                showToast('Post published! Refreshing…');
                setTimeout(() => location.reload(), 1200);
            } catch (err) {
                errEl.textContent = 'Error: ' + err.message;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publish';
            }
        });


        // ================================================================
        //  SECTION: RENDER — Boxes (Post Cards)
        // ================================================================

        // Resolve image string: prefix with assets/ unless it's an absolute URL
        function resolveImageUrl(img) {
            if (!img) return null;
            if (/^https?:\/\//i.test(img)) return img;
            return 'assets/' + img;
        }

        function buildPostCard(post) {
            const imgUrl = resolveImageUrl(post.image);
            const hasImage = !!imgUrl;
            const hasTags = Array.isArray(post.tags) && post.tags.length > 0;
            const hasContent = !!post.content;

            const card = document.createElement('div');
            card.className = 'post-card' + (hasImage ? '' : ' no-image');
            if (hasImage) card.style.setProperty('--card-img', `url("${imgUrl.replace(/"/g, '\\"')}")`);

            // ── Flip inner wrapper ──
            const inner = document.createElement('div');
            inner.className = 'post-card-inner';

            // ── Front face ──
            const front = document.createElement('div');
            front.className = 'post-card-front';

            const bgDiv = document.createElement('div');
            bgDiv.className = 'post-card-bg';
            if (hasImage) bgDiv.style.backgroundImage = 'url("' + imgUrl.replace(/"/g, '\\"') + '")';
            front.appendChild(bgDiv);

            front.insertAdjacentHTML('beforeend', '<div class="post-card-gradient"></div>');

            const titleInner = post.link
                ? `<a href="${escHtml(post.link)}" target="_blank" rel="noopener">${escHtml(post.title)}</a>`
                : escHtml(post.title);
            front.insertAdjacentHTML('beforeend',
                `<div class="post-title-bar"><div class="post-title">${titleInner}</div></div>`);

            inner.appendChild(front);

            // ── Back face (detail overlay) ──
            const tagsHtml = hasTags
                ? `<div class="post-tags">${post.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>`
                : '';
            const contentHtml = hasContent
                ? `<div class="post-content">${escHtml(post.content)}</div>`
                : '';

            function formatDate(str) {
                if (!str) return '';
                let d;
                if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(str)) {
                    const [y, m, day] = str.split('-');
                    d = new Date(+y, +m - 1, +day);
                } else if (/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)) {
                    const [day, m, y] = str.split('-');
                    d = new Date(+y, +m - 1, +day);
                } else {
                    d = new Date(str);
                }
                if (isNaN(d)) return str;
                return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            }

            const dateHtml = post.date
                ? `<div class="post-date">${escHtml(formatDate(post.date))}</div>`
                : '';

            const otherlinksHtml = Array.isArray(post.otherlinks) && post.otherlinks.length > 0
                ? `<div class="post-other-links">${post.otherlinks.map(l =>
                    `<a class="post-other-link" href="${escHtml(l.link)}" target="_blank" rel="noopener">
            <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.6rem;margin-right:3px"></i>${escHtml(l.title)}</a>`
                ).join('')}</div>`
                : '';

            inner.insertAdjacentHTML('beforeend', `
      <div class="post-detail-overlay">
        <div class="post-detail-title">${titleInner}</div>
        ${tagsHtml}
        ${contentHtml}
        ${otherlinksHtml}
        ${dateHtml}
      </div>`);

            card.appendChild(inner);

            // ── Fav button — outside the flip, always on top ──
            const postId = post.title;
            const favBtn = document.createElement('button');
            favBtn.className = 'post-fav-btn' + (isFav(postId) ? ' faved' : '');
            favBtn.title = 'Favourite';
            favBtn.innerHTML = `<i class="${isFav(postId) ? 'fa-solid' : 'fa-regular'} fa-star"></i>`;
            favBtn.addEventListener('click', e => {
                e.stopPropagation();
                toggleFav(postId);
                const faved = isFav(postId);
                favBtn.classList.toggle('faved', faved);
                favBtn.innerHTML = `<i class="${faved ? 'fa-solid' : 'fa-regular'} fa-star"></i>`;
                applyFilters();
            });
            card.appendChild(favBtn);

            // Tap to expand on mobile — span 2 columns, image stays left, detail slides in right
            card.addEventListener('click', function (e) {
                if (window.innerWidth >= 1024) return;
                if (this.classList.contains('no-image')) return; // no-image cards always show content
                if (!e.target.closest('a')) {
                    const isExpanded = this.classList.contains('expanded');
                    // Collapse all
                    document.querySelectorAll('.post-card.expanded').forEach(c => {
                        c.style.removeProperty('--card-size');
                        c.classList.remove('expanded');
                    });
                    if (!isExpanded) {
                        // Capture current rendered size before expanding
                        const rect = this.getBoundingClientRect();
                        this.style.setProperty('--card-size', rect.height + 'px');
                        this.classList.add('expanded');
                    }
                }
            });

            return card;
        }

        function renderPosts(posts) {
            const grid = document.getElementById('posts-grid');
            grid.innerHTML = '';

            if (!posts || posts.length === 0) {
                grid.innerHTML = '<div id="posts-empty"><i class="fa-regular fa-face-meh" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:0.75rem"></i>No posts found.</div>';
                return;
            }

            posts.forEach(post => grid.appendChild(buildPostCard(post)));
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }


        // ================================================================
        //  SECTION: RENDER — Filters
        // ================================================================
        const FILTER_STATES = ['disabled', 'and', 'or', 'not'];
        const FILTER_STATE_LABELS = {}; // labels removed — colour is sufficient

        let filterState = {}; // tag → 'disabled' | 'and' | 'or' | 'not'

        function saveFilters() {
            localStorage.setItem(STORAGE_KEY_FILTERS, JSON.stringify(filterState));
        }
        function loadFilters() {
            try { filterState = JSON.parse(localStorage.getItem(STORAGE_KEY_FILTERS)) || {}; }
            catch { filterState = {}; }
        }

        function buildFilters(posts) {
            const allTags = new Set();
            posts.forEach(p => (p.tags || []).forEach(t => allTags.add(t)));

            const wrap = document.getElementById('filter-chips-wrap');
            wrap.innerHTML = '';

            // ── Favourites chip — always first ──
            const FAV_KEY = '__favs__';
            filterState[FAV_KEY] = filterState[FAV_KEY] || 'disabled';
            const favChip = document.createElement('button');
            favChip.className = 'filter-chip';
            favChip.dataset.tag = FAV_KEY;
            favChip.dataset.state = filterState[FAV_KEY];
            favChip.innerHTML = `<i class="fa-solid fa-star" style="font-size:0.7rem"></i><span class="chip-tag-label" style="margin-left:0.2rem">Favourites</span>`;
            favChip.addEventListener('click', () => {
                const cur = FILTER_STATES.indexOf(filterState[FAV_KEY]);
                filterState[FAV_KEY] = FILTER_STATES[(cur + 1) % FILTER_STATES.length];
                favChip.dataset.state = filterState[FAV_KEY];
                saveFilters();
                applyFilters();
            });
            wrap.appendChild(favChip);

            // ── Tag chips ──
            allTags.forEach(tag => {
                filterState[tag] = filterState[tag] || 'disabled';
                const chip = document.createElement('button');
                chip.className = 'filter-chip';
                chip.dataset.tag = tag;
                chip.dataset.state = filterState[tag];
                chip.innerHTML = `<span class="chip-tag-label">${escHtml(tag)}</span>`;

                chip.addEventListener('click', () => {
                    const cur = FILTER_STATES.indexOf(filterState[tag]);
                    filterState[tag] = FILTER_STATES[(cur + 1) % FILTER_STATES.length];
                    chip.dataset.state = filterState[tag];
                    chip.innerHTML = `<span class="chip-tag-label">${escHtml(tag)}</span>`;
                    saveFilters();
                    applyFilters();
                });

                wrap.appendChild(chip);
            });

            // Clear all button
            const clearBtn = document.createElement('button');
            clearBtn.id = 'filter-clear-btn';
            clearBtn.innerHTML = '<i class="fa-solid fa-xmark"></i> Clear';
            clearBtn.addEventListener('click', () => {
                Object.keys(filterState).forEach(k => filterState[k] = 'disabled');
                saveFilters();
                buildFilters(allPosts);
                renderPosts(allPosts);
            });
            wrap.appendChild(clearBtn);
        }

        function applyFilters() {
            const FAV_KEY = '__favs__';
            const favState = filterState[FAV_KEY] || 'disabled';
            const andTags = Object.entries(filterState).filter(([k, s]) => k !== FAV_KEY && s === 'and').map(([t]) => t);
            const orTags = Object.entries(filterState).filter(([k, s]) => k !== FAV_KEY && s === 'or').map(([t]) => t);
            const notTags = Object.entries(filterState).filter(([k, s]) => k !== FAV_KEY && s === 'not').map(([t]) => t);

            const hasActive = favState !== 'disabled' || andTags.length + orTags.length + notTags.length > 0;
            if (!hasActive) { renderPosts(allPosts); return; }

            const filtered = allPosts.filter(post => {
                const tags = post.tags || [];
                const faved = isFav(post.title);

                // Favourites filter
                if (favState === 'and' && !faved) return false;
                if (favState === 'or' && !faved && orTags.length === 0 && andTags.length === 0) return false;
                if (favState === 'not' && faved) return false;

                // NOT: exclude if any not-tag present
                if (notTags.some(t => tags.includes(t))) return false;

                // AND: must include ALL and-tags
                if (andTags.length > 0 && !andTags.every(t => tags.includes(t))) return false;

                // OR: must match at least one or-tag (or be faved if fav=or)
                if (orTags.length > 0 || favState === 'or') {
                    const matchesOrTag = orTags.some(t => tags.includes(t));
                    const matchesFav = favState === 'or' && faved;
                    if (andTags.length === 0 && !matchesOrTag && !matchesFav) return false;
                }

                return true;
            });

            renderPosts(filtered);
        }


        // ================================================================
        //  SECTION: FILTER DRAWER — Pull / drag / flick (mobile) + FAB (desktop)
        // ================================================================
        const drawer = document.getElementById('filter-drawer');
        const drawerWrap = document.getElementById('filter-drawer-wrap');
        const drawerHandle = document.getElementById('drawer-handle');
        const filterFab = document.getElementById('filter-fab');

        // -- State --
        let drawerOpen = false;
        let drawerHeight = 0;

        function setDrawerOpen(open, animate = true) {
            drawerOpen = open;
            const isDesktop = window.innerWidth >= 1024;

            if (isDesktop) {
                // Desktop: toggle popover via CSS transition (opacity/transform in CSS)
                drawer.classList.toggle('open', open);
                filterFab.classList.toggle('active', open);
            } else {
                // Mobile: translate drawer
                drawer.style.transition = animate
                    ? 'transform 0.35s cubic-bezier(0.32, 0.72, 0, 1)'
                    : 'none';
                drawer.style.transform = open ? 'translateY(0)' : '';
                drawer.classList.toggle('open', open);
            }
        }

        // -- Desktop FAB click --
        filterFab.addEventListener('click', e => {
            e.stopPropagation();
            setDrawerOpen(!drawerOpen);
        });

        // -- Mobile handle click --
        drawerHandle.addEventListener('click', () => setDrawerOpen(!drawerOpen));

        // -- Close when clicking outside --
        document.addEventListener('click', e => {
            if (drawerOpen && !drawer.contains(e.target) && e.target !== filterFab) {
                setDrawerOpen(false);
            }
        });

        // -- Prevent chip clicks from bubbling and closing drawer --
        document.getElementById('filter-chips-wrap').addEventListener('click', e => {
            e.stopPropagation();
        });

        // -- Touch drag (mobile only) --
        let dragStartY = 0;
        let dragStartOpen = false;
        let dragging = false;
        let lastY = 0;
        let lastT = 0;
        let velocityY = 0;

        function getDrawerHeight() {
            if (!drawerHeight) drawerHeight = drawer.offsetHeight;
            return drawerHeight;
        }
        function collapsedOffset() { return getDrawerHeight() - 44; }

        function onDragStart(clientY) {
            if (window.innerWidth >= 1024) return;
            dragging = true;
            dragStartY = clientY;
            dragStartOpen = drawerOpen;
            lastY = clientY;
            lastT = Date.now();
            velocityY = 0;
            drawerHeight = drawer.offsetHeight;
            drawer.style.transition = 'none';
        }

        function onDragMove(clientY) {
            if (!dragging) return;
            const now = Date.now();
            const dt = now - lastT || 1;
            velocityY = (clientY - lastY) / dt;
            lastY = clientY;
            lastT = now;
            const delta = clientY - dragStartY;
            const base = dragStartOpen ? 0 : collapsedOffset();
            const clamped = Math.max(0, Math.min(collapsedOffset(), base + delta));
            drawer.style.transform = `translateY(${clamped}px)`;
        }

        function onDragEnd() {
            if (!dragging) return;
            dragging = false;
            const FLICK_THRESHOLD = 0.4;
            const DRAG_THRESHOLD = collapsedOffset() * 0.4;
            const match = drawer.style.transform.match(/translateY\(([^p]+)px\)/);
            const currentOffset = match ? parseFloat(match[1]) : (drawerOpen ? 0 : collapsedOffset());
            let shouldOpen;
            if (Math.abs(velocityY) > FLICK_THRESHOLD) {
                shouldOpen = velocityY < 0;
            } else {
                shouldOpen = currentOffset < DRAG_THRESHOLD;
            }
            setDrawerOpen(shouldOpen, true);
        }

        drawer.addEventListener('touchstart', e => {
            onDragStart(e.touches[0].clientY);
        }, { passive: true });

        drawer.addEventListener('touchmove', e => {
            if (dragging) e.preventDefault();
            onDragMove(e.touches[0].clientY);
        }, { passive: false });

        drawer.addEventListener('touchend', onDragEnd, { passive: true });
        drawer.addEventListener('touchcancel', onDragEnd, { passive: true });

        // -- Hide drawer when page is scrolled --
        window.addEventListener('scroll', () => {
            if (drawerOpen) setDrawerOpen(false);
        }, { passive: true });


        // ================================================================
        //  SECTION: TOAST
        // ================================================================
        let toastTimer;
        function showToast(msg, duration = 2800) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), duration);
        }


        // ================================================================
        //  SECTION: INIT
        // ================================================================
        (async function init() {
            // Restore theme
            const savedTheme = localStorage.getItem(STORAGE_KEY_THEME) || 'light';
            document.documentElement.dataset.theme = savedTheme;

            // Restore auth UI
            updateAuthUI();

            // Restore saved filter state
            loadFilters();

            // Fetch and render
            try {
                allPosts = await fetchPosts();
                renderPosts(allPosts);
                buildFilters(allPosts);
                applyFilters();
            } catch (err) {
                console.warn('Could not fetch posts, using fallback data.', err.message);
                allPosts = FALLBACK_POSTS;
                renderPosts(allPosts);
                buildFilters(allPosts);
                applyFilters();
            }
        })();
    </script>
</body>
